<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FONEVI — Perfil del Socio</title>
  <link rel="stylesheet" href="main.css"/>
  <link rel="stylesheet" href="dashboard.css"/>
  <link rel="stylesheet" href="loading.css"/>
  <!-- Favicon + PWA -->
  <link rel="icon"             href="favicon.svg"            type="image/svg+xml"/>
  <style>
    .perfil-hero {
      background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-800) 50%, var(--navy-950) 100%);
      border-radius: var(--r-xl); padding: 32px 36px; margin-bottom: 22px;
      display: flex; align-items: center; gap: 28px;
      position: relative; overflow: hidden; box-shadow: var(--shadow-lg);
    }
    .perfil-hero::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.025) 1px, transparent 0);
      background-size: 28px 28px; pointer-events: none;
    }
    .perfil-hero::after {
      content: ''; position: absolute; width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(201,146,42,.15) 0%, transparent 70%);
      border-radius: 50%; right: -40px; bottom: -80px; pointer-events: none;
    }
    .perfil-avatar {
      width: 88px; height: 88px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold-300), var(--gold-600));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 32px; font-weight: 600; color: #fff;
      box-shadow: 0 4px 20px rgba(201,146,42,.4); border: 4px solid rgba(255,255,255,.2);
      position: relative; z-index: 1;
    }
    .perfil-info { flex: 1; position: relative; z-index: 1; }
    .perfil-nombre { font-family: var(--font-display); font-size: 26px; font-weight: 400; color: #fff; letter-spacing: -.3px; margin-bottom: 6px; }
    .perfil-cargo  { font-size: 14px; color: rgba(255,255,255,.6); margin-bottom: 12px; }
    .perfil-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .perfil-badge  { padding: 4px 12px; border-radius: var(--r-full); font-size: 11px; font-weight: 600; border: 1px solid rgba(255,255,255,.15); }
    .badge-activo  { background: rgba(29,158,117,.25); color: #5dcaa5; border-color: rgba(93,202,165,.3); }
    .badge-mora    { background: rgba(163,45,45,.3); color: #e07070; border-color: rgba(224,112,112,.3); }
    .badge-pendiente { background: rgba(186,117,23,.25); color: #e0a84a; border-color: rgba(224,168,74,.3); }
    .badge-codigo  { background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); }
    .badge-sede    { background: rgba(74,138,212,.2); color: #85b7eb; border-color: rgba(133,183,235,.3); }

    .perfil-stats  { display: flex; gap: 32px; margin-left: auto; position: relative; z-index: 1; }
    .perfil-stat   { text-align: center; }
    .perfil-stat-num { font-family: var(--font-display); font-size: 26px; font-weight: 400; color: var(--gold-300); display: block; line-height: 1; }
    .perfil-stat-lbl { font-size: 10.5px; color: rgba(255,255,255,.45); margin-top: 4px; text-transform: uppercase; letter-spacing: .8px; }
    .perfil-stat-sep { width: 1px; background: rgba(255,255,255,.1); align-self: stretch; }

    .datos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0; }
    .dato-item  { padding: 14px 20px; border-bottom: 1px solid var(--border-faint); border-right: 1px solid var(--border-faint); }
    .dato-item:nth-child(3n) { border-right: none; }
    .dato-item:nth-last-child(-n+3) { border-bottom: none; }
    .dato-label { font-size: 10.5px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 5px; }
    .dato-value { font-size: 13.5px; color: var(--text-primary); font-weight: 500; }

    .timeline-item { display: flex; align-items: center; gap: 12px; padding: 11px 22px; border-bottom: 1px solid var(--border-faint); transition: background var(--t-fast); }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-item:hover { background: var(--bg-subtle); }
    .t-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 2px solid; }
    .dp { background: var(--green-500); border-color: var(--green-500); }
    .dn { background: #fff; border-color: var(--amber-500); }
    .dm { background: var(--red-500); border-color: var(--red-500); }
    .dv { background: var(--red-300); border-color: var(--red-300); }
    .t-periodo { font-size: 13px; font-weight: 500; flex: 1; }
    .t-monto   { font-size: 13px; color: var(--text-secondary); min-width: 90px; text-align: right; }
    .t-fecha   { font-size: 11.5px; color: var(--text-muted); min-width: 80px; text-align: right; }
    .t-metodo  { font-size: 11px; color: var(--text-faint); min-width: 90px; text-align: right; }

    .credito-card { background: var(--bg-subtle); border: 1px solid var(--border-faint); border-radius: var(--r-lg); padding: 18px 20px; margin-bottom: 12px; transition: all var(--t-base) var(--ease); }
    .credito-card:last-child { margin-bottom: 0; }
    .credito-card:hover { box-shadow: var(--shadow-sm); border-color: var(--border-medium); }
    .credito-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .credito-id   { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
    .credito-monto{ font-family: var(--font-display); font-size: 22px; color: var(--text-primary); }
    .credito-prop { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .credito-pinfo{ display: flex; justify-content: space-between; font-size: 11.5px; color: var(--text-muted); margin-bottom: 6px; }
    .credito-saldo{ font-size: 13px; font-weight: 600; color: var(--amber-700); margin-top: 8px; }

    .metric-mini { background: var(--bg-subtle); border: 1px solid var(--border-faint); border-radius: var(--r-md); padding: 14px 16px; text-align: center; transition: all var(--t-base) var(--ease); }
    .metric-mini:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .metric-mini-label { font-size: 10.5px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 6px; }
    .metric-mini-value { font-family: var(--font-display); font-size: 20px; font-weight: 400; line-height: 1.1; }
    .metric-mini.green .metric-mini-value { color: var(--green-700); }
    .metric-mini.red   .metric-mini-value { color: var(--red-500); }
    .metric-mini.navy  .metric-mini-value { color: var(--navy-700); }
    .metric-mini.gold  .metric-mini-value { color: var(--gold-700); }
    .metric-mini.blue  .metric-mini-value { color: var(--blue-700); }
    .metric-mini.amber .metric-mini-value { color: var(--amber-700); }

    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-muted); margin-bottom: 18px; }
    .breadcrumb a { color: var(--blue-500); transition: color var(--t-fast); }
    .breadcrumb a:hover { color: var(--blue-700); }
    .breadcrumb-sep { color: var(--text-faint); }

    @media print {
      .sidebar,.topbar,.breadcrumb,.btn,.no-print { display: none !important; }
      .main-content { margin-left: 0 !important; }
    }
    @media (max-width: 768px) {
      .perfil-hero  { flex-direction: column; text-align: center; gap: 16px; }
      .perfil-stats { margin-left: 0; gap: 20px; }
      .datos-grid   { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="page-content">

      <div class="breadcrumb">
        <a href="dashboard.html">Inicio</a>
        <span class="breadcrumb-sep">&#x203A;</span>
        <a href="socios.html">Socios</a>
        <span class="breadcrumb-sep">&#x203A;</span>
        <span id="bcrNombre">Cargando...</span>
      </div>

      <!-- Hero -->
      <div class="perfil-hero">
        <div class="perfil-avatar" id="pAvatar">?</div>
        <div class="perfil-info">
          <div class="perfil-nombre" id="pNombre">Cargando...</div>
          <div class="perfil-cargo"  id="pCargo">&#8212;</div>
          <div class="perfil-badges" id="pBadges"></div>
        </div>
        <div class="perfil-stats"   id="pStats"></div>
      </div>

      <!-- 4 métricas -->
      <div class="grid-4" style="margin-bottom:20px;" id="pMetricas"></div>

      <!-- Gráfico ahorro + Datos personales -->
      <div class="grid-main-aside" style="margin-bottom:20px;">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Evolución del ahorro acumulado</span>
            <div class="no-print" style="display:flex;gap:8px;">
              <button class="btn btn-secondary btn-sm" onclick="window.print()">&#x1F5A8; Imprimir</button>
              <button class="btn btn-primary btn-sm"   onclick="Toast.success('Descargando estado de cuenta...')">&#x2B07; Descargar</button>
            </div>
          </div>
          <div class="card-body">
            <div style="position:relative;height:220px;"><canvas id="chartAhorro"></canvas></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">Datos personales</span>
            <a href="socios.html" class="btn-link no-print">Editar &#8594;</a>
          </div>
          <div class="datos-grid" id="pDatos"></div>
        </div>
      </div>

      <!-- Historial aportes + Créditos -->
      <div class="grid-2" style="margin-bottom:20px;">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Historial de aportes</span>
            <span id="pAportesResumen" style="font-size:12px;color:var(--text-muted);"></span>
          </div>
          <div id="pAportesMini" style="padding:12px 22px 4px;display:flex;gap:12px;flex-wrap:wrap;"></div>
          <div id="pTimeline"></div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">Cr&#xe9;ditos</span>
            <a href="creditos.html" class="btn btn-primary btn-sm no-print">+ Nuevo cr&#xe9;dito</a>
          </div>
          <div class="card-body" id="pCreditos">
            <div class="empty-state">
              <div class="empty-icon">&#x1F4B3;</div>
              <div class="empty-title">Sin cr&#xe9;ditos</div>
              <div class="empty-desc">Este socio no tiene cr&#xe9;ditos registrados.</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Estado de cuenta -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Estado de cuenta &#8212; resumen financiero</span>
          <span style="font-size:12px;color:var(--text-muted);" id="pFecha"></span>
        </div>
        <div class="card-body">
          <div class="grid-4" style="margin-bottom:20px;" id="pEstadoCuenta"></div>
          <div style="background:var(--bg-subtle);border:1px solid var(--border-faint);border-radius:var(--r-md);padding:16px 20px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span style="font-size:13px;font-weight:600;">Capacidad de cr&#xe9;dito disponible</span>
              <span style="font-size:13px;font-weight:600;color:var(--navy-700);" id="pCapLabel">&#8212;</span>
            </div>
            <div class="progress" style="height:8px;">
              <div class="progress-fill green" id="pCapBarra" style="width:0%"></div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:6px;">
              <span style="font-size:11px;color:var(--text-muted);" id="pCapUsado">Usado: &#8212;</span>
              <span style="font-size:11px;color:var(--text-muted);" id="pCapMax">M&#xe1;ximo: &#8212;</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<script src="auth.js"></script>
<script src="layout.js"></script>
<script src="app.js"></script>
<script src="charts.js"></script>
<script src="loading.js"></script>
<script>
var SID    = new URLSearchParams(window.location.search).get("id") || "S001";
var SOCIO  = null;

document.addEventListener("DOMContentLoaded", function() {
  SOCIO = DataHelper.getSocio(SID);

  if (!SOCIO) {
    document.body.innerHTML = '<div style="padding:60px;text-align:center;font-family:system-ui;">' +
      '<div style="font-size:48px;margin-bottom:16px;">&#x26A0;&#xFE0F;</div>' +
      '<h2>Socio no encontrado</h2><p style="color:#7a95b0;margin:12px 0 24px;">ID: "'+SID+'"</p>' +
      '<a href="socios.html" style="background:#0f2d52;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;">&#x2190; Volver a socios</a></div>';
    return;
  }

  buildLayout("Perfil del Socio", SOCIO.nombre + " &#8212; " + SOCIO.codigo,
    '<a href="socios.html" class="btn btn-secondary btn-sm">&#x2190; Volver</a>');
  initChartDefaults();

  document.getElementById("bcrNombre").textContent = SOCIO.nombre;
  document.getElementById("pFecha").textContent = "Generado: " +
    new Date().toLocaleDateString("es-CO",{day:"2-digit",month:"long",year:"numeric"});

  // ── Skeletons inmediatos ─────────────────────────────────
  Skeleton.show("pMetricas", "metrics", 4);
  Skeleton.show("pDatos",    "text",    9);
  Skeleton.show("pTimeline", "timeline", 5);
  Skeleton.show("pCreditos", "card",    120);
  Skeleton.show("pEstadoCuenta", "metrics", 4);
  // Hero skeleton
  var heroEl = document.querySelector(".perfil-hero");
  if (heroEl) heroEl.innerHTML = Skeleton.hero();
  // Gráfico skeleton
  var gEl = document.querySelector("#chartAhorro")?.parentElement;
  if (gEl) gEl.innerHTML = Skeleton.chartLine(220);

  // ── Carga escalonada ──────────────────────────────────────
  setTimeout(function() {
    // Reconstruir hero real
    if (heroEl) heroEl.innerHTML =
      '<div class="perfil-avatar" id="pAvatar">?</div>' +
      '<div class="perfil-info"><div class="perfil-nombre" id="pNombre"></div>' +
      '<div class="perfil-cargo" id="pCargo"></div>' +
      '<div class="perfil-badges" id="pBadges"></div></div>' +
      '<div class="perfil-stats" id="pStats"></div>';
    renderHero();
  }, 350);

  setTimeout(function() {
    renderMetricas(); Skeleton.hide("pMetricas");
    renderDatos();    Skeleton.hide("pDatos");
  }, 500);

  setTimeout(function() {
    renderAportes();  Skeleton.hide("pTimeline");
    renderCreditos(); Skeleton.hide("pCreditos");
    renderEstado();   Skeleton.hide("pEstadoCuenta");
  }, 700);

  setTimeout(function() {
    if (gEl) gEl.innerHTML = '<canvas id="chartAhorro"></canvas>';
    crearGraficoAhorro();
  }, 900);
});

/* ─── Hero ───────────────────────────────────────────────── */
function renderHero() {
  var ini = SOCIO.nombre.split(" ").map(function(p){return p[0];}).slice(0,2).join("");
  document.getElementById("pAvatar").textContent = ini;
  document.getElementById("pNombre").textContent = SOCIO.nombre;
  document.getElementById("pCargo").textContent  = SOCIO.cargo + "  \u2022  " + SOCIO.sede;

  var bcls = { activo:"badge-activo", mora:"badge-mora", pendiente:"badge-pendiente" };
  var blbl = { activo:"\u2713 Activo", mora:"\u26A0 En mora", pendiente:"\u23F3 Pendiente" };
  document.getElementById("pBadges").innerHTML =
    '<span class="perfil-badge badge-codigo">'+SOCIO.codigo+'</span>' +
    '<span class="perfil-badge '+(bcls[SOCIO.estado]||"")+'">'+( blbl[SOCIO.estado]||SOCIO.estado)+'</span>' +
    '<span class="perfil-badge badge-sede">'+SOCIO.sede+'</span>';

  var pagados = DataHelper.getAportesSocio(SID).filter(function(a){return a.estado==="pagado";}).length;
  var meses   = mesesActivo(SOCIO.fecha_ingreso);
  var pct     = pagados > 0 ? Math.min(100, Math.round((pagados/meses)*100)) : 100;
  document.getElementById("pStats").innerHTML =
    stat(fmtM(SOCIO.ahorro_acumulado), "Ahorro acum.") +
    '<div class="perfil-stat-sep"></div>' +
    stat(pagados, "Aportes pagados") +
    '<div class="perfil-stat-sep"></div>' +
    stat(pct+"%", "Cumplimiento");
}
function stat(n,l) {
  return '<div class="perfil-stat"><span class="perfil-stat-num">'+n+'</span><span class="perfil-stat-lbl">'+l+'</span></div>';
}

/* ─── Métricas ───────────────────────────────────────────── */
function renderMetricas() {
  var ap = DataHelper.getAportesSocio(SID);
  var cr = DataHelper.getCreditosSocio(SID);
  var mora = ap.filter(function(a){return ["mora","vencido"].includes(a.estado);});
  var deuda = cr.filter(function(c){return c.estado!=="pagado";}).reduce(function(t,c){return t+c.saldo_capital;},0);
  document.getElementById("pMetricas").innerHTML = [
    { cls:"green", label:"Ahorro acumulado",  value: DataHelper.formatCOP(SOCIO.ahorro_acumulado) },
    { cls:"navy",  label:"Aportes pagados",   value: ap.filter(function(a){return a.estado==="pagado";}).length + " / " + ap.length },
    { cls: mora.length?"red":"blue",  label: mora.length?"En mora":"Aporte mensual", value: mora.length ? mora.length+" per\xedodo(s)" : DataHelper.formatCOP(SOCIO.aporte_mensual) },
    { cls: deuda?"amber":"green", label: deuda?"Saldo deuda":"Sin deuda", value: deuda ? DataHelper.formatCOP(deuda) : "\u2713 Libre" }
  ].map(function(m){
    return '<div class="metric-mini '+m.cls+'"><div class="metric-mini-label">'+m.label+'</div><div class="metric-mini-value">'+m.value+'</div></div>';
  }).join("");
}

/* ─── Gráfico de ahorro ──────────────────────────────────── */
function crearGraficoAhorro() {
  destroyChart("chartAhorro");
  var ctx = document.getElementById("chartAhorro");
  if (!ctx) return;
  var labels = [], valores = [];
  var d = new Date(SOCIO.fecha_ingreso + "T00:00:00");
  var hoy = new Date("2026-03-22");
  var acc = 0;
  while (d <= hoy && labels.length <= 36) {
    labels.push(d.toLocaleDateString("es-CO",{month:"short",year:"2-digit"}));
    acc += SOCIO.aporte_mensual;
    valores.push(Math.min(acc, SOCIO.ahorro_acumulado));
    d.setMonth(d.getMonth()+1);
  }
  ChartInstances["chartAhorro"] = new Chart(ctx, {
    type:"line",
    data:{ labels:labels, datasets:[{
      label:"Ahorro", data:valores,
      borderColor:ChartColors.navy,
      backgroundColor:function(c){
        var ca=c.chart.chartArea; if(!ca) return "transparent";
        var g=c.chart.ctx.createLinearGradient(0,ca.top,0,ca.bottom);
        g.addColorStop(0,"rgba(15,45,82,.18)"); g.addColorStop(1,"rgba(15,45,82,.01)"); return g;
      },
      borderWidth:2.5, fill:true, tension:.4,
      pointRadius:function(c){return c.dataIndex===valores.length-1?6:0;},
      pointBackgroundColor:"#fff", pointBorderColor:ChartColors.navy, pointBorderWidth:2.5
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:function(c){
        return " "+new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",minimumFractionDigits:0}).format(c.raw);
      }}}},
      scales:{
        x:{grid:{display:false}, border:{display:false}, ticks:{maxTicksLimit:8,maxRotation:0}},
        y:{border:{display:false}, ticks:{callback:function(v){return"$"+(v/1000000).toFixed(1)+"M";}, maxTicksLimit:5}}
      }
    }
  });
}

/* ─── Datos personales ───────────────────────────────────── */
function renderDatos() {
  var datos = [
    {l:"Documento",       v:SOCIO.documento},
    {l:"Correo",          v:SOCIO.email},
    {l:"Tel\xe9fono",     v:SOCIO.telefono},
    {l:"Cargo",           v:SOCIO.cargo},
    {l:"Sede",            v:SOCIO.sede},
    {l:"Ingreso al fondo",v:DataHelper.formatFecha(SOCIO.fecha_ingreso)},
    {l:"Aporte mensual",  v:DataHelper.formatCOP(SOCIO.aporte_mensual)},
    {l:"Antig\xfcedad",  v:mesesActivo(SOCIO.fecha_ingreso)+" meses"},
    {l:"C\xf3digo",       v:SOCIO.codigo}
  ];
  document.getElementById("pDatos").innerHTML = datos.map(function(d){
    return '<div class="dato-item"><div class="dato-label">'+d.l+'</div><div class="dato-value">'+d.v+'</div></div>';
  }).join("");
}

/* ─── Historial de aportes ───────────────────────────────── */
function renderAportes() {
  var ap = DataHelper.getAportesSocio(SID);
  var pg = ap.filter(function(a){return a.estado==="pagado";}).length;
  var pe = ap.filter(function(a){return a.estado==="pendiente";}).length;
  var mo = ap.filter(function(a){return ["mora","vencido"].includes(a.estado);}).length;
  document.getElementById("pAportesResumen").textContent = pg+" pag. \u00b7 "+pe+" pend. \u00b7 "+mo+" mora";

  var mini = "";
  if (pg) mini += '<span style="font-size:12px;color:var(--green-500);font-weight:600;">\u2713 '+pg+' pagados</span>';
  if (pe) mini += '<span style="font-size:12px;color:var(--amber-500);font-weight:600;">\u23F3 '+pe+' pendiente(s)</span>';
  if (mo) mini += '<span style="font-size:12px;color:var(--red-500);font-weight:600;">\u26A0 '+mo+' en mora</span>';
  document.getElementById("pAportesMini").innerHTML = mini;

  var dotMap    = {pagado:"dp", pendiente:"dn", mora:"dm", vencido:"dv"};
  var metodoMap = {nomina:"N\xf3mina", transferencia:"Transf.", efectivo:"Efectivo"};
  document.getElementById("pTimeline").innerHTML = ap.slice().reverse().map(function(a){
    return '<div class="timeline-item">' +
      '<div class="t-dot '+(dotMap[a.estado]||"dn")+'"></div>' +
      '<span class="t-periodo">'+a.periodo+'</span>' +
      '<span class="t-monto">'+DataHelper.formatCOP(a.monto)+'</span>' +
      '<span class="t-fecha">'+(a.fecha_pago ? DataHelper.formatFecha(a.fecha_pago) : "&#8212;")+'</span>' +
      '<span class="t-metodo">'+(metodoMap[a.metodo]||"&#8212;")+'</span>' +
      DataHelper.estadoPill(a.estado) + '</div>';
  }).join("") || '<div style="padding:32px;text-align:center;color:var(--text-muted);">Sin aportes registrados.</div>';
}

/* ─── Créditos ───────────────────────────────────────────── */
function renderCreditos() {
  var cr = DataHelper.getCreditosSocio(SID);
  if (!cr.length) return;
  document.getElementById("pCreditos").innerHTML = cr.map(function(c){
    var pct = Math.round((c.cuotas_pagadas/c.cuotas)*100);
    var pc  = pct>=80?"green":pct>=40?"gold":"red";
    return '<div class="credito-card">' +
      '<div class="credito-head">' +
        '<div><div class="credito-id">#'+c.id+' \u00b7 '+DataHelper.formatFecha(c.fecha_desembolso)+'</div>' +
        '<div class="credito-monto">'+DataHelper.formatCOP(c.monto)+'</div>' +
        '<div class="credito-prop">'+(c.proposito||"&#8212;")+'</div></div>' +
        DataHelper.estadoPill(c.estado) +
      '</div>' +
      '<div class="credito-pinfo"><span>'+c.cuotas_pagadas+' / '+c.cuotas+' cuotas pagadas</span><span>'+pct+'%</span></div>' +
      '<div class="progress" style="height:7px;"><div class="progress-fill '+pc+'" style="width:'+pct+'%"></div></div>' +
      '<div class="credito-saldo">Saldo: '+DataHelper.formatCOP(c.saldo_capital)+'</div>' +
      '<div style="display:flex;gap:16px;margin-top:10px;font-size:11.5px;color:var(--text-muted);">' +
        '<span>Tasa: '+c.tasa_mensual+'% m.</span>' +
        '<span>Cuotas restantes: '+(c.cuotas-c.cuotas_pagadas)+'</span>' +
      '</div></div>';
  }).join("");
}

/* ─── Estado de cuenta ───────────────────────────────────── */
function renderEstado() {
  var ap = DataHelper.getAportesSocio(SID);
  var cr = DataHelper.getCreditosSocio(SID);
  var totalAp  = ap.filter(function(a){return a.estado==="pagado";}).reduce(function(t,a){return t+a.monto;},0);
  var deuda    = cr.filter(function(c){return c.estado!=="pagado";}).reduce(function(t,c){return t+c.saldo_capital;},0);
  var neto     = SOCIO.ahorro_acumulado - deuda;
  var maxCred  = SOCIO.ahorro_acumulado * (DB.config.max_credito_multiplicador||3);
  var pctUsado = maxCred > 0 ? Math.round((deuda/maxCred)*100) : 0;

  document.getElementById("pEstadoCuenta").innerHTML = [
    {cls:"green", label:"Total aportado",   value: DataHelper.formatCOP(totalAp)},
    {cls:"navy",  label:"Ahorro acumulado", value: DataHelper.formatCOP(SOCIO.ahorro_acumulado)},
    {cls: deuda?"amber":"green", label:"Saldo deuda",   value: deuda ? DataHelper.formatCOP(deuda) : "Sin deuda"},
    {cls: neto>=0?"blue":"red",  label:"Balance neto",  value: DataHelper.formatCOP(neto)}
  ].map(function(m){
    return '<div class="metric-mini '+m.cls+'"><div class="metric-mini-label">'+m.label+'</div><div class="metric-mini-value">'+m.value+'</div></div>';
  }).join("");

  document.getElementById("pCapLabel").textContent  = DataHelper.formatCOP(Math.max(0, maxCred-deuda))+" disponibles";
  document.getElementById("pCapBarra").style.width  = Math.min(pctUsado,100)+"%";
  document.getElementById("pCapBarra").className    = "progress-fill "+(pctUsado>75?"red":pctUsado>40?"gold":"green");
  document.getElementById("pCapUsado").textContent  = "Usado: "+DataHelper.formatCOP(deuda);
  document.getElementById("pCapMax").textContent    = "M\xe1ximo: "+DataHelper.formatCOP(maxCred);
}

/* ─── Utilidades ─────────────────────────────────────────── */
function fmtM(v) {
  if (v>=1000000) return "$"+(v/1000000).toFixed(1)+"M";
  if (v>=1000)    return "$"+Math.round(v/1000)+"k";
  return "$"+v;
}
function mesesActivo(f) {
  var d = new Date(f+"T00:00:00"), h = new Date("2026-03-22");
  return Math.max(1,(h.getFullYear()-d.getFullYear())*12+(h.getMonth()-d.getMonth()));
}
</script>
