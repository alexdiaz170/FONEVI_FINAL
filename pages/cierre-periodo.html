<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FONEVI — Cierre de Período</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/loading.css"/>
  <link rel="stylesheet" href="../css/transitions.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml"/>
  <link rel="manifest" href="../manifest.json"/>
  <meta name="theme-color" content="#0f2d52"/>
  <style>
    /* ── Barra de progreso del wizard ─────────────────────── */
    .wizard-bar {
      background: var(--bg-surface); border: 1px solid var(--border-faint);
      border-radius: var(--r-xl); padding: 24px 32px;
      margin-bottom: 24px; position: relative; overflow: hidden;
    }
    .wizard-bar::before {
      content:''; position:absolute; top:0; left:0; right:0; height:4px;
      background: linear-gradient(90deg,var(--gold-400),var(--gold-600));
      border-radius: var(--r-xl) var(--r-xl) 0 0;
    }
    .steps-row { display:flex; align-items:center; gap:0; }
    .step-item {
      display:flex; align-items:center; gap:10px; position:relative;
    }
    .step-bubble {
      width:38px; height:38px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:700; transition:all .3s ease;
      border: 2.5px solid var(--border-light);
      background: var(--bg-subtle); color: var(--text-muted);
    }
    .step-bubble.done   { background:var(--green-500); border-color:var(--green-500); color:#fff; }
    .step-bubble.active { background:var(--navy-800);  border-color:var(--navy-800);  color:#fff;
      box-shadow: 0 0 0 5px rgba(15,45,82,.12); }
    .step-text { }
    .step-label { font-size:13px; font-weight:600; color:var(--text-primary); white-space:nowrap; }
    .step-sub   { font-size:11px; color:var(--text-muted); }
    .step-connector {
      flex:1; height:3px; min-width:32px; margin:0 8px;
      background:var(--border-faint); border-radius:var(--r-full); overflow:hidden;
    }
    .step-connector-fill {
      height:100%; background:var(--green-400); border-radius:var(--r-full);
      transition:width .5s ease; width:0%;
    }

    /* ── Panel del paso activo ─────────────────────────────── */
    .paso-panel {
      background: var(--bg-surface); border: 1px solid var(--border-faint);
      border-radius: var(--r-xl); overflow: hidden; margin-bottom: 20px;
    }
    .paso-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--border-faint);
      background: var(--bg-subtle);
      display: flex; align-items: center; gap: 14px;
    }
    .paso-num-big {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--navy-800); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; flex-shrink: 0;
    }
    .paso-titulo { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .paso-desc   { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .paso-body   { padding: 24px 28px; }

    /* ── Fila de verificación ──────────────────────────────── */
    .check-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid var(--border-faint);
    }
    .check-row:last-child { border-bottom:none; }
    .check-ico {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .check-ico.ok   { background:var(--green-50);  color:var(--green-600); }
    .check-ico.warn { background:var(--amber-50);  color:var(--amber-600); }
    .check-ico.err  { background:var(--red-50);    color:var(--red-600); }
    .check-lbl { flex:1; font-size:13px; font-weight:500; }
    .check-val { font-size:13px; font-weight:600; color:var(--text-primary); }

    /* ── Tarjeta de cifra ──────────────────────────────────── */
    .cifra-card {
      background: var(--bg-subtle); border: 1px solid var(--border-faint);
      border-radius: var(--r-md); padding: 14px 18px; text-align:center;
    }
    .cifra-lbl { font-size:10.5px; font-weight:700; text-transform:uppercase;
      letter-spacing:.7px; color:var(--text-muted); margin-bottom:6px; }
    .cifra-val { font-family:var(--font-display); font-size:24px; font-weight:400; }
    .cifra-val.green { color:var(--green-600); }
    .cifra-val.red   { color:var(--red-600); }
    .cifra-val.navy  { color:var(--navy-700); }
    .cifra-val.gold  { color:var(--gold-600); }

    /* ── Tabla de pendientes ───────────────────────────────── */
    .pend-row {
      display:flex; align-items:center; gap:12px;
      padding:10px 0; border-bottom:1px solid var(--border-faint); font-size:13px;
    }
    .pend-row:last-child { border-bottom:none; }
    .pend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .pend-dot.mora { background:var(--red-500); }
    .pend-dot.pend { background:var(--amber-500); }
    .pend-nombre { flex:1; font-weight:500; }
    .pend-per { color:var(--text-muted); font-size:12px; }
    .pend-monto { font-weight:600; }

    /* ── Estado del PDF ────────────────────────────────────── */
    .pdf-box {
      border: 2px dashed var(--border-light); border-radius:var(--r-lg);
      padding: 32px 24px; text-align:center;
    }
    .pdf-box.ready { border-color:var(--green-300); background:var(--green-50); }
    .pdf-icon { font-size:36px; margin-bottom:10px; }

    /* ── Confirmación final ────────────────────────────────── */
    .confirm-banner {
      background: linear-gradient(135deg,var(--navy-50),var(--gold-50));
      border: 1.5px solid var(--gold-200); border-radius:var(--r-lg);
      padding: 20px 24px; margin-bottom:20px;
    }
    .next-periodo {
      background: var(--navy-800); color:#fff;
      border-radius:var(--r-md); padding:16px 20px; margin-top:16px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .np-lbl { font-size:11px; color:rgba(255,255,255,.5); margin-bottom:4px; }
    .np-val { font-size:20px; font-weight:600; color:var(--gold-300); }

    /* ── Footer acciones ───────────────────────────────────── */
    .wizard-footer {
      display:flex; justify-content:space-between; align-items:center;
      padding:18px 28px; border-top:1px solid var(--border-faint);
      background:var(--bg-subtle);
    }
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="page-content">

      <!-- Barra de progreso wizard -->
      <div class="wizard-bar">
        <div class="steps-row" id="stepsRow"></div>
      </div>

      <!-- Panel del paso activo -->
      <div class="paso-panel" id="pasoPanel">
        <div class="paso-header">
          <div class="paso-num-big" id="pasoNum">1</div>
          <div>
            <div class="paso-titulo" id="pasoTitulo">Cargando...</div>
            <div class="paso-desc"  id="pasoDesc"></div>
          </div>
        </div>
        <div class="paso-body" id="pasoBody"></div>
        <div class="wizard-footer">
          <button class="btn btn-secondary" id="btnAnterior" onclick="irPaso(pasoActual-1)" style="display:none;">
            ← Anterior
          </button>
          <div id="pasoMeta" style="font-size:12px;color:var(--text-muted);"></div>
          <button class="btn btn-primary" id="btnSiguiente" onclick="avanzar()">
            Continuar →
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="../js/darkmode.js"></script>
<script src="../js/transitions.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/roles.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script src="../js/search.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════
   ESTADO DEL WIZARD
═══════════════════════════════════════════════════════════ */
var pasoActual   = 1;
var PASOS_TOTAL  = 4;
var datosCalculo = null;  // resultado del paso 2
var pdfGenerado  = false; // control paso 3

var MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
             "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

var PASOS_CONFIG = [
  { n:1, label:"Verificar aportes", sub:"Revisar pendientes" },
  { n:2, label:"Calcular saldos",   sub:"Generar balance" },
  { n:3, label:"PDF de cierre",     sub:"Reporte oficial" },
  { n:4, label:"Archivar período",  sub:"Crear el siguiente" },
];

/* ═══════════════════════════════════════════════════════════
   INICIO
═══════════════════════════════════════════════════════════ */
document.addEventListener("DOMContentLoaded", async function() {
  if (!Roles.proteger("aportes")) return;

  await window.DataSync?.init();

  buildLayout(
    "Cierre de Período",
    "Asistente de cierre mensual — " + DB.config.periodo_actual,
    '<a href="aportes.html" class="btn btn-secondary btn-sm">← Volver a Aportes</a>'
  );

  renderSteps();
  irPaso(1);
});

/* ═══════════════════════════════════════════════════════════
   BARRA DE PASOS
═══════════════════════════════════════════════════════════ */
function renderSteps() {
  var html = "";
  PASOS_CONFIG.forEach(function(p, i) {
    var cls = p.n < pasoActual ? "done" : p.n === pasoActual ? "active" : "";
    var ico = p.n < pasoActual ? "✓" : p.n;
    html += '<div class="step-item">' +
      '<div class="step-bubble ' + cls + '">' + ico + '</div>' +
      '<div class="step-text">' +
        '<div class="step-label">' + p.label + '</div>' +
        '<div class="step-sub">'   + p.sub   + '</div>' +
      '</div>' +
    '</div>';
    if (i < PASOS_CONFIG.length - 1) {
      var pct = p.n < pasoActual ? 100 : 0;
      html += '<div class="step-connector">' +
        '<div class="step-connector-fill" style="width:' + pct + '%;"></div>' +
      '</div>';
    }
  });
  document.getElementById("stepsRow").innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════
   NAVEGACIÓN
═══════════════════════════════════════════════════════════ */
function irPaso(n) {
  pasoActual = n;
  renderSteps();

  var cfg = PASOS_CONFIG[n-1];
  document.getElementById("pasoNum").textContent    = n;
  document.getElementById("pasoTitulo").textContent = cfg.label;
  document.getElementById("pasoDesc").textContent   = cfg.sub;

  document.getElementById("btnAnterior").style.display = n > 1 ? "block" : "none";
  document.getElementById("pasoMeta").textContent = "Paso " + n + " de " + PASOS_TOTAL;

  var btn = document.getElementById("btnSiguiente");
  btn.textContent = n === PASOS_TOTAL ? "✓ Finalizar cierre" : "Continuar →";

  if (n === 1) renderPaso1();
  if (n === 2) renderPaso2();
  if (n === 3) renderPaso3();
  if (n === 4) renderPaso4();
}

function avanzar() {
  if (pasoActual === 3 && !pdfGenerado) {
    Toast.warn("Debes generar el PDF de cierre antes de continuar.");
    return;
  }
  if (pasoActual === PASOS_TOTAL) {
    ejecutarCierre();
    return;
  }
  irPaso(pasoActual + 1);
}

/* ═══════════════════════════════════════════════════════════
   PASO 1 — VERIFICAR APORTES PENDIENTES
═══════════════════════════════════════════════════════════ */
function renderPaso1() {
  var periodo    = DB.config.periodo_actual;
  var del_periodo = DB.aportes.filter(function(a){ return a.periodo === periodo; });
  var pagados    = del_periodo.filter(function(a){ return a.estado === "pagado"; });
  var pendientes = del_periodo.filter(function(a){ return a.estado === "pendiente"; });
  var mora       = del_periodo.filter(function(a){ return ["mora","vencido"].includes(a.estado); });
  var totalRec   = pagados.reduce(function(t,a){ return t+a.monto; }, 0);
  var todosBien  = pendientes.length === 0 && mora.length === 0;

  var checks = [
    {
      ico: todosBien ? "✓" : (mora.length > 0 ? "⚠" : "ℹ"),
      cls: todosBien ? "ok" : (mora.length > 0 ? "err" : "warn"),
      lbl: "Aportes del período: " + periodo,
      val: pagados.length + " pagados / " + del_periodo.length + " total",
    },
    {
      ico: pendientes.length === 0 ? "✓" : "⚠",
      cls: pendientes.length === 0 ? "ok" : "warn",
      lbl: "Aportes pendientes de cobro",
      val: pendientes.length === 0 ? "Ninguno ✓" : pendientes.length + " pendiente(s)",
    },
    {
      ico: mora.length === 0 ? "✓" : "⚠",
      cls: mora.length === 0 ? "ok" : "err",
      lbl: "Aportes en mora / vencidos",
      val: mora.length === 0 ? "Ninguno ✓" : mora.length + " en mora",
    },
    {
      ico: "✓",
      cls: "ok",
      lbl: "Total recaudado en el período",
      val: DataHelper.formatCOP(totalRec),
    },
  ];

  var checksHtml = checks.map(function(ch) {
    return '<div class="check-row">' +
      '<div class="check-ico ' + ch.cls + '">' + ch.ico + '</div>' +
      '<span class="check-lbl">' + ch.lbl + '</span>' +
      '<span class="check-val">' + ch.val + '</span>' +
    '</div>';
  }).join("");

  // Lista de pendientes/mora
  var listaHTML = "";
  var pendConMora = pendientes.concat(mora);
  if (pendConMora.length) {
    listaHTML = '<div style="margin-top:20px;">' +
      '<div style="font-size:12px;font-weight:700;text-transform:uppercase;' +
        'letter-spacing:.6px;color:var(--text-muted);margin-bottom:10px;">Socios con pagos pendientes</div>' +
      pendConMora.map(function(a) {
        var esMora = ["mora","vencido"].includes(a.estado);
        return '<div class="pend-row">' +
          '<div class="pend-dot ' + (esMora?"mora":"pend") + '"></div>' +
          '<span class="pend-nombre">' + DataHelper.getSocioNombre(a.socio_id) + '</span>' +
          '<span class="pend-per">' + a.periodo + '</span>' +
          '<span class="pend-monto" style="color:' + (esMora?"var(--red-600)":"var(--amber-600)") + ';">' +
            DataHelper.formatCOP(a.monto) +
          '</span>' +
          DataHelper.estadoPill(a.estado) +
        '</div>';
      }).join("") +
    '</div>';
  }

  var avisoHTML = todosBien
    ? '<div style="background:var(--green-50);border:1px solid var(--green-100);border-radius:var(--r-md);' +
        'padding:14px;font-size:13px;color:var(--green-700);margin-top:16px;">' +
        '✓ Todos los aportes del período están pagados. Puedes proceder al cierre.' +
      '</div>'
    : '<div style="background:var(--amber-50);border:1px solid var(--amber-100);border-radius:var(--r-md);' +
        'padding:14px;font-size:13px;color:var(--amber-700);margin-top:16px;">' +
        '⚠ Hay aportes pendientes. Puedes continuar el cierre, pero quedarán registrados como no cobrados.' +
      '</div>';

  document.getElementById("pasoBody").innerHTML =
    '<div style="margin-bottom:16px;font-size:14px;color:var(--text-secondary);">' +
      'Verificando el estado de todos los aportes del período <strong>' + periodo + '</strong>.' +
    '</div>' +
    checksHtml + listaHTML + avisoHTML;
}

/* ═══════════════════════════════════════════════════════════
   PASO 2 — CALCULAR SALDOS
═══════════════════════════════════════════════════════════ */
function renderPaso2() {
  var periodo  = DB.config.periodo_actual;
  var aportes  = DB.aportes.filter(function(a){ return a.periodo === periodo; });
  var pagados  = aportes.filter(function(a){ return a.estado === "pagado"; });
  var totalAp  = pagados.reduce(function(t,a){ return t+a.monto; },0);
  var intereses= DB.creditos.filter(function(c){ return c.estado==="activo"||c.estado==="mora"; })
    .reduce(function(t,c){
      return t + Math.round(c.saldo_capital * c.tasa_mensual / 100);
    }, 0);
  var totalIng = totalAp + intereses;
  var totalAhorros = DataHelper.getTotalAhorros();
  var totalCartera = DataHelper.getTotalCartera();
  var saldoSol     = DB.solidaridad ? DB.solidaridad.saldo_actual : 0;
  var creditosActivos = DB.creditos.filter(function(c){ return c.estado!=="pagado"; }).length;

  datosCalculo = {
    periodo, totalAp, intereses, totalIng,
    totalAhorros, totalCartera, saldoSol, creditosActivos,
    fecha: new Date().toISOString().split("T")[0],
  };

  var grid4 = function(items) {
    return '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;">' +
      items.map(function(it) {
        return '<div class="cifra-card">' +
          '<div class="cifra-lbl">' + it.l + '</div>' +
          '<div class="cifra-val ' + it.c + '">' + it.v + '</div>' +
        '</div>';
      }).join("") +
    '</div>';
  };

  document.getElementById("pasoBody").innerHTML =
    '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:20px;">' +
      'Calculando el balance del período <strong>' + periodo + '</strong>.' +
    '</div>' +

    '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:8px;">Ingresos del período</div>' +
    grid4([
      { l:"Aportes cobrados",       v:DataHelper.formatCOP(totalAp),    c:"green" },
      { l:"Intereses de créditos",  v:DataHelper.formatCOP(intereses),  c:"navy" },
      { l:"Total ingresos",         v:DataHelper.formatCOP(totalIng),   c:"gold" },
      { l:"Socios con pago puntual",v:pagados.length+" socios",         c:"navy" },
    ]) +

    '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:8px;">Balance del fondo</div>' +
    grid4([
      { l:"Ahorro total socios",    v:DataHelper.formatCOP(totalAhorros), c:"green" },
      { l:"Cartera de créditos",    v:DataHelper.formatCOP(totalCartera), c:"navy" },
      { l:"Fondo solidaridad",      v:DataHelper.formatCOP(saldoSol),     c:"gold" },
      { l:"Créditos activos",       v:creditosActivos+" créditos",        c:"navy" },
    ]) +

    '<div style="background:var(--green-50);border:1px solid var(--green-100);border-radius:var(--r-md);' +
      'padding:14px 16px;font-size:13px;color:var(--green-700);">' +
      '✓ Cálculos completados. Los saldos están actualizados al ' +
      new Date().toLocaleDateString("es-CO",{day:"2-digit",month:"long",year:"numeric"}) + '.' +
    '</div>';
}

/* ═══════════════════════════════════════════════════════════
   PASO 3 — GENERAR PDF DE CIERRE
═══════════════════════════════════════════════════════════ */
function renderPaso3() {
  pdfGenerado = false;
  document.getElementById("pasoBody").innerHTML =
    '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:20px;">' +
      'Genera el reporte oficial de cierre del período <strong>' + DB.config.periodo_actual + '</strong>.' +
    '</div>' +
    '<div class="pdf-box" id="pdfBox">' +
      '<div class="pdf-icon">📄</div>' +
      '<div style="font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:6px;">Reporte de cierre pendiente</div>' +
      '<div style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">' +
        'Incluye resumen de aportes, balance del fondo, créditos activos y resumen contable.' +
      '</div>' +
      '<button class="btn btn-primary" onclick="generarPDF()" id="btnGenPDF">📄 Generar PDF de cierre</button>' +
    '</div>';
}

function generarPDF() {
  var btn = document.getElementById("btnGenPDF");
  btn.textContent = "Generando..."; btn.disabled = true;

  setTimeout(function() {
    try {
      var { jsPDF } = window.jspdf;
      var doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
      var d   = datosCalculo || {};
      var periodo = DB.config.periodo_actual;
      var hoy = new Date().toLocaleDateString("es-CO",{day:"2-digit",month:"long",year:"numeric"});

      // ── Encabezado ──────────────────────────────────────
      doc.setFillColor(15,45,82);
      doc.rect(0,0,210,30,"F");
      doc.setTextColor(255,255,255);
      doc.setFont("helvetica","bold");
      doc.setFontSize(18);
      doc.text("FONEVI", 14, 14);
      doc.setFontSize(9);
      doc.setFont("helvetica","normal");
      doc.text(DB.config.nombre_completo, 14, 20);
      doc.text("NIT: " + DB.config.nit, 14, 25);
      doc.setFontSize(11); doc.setFont("helvetica","bold");
      doc.text("REPORTE DE CIERRE DE PERÍODO", 210-14, 14, {align:"right"});
      doc.setFontSize(9); doc.setFont("helvetica","normal");
      doc.text("Período: " + periodo, 210-14, 20, {align:"right"});
      doc.text("Fecha: " + hoy, 210-14, 25, {align:"right"});

      // Línea dorada
      doc.setDrawColor(201,146,42); doc.setLineWidth(1.5);
      doc.line(0, 30, 210, 30);

      // ── Sección 1: Aportes ──────────────────────────────
      var y = 40;
      seccion(doc, "1. RESUMEN DE APORTES — " + periodo, y);
      y += 10;
      var aportesPer = DB.aportes.filter(function(a){ return a.periodo===periodo; });
      var pag = aportesPer.filter(function(a){ return a.estado==="pagado"; });
      var pen = aportesPer.filter(function(a){ return a.estado==="pendiente"; });
      var mor = aportesPer.filter(function(a){ return ["mora","vencido"].includes(a.estado); });
      var filaAp = [
        ["Total socios en período", aportesPer.length+""],
        ["Pagados",   pag.length+""],
        ["Pendientes",pen.length+""],
        ["En mora",   mor.length+""],
        ["Total recaudado", DataHelper.formatCOP(pag.reduce(function(t,a){return t+a.monto;},0))],
      ];
      y = tablaSimple(doc, filaAp, y);

      // ── Sección 2: Balance ──────────────────────────────
      y += 6;
      seccion(doc, "2. BALANCE DEL FONDO", y); y += 10;
      var filasBal = [
        ["Ahorro total socios",   DataHelper.formatCOP(d.totalAhorros||0)],
        ["Cartera de créditos",   DataHelper.formatCOP(d.totalCartera||0)],
        ["Fondo de solidaridad",  DataHelper.formatCOP(d.saldoSol||0)],
        ["Ingresos del período",  DataHelper.formatCOP(d.totalIng||0)],
        ["  - Aportes cobrados",  DataHelper.formatCOP(d.totalAp||0)],
        ["  - Intereses",         DataHelper.formatCOP(d.intereses||0)],
        ["Créditos activos",      (d.creditosActivos||0)+" créditos"],
      ];
      y = tablaSimple(doc, filasBal, y);

      // ── Sección 3: Créditos activos ─────────────────────
      y += 6;
      seccion(doc, "3. CRÉDITOS ACTIVOS", y); y += 10;
      var activos = DB.creditos.filter(function(c){return c.estado!=="pagado";});
      if (y > 230) { doc.addPage(); y = 20; }
      activos.slice(0,10).forEach(function(c) {
        doc.setFontSize(8); doc.setTextColor(80);
        doc.text("#" + c.id + "  " + DataHelper.getSocioNombre(c.socio_id) +
          "  Saldo: " + DataHelper.formatCOP(c.saldo_capital) +
          "  Cuotas: " + c.cuotas_pagadas + "/" + c.cuotas, 14, y);
        y += 6;
      });

      // ── Firma ───────────────────────────────────────────
      y = Math.max(y + 16, 240);
      doc.setTextColor(60); doc.setFontSize(9);
      doc.line(14, y, 80, y); doc.line(125, y, 195, y);
      y += 5;
      doc.text("Tesorero(a) del Fondo", 14, y);
      doc.text("Representante Legal", 125, y);

      // ── Pie ─────────────────────────────────────────────
      doc.setFontSize(7); doc.setTextColor(140);
      doc.text(DB.config.nombre_completo + " | NIT: " + DB.config.nit, 14, 287);
      doc.text("Generado: " + hoy + " — FONEVI v2.0", 210-14, 287, {align:"right"});

      doc.save("FONEVI_Cierre_" + periodo.replace(/ /g,"_") + ".pdf");
      pdfGenerado = true;

      document.getElementById("pdfBox").className = "pdf-box ready";
      document.getElementById("pdfBox").innerHTML =
        '<div class="pdf-icon">✅</div>' +
        '<div style="font-size:15px;font-weight:600;color:var(--green-700);margin-bottom:6px;">PDF generado correctamente</div>' +
        '<div style="font-size:13px;color:var(--green-600);">FONEVI_Cierre_' + periodo.replace(/ /g,"_") + '.pdf</div>' +
        '<button class="btn btn-secondary btn-sm" style="margin-top:12px;" onclick="generarPDF()">↻ Regenerar</button>';

      Toast.success("✓ PDF de cierre generado.");
    } catch(e) {
      console.error(e);
      Toast.warn("No se pudo generar el PDF. Asegúrate de que jsPDF esté cargado.");
      pdfGenerado = true; // Permitir continuar de todos modos
      btn.textContent = "📄 Generar PDF"; btn.disabled = false;
    }
  }, 600);
}

function seccion(doc, titulo, y) {
  doc.setFillColor(240,245,255); doc.rect(10, y-5, 190, 9, "F");
  doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(15,45,82);
  doc.text(titulo, 14, y);
  doc.setFont("helvetica","normal"); doc.setTextColor(60);
}

function tablaSimple(doc, filas, y) {
  filas.forEach(function(f) {
    doc.setFontSize(8.5); doc.setTextColor(60);
    doc.text(f[0], 18, y);
    doc.text(f[1]||"", 140, y, {align:"right"});
    y += 6;
  });
  return y;
}

/* ═══════════════════════════════════════════════════════════
   PASO 4 — ARCHIVAR Y CREAR SIGUIENTE PERÍODO
═══════════════════════════════════════════════════════════ */
function renderPaso4() {

  var siguiente = calcularSiguientePeriodo(actual);

    '<span style="font-size:12.5px;color:var(--text-secondary);">' + txt + '</span>' +
  '</div>';
}

/* ═══════════════════════════════════════════════════════════
   EJECUTAR CIERRE REAL
═══════════════════════════════════════════════════════════ */
async function ejecutarCierre() {
  var actual    = DB.config.periodo_actual;
  var siguiente = calcularSiguientePeriodo(actual);

  var btn = document.getElementById("btnSiguiente");
  btn.textContent = "Procesando..."; btn.disabled = true;

  try {
    // 1. Marcar pendientes del período como vencidos
    const vencidos = DB.aportes.filter(a => a.periodo === actual && a.estado === "pendiente");
    for (const a of vencidos) {
      await API.aportes.actualizarEstado(a.id, "vencido");
    }

    // 2. Registrar movimiento contable del cierre
    if (datosCalculo && datosCalculo.totalAp > 0) {
      await API.movimientos.crear({
        tipo:        "ingreso",
        categoria:   "Aportes",
        descripcion: "Cierre período " + actual + " — Aportes recaudados",
        monto:       datosCalculo.totalAp,
        fecha:       new Date().toISOString().split("T")[0],
      });
    }

    // 3. Actualizar período activo
    await API.config.actualizar("periodo_actual", siguiente);

    // 4. Sincronizar datos locales
    await window.DataSync?.init();

    btn.textContent = "✓ Cerrado";

    // Mostrar pantalla de éxito
    document.getElementById("pasoBody").innerHTML =
      '<div style="text-align:center;padding:32px 20px;">' +
        '<div style="font-size:56px;margin-bottom:16px;">🎉</div>' +
        '<div style="font-size:20px;font-weight:700;color:var(--green-700);margin-bottom:8px;">' +
          'Período cerrado exitosamente' +
        '</div>' +
        '<div style="font-size:14px;color:var(--text-secondary);margin-bottom:24px;">' +
          '<strong>' + actual + '</strong> archivado. Nuevo período activo: <strong>' + siguiente + '</strong>' +
        '</div>' +
        '<div style="display:flex;gap:12px;justify-content:center;">' +
          '<a href="aportes.html" class="btn btn-primary">Ir a Aportes →</a>' +
          '<a href="dashboard.html" class="btn btn-secondary">← Dashboard</a>' +
        '</div>' +
      '</div>';

    document.getElementById("btnSiguiente").style.display = "none";
    document.getElementById("btnAnterior").style.display  = "none";
    Toast.success("✓ Período " + actual + " cerrado. Nuevo período: " + siguiente);
  } catch(e) {
    Toast.error("Error al procesar cierre.");
    btn.textContent = "✓ Confirmar y cerrar período"; btn.disabled = false;
  }
}

/* ═══════════════════════════════════════════════════════════
   UTILIDADES
═══════════════════════════════════════════════════════════ */
function calcularSiguientePeriodo(actual) {
  var partes = actual.split(" ");
  var mi     = MESES.indexOf(partes[0]);
  var anio   = parseInt(partes[partes.length-1]);
  if (mi === 11) { mi = 0; anio++; }
  else            { mi++; }
  return MESES[mi] + " " + anio;
}
