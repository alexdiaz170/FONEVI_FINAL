<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FONEVI — Notificaciones</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <!-- Favicon + PWA -->
  <link rel="icon"             href="../favicon.svg"            type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-32x32.svg"   sizes="32x32" type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-16x16.svg"   sizes="16x16" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="../icons/icon-180x180.svg" sizes="180x180"/>
  <link rel="apple-touch-icon" href="../icons/icon-152x152.svg" sizes="152x152"/>
  <link rel="manifest"         href="../manifest.json"/>
  <meta name="mobile-web-app-capable"                content="yes"/>
  <meta name="apple-mobile-web-app-capable"          content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title"            content="FONEVI"/>
  <meta name="theme-color"                           content="#0f2d52"/>
  <link rel="stylesheet" href="../css/transitions.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
  <link rel="stylesheet" href="../css/loading.css"/>
<style>
  /* ── Tarjetas de acción con glow al hover ─────────── */
  .accion-hover {
    background: var(--bg-surface);
    border: 1px solid var(--border-faint);
    border-radius: var(--r-lg);
    cursor: pointer;
    transition: all var(--t-base) var(--ease);
    position: relative; overflow: hidden;
  }
  .accion-hover::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    border-radius: var(--r-lg) var(--r-lg) 0 0;
    opacity:0; transition:opacity .25s;
    background: linear-gradient(90deg,var(--navy-400),var(--gold-500));
  }
  .accion-hover::after {
    content:''; position:absolute; inset:0; border-radius:var(--r-lg);
    opacity:0; transition:opacity .25s; pointer-events:none;
    background: radial-gradient(ellipse 80% 60% at 50% 0%,rgba(15,45,82,.10) 0%,transparent 100%);
  }
  .accion-hover:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(15,45,82,.13);
    border-color: var(--border-medium);
  }
  .accion-hover:hover::before { opacity:1; }
  .accion-hover:hover::after  { opacity:1; }
  .accion-hover > * { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="page-content">

      <div class="page-header">
        <h1>Notificaciones</h1>
        <p>Alertas, recordatorios y avisos del sistema FONEVI</p>
      </div>

      <!-- KPIs -->
      <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr); margin-bottom:22px;" id="kpiNotif"></div>

      <!-- Tabs -->
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px;">
        <div class="tab-bar" id="notifTabs">
          <button class="tab-btn active" data-tab="todas">Todas</button>
          <button class="tab-btn" data-tab="noleidas">No leídas</button>
          <button class="tab-btn" data-tab="urgentes">Urgentes</button>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-secondary btn-sm" onclick="marcarTodasLeidas()">✓ Marcar todas como leídas</button>
          <button class="btn btn-primary btn-sm" onclick="Modal.open('modalNuevaNotif')" data-role-staff>
            + Nueva Notificación
          </button>
        </div>
      </div>

      <!-- Lista de notificaciones -->
      <div id="listaNotif"></div>

      <!-- Sección envío masivo -->
      <div class="card" style="margin-top:20px;" data-role-staff>
        <div class="card-header">
          <span class="card-title">Envío Masivo de Recordatorios</span>
        </div>
        <div class="card-body">
          <div class="grid-3">
            <div class="accion-hover" style="text-align:center; padding:18px;"
              onclick="enviarMasivo('mora')">
              <div style="font-size:26px; margin-bottom:8px;">📧</div>
              <div style="font-size:13px; font-weight:500;">Recordatorio de mora</div>
              <div style="font-size:11px; color:var(--muted); margin-top:4px;">Avisa a socios en mora</div>
              <button class="btn btn-danger btn-sm" style="margin-top:12px;">Enviar a 6 socios</button>
            </div>
            <div class="accion-hover" style="text-align:center; padding:18px;"
              onclick="enviarMasivo('pago')">
              <div style="font-size:26px; margin-bottom:8px;">💬</div>
              <div style="font-size:13px; font-weight:500;">Recordatorio de pago</div>
              <div style="font-size:11px; color:var(--muted); margin-top:4px;">Mes vigente sin pagar</div>
              <button class="btn btn-gold btn-sm" style="margin-top:12px;">Enviar a 18 socios</button>
            </div>
            <div class="accion-hover" style="text-align:center; padding:18px;"
              onclick="enviarMasivo('cierre')">
              <div style="font-size:26px; margin-bottom:8px;">📅</div>
              <div style="font-size:13px; font-weight:500;">Aviso de cierre</div>
              <div style="font-size:11px; color:var(--muted); margin-top:4px;">Cierre de período</div>
              <button class="btn btn-primary btn-sm" style="margin-top:12px;">Enviar a todos</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal Nueva Notificación -->
<div class="modal-overlay" id="modalNuevaNotif">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nueva Notificación</span>
      <button class="modal-close" onclick="Modal.close('modalNuevaNotif')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid cols-1">
        <div class="form-group">
          <label class="form-label">Tipo</label>
          <select class="form-control" id="nn-tipo">
            <option value="mora">Mora</option>
            <option value="aporte">Aporte</option>
            <option value="credito">Crédito</option>
            <option value="solicitud">Solicitud</option>
            <option value="general">General</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Título</label>
          <input type="text" class="form-control" id="nn-titulo" placeholder="Título de la notificación" />
        </div>
        <div class="form-group">
          <label class="form-label">Mensaje</label>
          <textarea class="form-control" id="nn-mensaje" rows="3" placeholder="Describe el mensaje..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">¿Es urgente?</label>
          <select class="form-control" id="nn-urgente">
            <option value="false">No</option>
            <option value="true">Sí — mostrar como alerta</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modalNuevaNotif')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarNotificacion()">Crear Notificación</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>


<script src="../js/darkmode.js"></script>
<script src="../js/transitions.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/roles.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script src="../js/search.js"></script>
<script>
var filtroNotif = "todas";

document.addEventListener("DOMContentLoaded", () => {
  if (!Roles.proteger("notificaciones")) return;
  buildLayout("Notificaciones", DataHelper.getNotificacionesNoLeidas() + " sin leer", "");
  renderKPIs();
  renderNotificaciones("todas");
  initTabs("notifTabs", (tab) => { filtroNotif = tab; renderNotificaciones(tab); });
});

const TIPO_CONFIG = {
  mora:      { cls: "danger", icon: "🔴", label: "Mora" },
  aporte:    { cls: "success", icon: "🟢", label: "Aporte" },
  credito:   { cls: "warn",   icon: "🟡", label: "Crédito" },
  solicitud: { cls: "info",   icon: "🔵", label: "Solicitud" },
  general:   { cls: "info",   icon: "ℹ️", label: "General" }
};

function renderKPIs() {
  const total    = DB.notificaciones.length;
  const noLeidas = DB.notificaciones.filter(n => !n.leida).length;
  const urgentes = DB.notificaciones.filter(n => n.urgente && !n.leida).length;

  document.getElementById("kpiNotif").innerHTML = `
    <div class="kpi-card blue">
      <div class="kpi-label">Total</div>
      <div class="kpi-value">${total}</div>
      <div class="kpi-bg-icon">🔔</div>
    </div>
    <div class="kpi-card gold">
      <div class="kpi-label">Sin leer</div>
      <div class="kpi-value">${noLeidas}</div>
      <div class="kpi-bg-icon">📬</div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-label">Urgentes sin leer</div>
      <div class="kpi-value">${urgentes}</div>
      <div class="kpi-bg-icon">⚠</div>
    </div>
  `;
}

function renderNotificaciones(filtro) {
  let lista = DB.notificaciones.slice().reverse();
  if (filtro === "noleidas") lista = lista.filter(n => !n.leida);
  if (filtro === "urgentes") lista = lista.filter(n => n.urgente);

  if (!lista.length) {
    document.getElementById("listaNotif").innerHTML = `
      <div class="card">
        <div style="padding:40px; text-align:center; color:var(--muted);">
          <div style="font-size:32px; margin-bottom:10px;">✅</div>
          <div>Sin notificaciones en esta categoría.</div>
        </div>
      </div>`;
    return;
  }

  document.getElementById("listaNotif").innerHTML = `
    <div class="card">
      ${lista.map(n => {
        const cfg = TIPO_CONFIG[n.tipo] || TIPO_CONFIG.general;
        return `
          <div style="display:flex; gap:14px; padding:16px 20px; border-bottom:0.5px solid var(--border);
            background:${!n.leida ? 'var(--surface2)' : 'transparent'}; cursor:pointer;"
            onclick="marcarLeida('${n.id}', this)">
            <div style="font-size:22px; flex-shrink:0; margin-top:2px;">${cfg.icon}</div>
            <div style="flex:1;">
              <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
                <span style="font-size:13px; font-weight:${n.leida ? '400' : '500'};">${n.titulo}</span>
                ${n.urgente ? '<span class="pill pill-red" style="font-size:10px;">Urgente</span>' : ''}
                ${!n.leida   ? '<span class="pill pill-navy" style="font-size:10px;">Nuevo</span>'  : ''}
              </div>
              <div style="font-size:12px; color:var(--muted);">${n.mensaje}</div>
            </div>
            <div style="text-align:right; flex-shrink:0;">
              <div style="font-size:11px; color:var(--muted);">${DataHelper.formatFecha(n.fecha)}</div>
              <span class="pill pill-${cfg.cls === 'danger' ? 'red' : cfg.cls === 'success' ? 'green' : cfg.cls === 'warn' ? 'amber' : 'blue'}"
                style="font-size:10px; margin-top:4px; display:inline-block;">${cfg.label}</span>
            </div>
          </div>
        `;
      }).join("")}
    </div>`;
}

function marcarLeida(id, el) {
  const n = DB.notificaciones.find(x => x.id === id);
  if (n && !n.leida) {
    n.leida = true;
    el.style.background = "transparent";
    el.querySelector("span.pill-navy")?.remove();
    renderKPIs();
  }
}

function marcarTodasLeidas() {
  DB.notificaciones.forEach(n => n.leida = true);
  renderKPIs();
  renderNotificaciones(filtroNotif);
  Toast.success("Todas las notificaciones marcadas como leídas.");
}

function guardarNotificacion() {
  const titulo  = document.getElementById("nn-titulo").value.trim();
  const mensaje = document.getElementById("nn-mensaje").value.trim();
  if (!titulo || !mensaje) { Toast.warn("Completa título y mensaje."); return; }

  DB.notificaciones.push({
    id: "N" + String(DB.notificaciones.length + 1).padStart(3, "0"),
    tipo:    document.getElementById("nn-tipo").value,
    titulo,
    mensaje,
    fecha:   new Date().toISOString().split("T")[0],
    leida:   false,
    urgente: document.getElementById("nn-urgente").value === "true"
  });
  Modal.close("modalNuevaNotif");
  renderKPIs();
  renderNotificaciones(filtroNotif);
  Toast.success("Notificación creada correctamente.");
}

function enviarMasivo(tipo) {
  const msgs = {
    mora:   "Recordatorio de mora enviado a 6 socios por email.",
    pago:   "Recordatorio de pago enviado a 18 socios pendientes.",
    cierre: "Aviso de cierre de período enviado a todos los socios."
  };
  Toast.success(msgs[tipo] || "Notificación enviada.");
}
</script>
</body>
</html>
