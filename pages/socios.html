<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FONEVI — Socios</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/loading.css"/>
  <link rel="stylesheet" href="../css/transitions.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
  <link rel="icon"             href="../favicon.svg"           type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-32x32.svg"  sizes="32x32" type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-16x16.svg"  sizes="16x16" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="../icons/icon-180x180.svg" sizes="180x180"/>
  <link rel="manifest"         href="../manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#0f2d52"/>

  <style>
    /* ── Zona de drop ──────────────────────────────────────── */
    .drop-zone {
      border: 2.5px dashed var(--border-medium);
      border-radius: var(--r-xl);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: all .2s ease;
      background: var(--bg-subtle);
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--gold-400);
      background: var(--gold-50);
    }
    .drop-zone.dragover { transform: scale(1.01); }
    .drop-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .dz-icon  { font-size: 40px; margin-bottom: 12px; }
    .dz-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .dz-sub   { font-size: 13px; color: var(--text-muted); }
    .dz-hint  { font-size: 11px; color: var(--text-faint); margin-top: 8px; }

    /* ── Pasos del wizard ──────────────────────────────────── */
    .wizard-steps {
      display: flex; align-items: center; gap: 0;
      margin-bottom: 28px;
    }
    .ws-step {
      display: flex; align-items: center; gap: 8px;
      font-size: 12.5px; font-weight: 600;
      color: var(--text-faint);
    }
    .ws-step.active { color: var(--navy-700); }
    .ws-step.done   { color: var(--green-500); }
    .ws-num {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      background: var(--bg-muted); color: var(--text-faint);
      border: 2px solid var(--border-light);
    }
    .ws-step.active .ws-num {
      background: var(--navy-800); color: #fff; border-color: var(--navy-800);
    }
    .ws-step.done .ws-num {
      background: var(--green-500); color: #fff; border-color: var(--green-500);
    }
    .ws-line {
      flex: 1; height: 2px; background: var(--border-faint);
      margin: 0 8px; min-width: 20px;
    }
    .ws-line.done { background: var(--green-200); }

    /* ── Tabla de mapeo de columnas ────────────────────────── */
    .map-table { width: 100%; border-collapse: collapse; }
    .map-table th, .map-table td {
      padding: 10px 14px; text-align: left;
      border-bottom: 1px solid var(--border-faint); font-size: 13px;
    }
    .map-table th { font-size: 10.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-muted); }
    .map-table tr:last-child td { border-bottom: none; }
    .map-req { color: var(--red-500); font-size: 10px; margin-left: 3px; }

    /* ── Preview de filas ──────────────────────────────────── */
    .preview-wrap { max-height: 280px; overflow-y: auto; margin-top: 12px; }

    /* ── Badges de validación ──────────────────────────────── */
    .val-ok  { color: var(--green-500); font-size: 14px; }
    .val-err { color: var(--red-500);   font-size: 14px; }
    .val-warn{ color: var(--amber-500); font-size: 14px; }

    /* ── Resultado de importación ──────────────────────────── */
    .import-result {
      border-radius: var(--r-lg); padding: 20px 24px;
      text-align: center;
    }
    .import-result.ok  { background: var(--green-50); border: 1px solid var(--green-100); }
    .import-result.err { background: var(--red-50);   border: 1px solid var(--red-100); }
    .ir-num  { font-family: var(--font-display); font-size: 40px; font-weight: 400; line-height: 1; }
    .ir-ok   { color: var(--green-600); }
    .ir-err  { color: var(--red-500); }
    .ir-lbl  { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ── Columna de mapeo select ───────────────────────────── */
    .map-select {
      padding: 6px 10px; border: 1.5px solid var(--border-light);
      border-radius: var(--r-sm); font-size: 12.5px;
      font-family: var(--font-body); background: var(--bg-subtle);
      color: var(--text-primary); outline: none; width: 100%;
    }
    .map-select:focus { border-color: var(--gold-500); box-shadow: var(--glow-gold); }

    /* ── Template card ─────────────────────────────────────── */
    .template-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; border-radius: var(--r-lg);
      border: 1.5px solid var(--border-light);
      background: var(--bg-subtle);
      transition: all .15s ease; cursor: pointer;
    }
    .template-card:hover {
      border-color: var(--green-300); background: var(--green-50);
      box-shadow: var(--shadow-sm);
    }
    .tc-icon { font-size: 28px; flex-shrink: 0; }
    .tc-title{ font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
    .tc-sub  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Error row ─────────────────────────────────────────── */
    .err-row { background: var(--red-50) !important; }
  </style>
</head>

<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="page-content">

      <!-- Filtros y búsqueda -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
        <div class="tab-bar" id="filtroEstado">
          <button class="tab-btn active" data-tab="todos">Todos</button>
          <button class="tab-btn" data-tab="activo">Activos</button>
          <button class="tab-btn" data-tab="mora">En mora</button>
          <button class="tab-btn" data-tab="pendiente">Pendientes</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchSocio" placeholder="Buscar socio..."/>
          </div>
          <button class="btn btn-secondary" onclick="Modal.open('modalImportar')" title="Importar desde Excel">
            📥 Importar Excel
          </button>
          <button class="btn btn-primary" onclick="Modal.open('modalNuevoSocio')">
            + Nuevo Socio
          </button>
        </div>
      </div>

      <!-- Contador -->
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;" id="contadorSocios"></div>

      <!-- Tabla -->
      <div class="card">
        <table class="data-table table-animated" id="tablaSocios">
          <thead>
            <tr>
              <th>ID</th><th>Nombre</th><th>Documento</th>
              <th>Aporte mensual</th><th>Ahorro acum.</th>
              <th>Créditos</th><th>Estado</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody id="sociosTbody"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODAL IMPORTAR EXCEL
═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modalImportar">
  <div class="modal" style="max-width:700px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;">
    <div class="modal-header" style="flex-shrink:0;">
      <span class="modal-title">📥 Importar socios desde Excel</span>
      <button class="modal-close" onclick="cerrarImportar()">×</button>
    </div>

    <div class="modal-body" style="flex:1;overflow-y:auto;" id="importBody">
      <!-- Contenido dinámico por paso -->
    </div>

    <div class="modal-footer" style="flex-shrink:0;" id="importFooter">
      <!-- Botones dinámicos por paso -->
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODAL NUEVO SOCIO
═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modalNuevoSocio">
  <div class="modal" style="max-width:540px;">
    <div class="modal-header">
      <span class="modal-title">Nuevo Socio</span>
      <button class="modal-close" onclick="Modal.close('modalNuevoSocio')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group form-full">
          <label class="form-label">Nombre completo <span class="map-req">*</span></label>
          <input type="text" class="form-control" id="ns-nombre" placeholder="Juan Pérez García"/>
        </div>
        <div class="form-group">
          <label class="form-label">Documento <span class="map-req">*</span></label>
          <input type="text" class="form-control" id="ns-doc" placeholder="Sin puntos"/>
        </div>
        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="ns-email" placeholder="correo@edu.co"/>
        </div>
        <div class="form-group">
          <label class="form-label">Teléfono</label>
          <input type="tel" class="form-control" id="ns-tel" placeholder="3001234567"/>
        </div>
        <div class="form-group">
          <label class="form-label">Cargo</label>
          <input type="text" class="form-control" id="ns-cargo" placeholder="Docente de Matemáticas"/>
        </div>
        <div class="form-group">
          <label class="form-label">Sede</label>
          <select class="form-control" id="ns-sede">
            <option>Sede Central</option>
            <option>Sede Norte</option>
            <option>Sede Sur</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Fecha de ingreso</label>
          <input type="date" class="form-control" id="ns-fecha"/>
        </div>
        <div class="form-group">
          <label class="form-label">Aporte mensual ($)</label>
          <input type="number" class="form-control" id="ns-aporte" value="120000" min="120000" step="10000"/>
          <span class="form-hint">Mínimo $120.000</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modalNuevoSocio')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarNuevoSocio()">Guardar Socio</button>
    </div>
  </div>
</div>

<!-- Modal Perfil rápido -->
<div class="modal-overlay" id="modalPerfil">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Perfil del Socio</span>
      <button class="modal-close" onclick="Modal.close('modalPerfil')">×</button>
    </div>
    <div class="modal-body" id="modalPerfilBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modalPerfil')">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../js/darkmode.js"></script>
<script src="../js/transitions.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/roles.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script src="../js/search.js"></script>
<script src="../js/loading.js"></script>
<script src="../js/export.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════
   TABLA DE SOCIOS
═══════════════════════════════════════════════════════════ */
var filtroActual = "todos";

document.addEventListener("DOMContentLoaded", function() {
  if (!Roles.proteger("socios")) return;
  buildLayout("Socios", "Gestión de miembros del fondo", "");
  renderTabla();
  filterTable("searchSocio", "tablaSocios");
  initTabs("filtroEstado", function(tab) { filtroActual = tab; renderTabla(); });
  document.getElementById("ns-fecha").value = new Date().toISOString().split("T")[0];
});

function renderTabla() {
  var socios = DB.socios;
  if (filtroActual !== "todos") {
    socios = socios.filter(function(s) { return s.estado === filtroActual; });
  }

  document.getElementById("contadorSocios").textContent =
    socios.length + " socio" + (socios.length !== 1 ? "s" : "") +
    (filtroActual !== "todos" ? " · filtro: " + filtroActual : "") +
    " · Total DB: " + DB.socios.length;

  document.getElementById("sociosTbody").innerHTML = socios.map(function(s) {
    var creds = DataHelper.getCreditosSocio(s.id).filter(function(c) { return c.estado !== "pagado"; });
    return "<tr>" +
      "<td class='mono muted'>" + s.id + "</td>" +
      "<td><strong style='font-weight:500;'>" + s.nombre + "</strong></td>" +
      "<td class='muted'>" + (s.documento || "—") + "</td>" +
      "<td>" + DataHelper.formatCOP(s.aporte_mensual) + "</td>" +
      "<td style='font-weight:500;'>" + DataHelper.formatCOP(s.ahorro_acumulado) + "</td>" +
      "<td>" + (creds.length > 0
        ? "<span class='pill pill-amber'>" + creds.length + " activo" + (creds.length > 1 ? "s" : "") + "</span>"
        : "<span class='muted'>—</span>") + "</td>" +
      "<td>" + DataHelper.estadoPill(s.estado) + "</td>" +
      "<td><a href='perfil.html?id=" + s.id + "' class='btn btn-secondary btn-sm'>Ver perfil</a></td>" +
    "</tr>";
  }).join("");
}

function guardarNuevoSocio() {
  var nombre = document.getElementById("ns-nombre").value.trim();
  var doc    = document.getElementById("ns-doc").value.trim();
  if (!nombre || !doc) { Toast.warn("Nombre y documento son obligatorios."); return; }

  var nuevo = {
    id: "S" + String(DB.socios.length + 1).padStart(3, "0"),
    nombre, documento: doc,
    email:    document.getElementById("ns-email").value.trim(),
    telefono: document.getElementById("ns-tel").value.trim(),
    fecha_ingreso: document.getElementById("ns-fecha").value,
    aporte_mensual: parseInt(document.getElementById("ns-aporte").value) || 120000,
    ahorro_acumulado: 0, estado: "activo",
    cargo: document.getElementById("ns-cargo").value.trim(),
    sede:  document.getElementById("ns-sede").value,
  };
  DB.socios.push(nuevo);
  Modal.close("modalNuevoSocio");
  renderTabla();
  Toast.success("✓ Socio " + nombre + " registrado.");
}

/* ═══════════════════════════════════════════════════════════
   IMPORTADOR DE EXCEL — WIZARD 3 PASOS
   Paso 1: Subir archivo
   Paso 2: Mapear columnas + Preview
   Paso 3: Resultado
═══════════════════════════════════════════════════════════ */

/* Campos del sistema FONEVI */
var CAMPOS_SISTEMA = [
  { key:"nombre",           label:"Nombre completo",   req:true  },
  { key:"documento",        label:"Documento",          req:true  },
  { key:"email",            label:"Correo electrónico", req:false },
  { key:"telefono",         label:"Teléfono",           req:false },
  { key:"cargo",            label:"Cargo",              req:false },
  { key:"sede",             label:"Sede",               req:false },
  { key:"fecha_ingreso",    label:"Fecha de ingreso",   req:false },
  { key:"aporte_mensual",   label:"Aporte mensual ($)", req:false },
  { key:"ahorro_acumulado", label:"Ahorro acumulado ($)",req:false},
  { key:"estado",           label:"Estado",             req:false },
];

var importState = {
  paso:       1,
  headers:    [],   // cabeceras del Excel
  filas:      [],   // filas de datos (arrays)
  mapeo:      {},   // { campo_sistema: indice_columna_excel }
  resultado:  null, // { ok, errores, total }
};

function cerrarImportar() {
  Modal.close("modalImportar");
  importState = { paso:1, headers:[], filas:[], mapeo:{}, resultado:null };
}

function renderPasoImportar() {
  var paso = importState.paso;
  var body = document.getElementById("importBody");
  var foot = document.getElementById("importFooter");

  /* ── Wizard header ────────────────────────────────────── */
  var steps = [
    { n:1, label:"Subir archivo" },
    { n:2, label:"Mapear columnas" },
    { n:3, label:"Resultado" },
  ];
  var stepsHTML = steps.map(function(s, i) {
    var cls = s.n < paso ? "done" : s.n === paso ? "active" : "";
    var lineHTML = i < steps.length - 1
      ? '<div class="ws-line ' + (s.n < paso ? "done" : "") + '"></div>'
      : "";
    return '<div class="ws-step ' + cls + '">' +
      '<div class="ws-num">' + (s.n < paso ? "✓" : s.n) + '</div>' +
      '<span>' + s.label + '</span>' +
    '</div>' + lineHTML;
  }).join("");

  var pasoHTML = '<div class="wizard-steps">' + stepsHTML + '</div>';

  /* ══════════════════════════════════════════════════════
     PASO 1 — SUBIR ARCHIVO
  ══════════════════════════════════════════════════════ */
  if (paso === 1) {
    body.innerHTML = pasoHTML +

      /* Template download */
      '<div class="template-card" onclick="descargarTemplate()" style="margin-bottom:20px;">' +
        '<div class="tc-icon">📋</div>' +
        '<div>' +
          '<div class="tc-title">Descargar plantilla de Excel</div>' +
          '<div class="tc-sub">Descarga el archivo con las columnas correctas y llénalo con los datos de tus socios</div>' +
        '</div>' +
        '<span class="btn btn-secondary btn-sm" style="margin-left:auto;flex-shrink:0;">⬇ Descargar</span>' +
      '</div>' +

      /* Drop zone */
      '<div class="drop-zone" id="dropZone">' +
        '<input type="file" accept=".xlsx,.xls,.csv" onchange="archivoSeleccionado(this)" id="fileInput"/>' +
        '<div class="dz-icon">📂</div>' +
        '<div class="dz-title">Arrastra tu archivo aquí o haz clic para seleccionar</div>' +
        '<div class="dz-sub">Archivos aceptados: .xlsx, .xls, .csv</div>' +
        '<div class="dz-hint">El archivo debe tener una fila de encabezados en la primera fila</div>' +
      '</div>' +

      /* Columnas esperadas */
      '<div style="margin-top:20px;">' +
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:8px;">Columnas esperadas en el archivo</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:6px;">' +
          CAMPOS_SISTEMA.map(function(c) {
            return '<span style="padding:3px 9px;border-radius:var(--r-full);font-size:11px;font-weight:600;' +
              (c.req
                ? 'background:var(--red-50);color:var(--red-700);'
                : 'background:var(--bg-muted);color:var(--text-muted);') + '">' +
              c.label + (c.req ? ' *' : '') + '</span>';
          }).join("") +
        '</div>' +
        '<div style="font-size:11px;color:var(--text-faint);margin-top:8px;">* Campo obligatorio</div>' +
      '</div>';

    foot.innerHTML =
      '<button class="btn btn-secondary" onclick="cerrarImportar()">Cancelar</button>';

    /* Drag & drop */
    var dz = document.getElementById("dropZone");
    dz.addEventListener("dragover", function(e) { e.preventDefault(); dz.classList.add("dragover"); });
    dz.addEventListener("dragleave", function() { dz.classList.remove("dragover"); });
    dz.addEventListener("drop", function(e) {
      e.preventDefault(); dz.classList.remove("dragover");
      var file = e.dataTransfer.files[0];
      if (file) procesarArchivo(file);
    });
  }

  /* ══════════════════════════════════════════════════════
     PASO 2 — MAPEAR COLUMNAS + PREVIEW
  ══════════════════════════════════════════════════════ */
  else if (paso === 2) {
    /* Auto-mapear: si el nombre de columna Excel contiene el campo del sistema */
    CAMPOS_SISTEMA.forEach(function(campo) {
      var idx = importState.headers.findIndex(function(h) {
        var hn = h.toString().toLowerCase().trim();
        var kw = campo.key.toLowerCase().replace(/_/g," ");
        return hn.includes(kw) || hn.includes(campo.label.toLowerCase());
      });
      if (idx >= 0) importState.mapeo[campo.key] = idx;
    });

    var opciones = '<option value="">— Sin mapear —</option>' +
      importState.headers.map(function(h, i) {
        return '<option value="' + i + '">' + h + '</option>';
      }).join("");

    var mapaHTML = '<table class="map-table"><thead><tr>' +
      '<th>Campo FONEVI</th><th>Columna en tu Excel</th><th>Ejemplo</th>' +
    '</tr></thead><tbody>' +
      CAMPOS_SISTEMA.map(function(campo) {
        var mapped = importState.mapeo[campo.key];
        var selected = mapped !== undefined ? mapped : "";
        var ejemplo = mapped !== undefined && importState.filas.length
          ? (importState.filas[0][mapped] || "—")
          : "—";

        return '<tr>' +
          '<td><strong>' + campo.label + '</strong>' +
            (campo.req ? '<span class="map-req">*</span>' : '') +
          '</td>' +
          '<td>' +
            '<select class="map-select" data-campo="' + campo.key + '" onchange="actualizarMapeo(this)">' +
              opciones.replace('value="' + selected + '"', 'value="' + selected + '" selected') +
            '</select>' +
          '</td>' +
          '<td style="font-size:12px;color:var(--text-muted);" id="ej_' + campo.key + '">' + ejemplo + '</td>' +
        '</tr>';
      }).join("") +
    '</tbody></table>';

    /* Preview de las primeras 5 filas */
    var prevRows = importState.filas.slice(0, 5).map(function(fila) {
      var nombre = importState.mapeo.nombre !== undefined ? (fila[importState.mapeo.nombre] || "") : "?";
      var doc    = importState.mapeo.documento !== undefined ? (fila[importState.mapeo.documento] || "") : "?";
      var cargo  = importState.mapeo.cargo !== undefined ? (fila[importState.mapeo.cargo] || "") : "—";
      return "<tr><td>" + nombre + "</td><td class='mono'>" + doc + "</td><td>" + cargo + "</td></tr>";
    }).join("");

    body.innerHTML = pasoHTML +
      '<div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">' +
        'Se encontraron <strong>' + importState.filas.length + ' filas</strong> con ' +
        importState.headers.length + ' columnas. Confirma el mapeo de campos.' +
      '</div>' +
      '<div style="overflow-x:auto;margin-bottom:20px;">' + mapaHTML + '</div>' +

      '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:8px;">Vista previa (primeros 5 registros)</div>' +
      '<div class="preview-wrap">' +
        '<table class="data-table" style="font-size:12px;">' +
          '<thead><tr><th>Nombre</th><th>Documento</th><th>Cargo</th></tr></thead>' +
          '<tbody>' + prevRows + '</tbody>' +
        '</table>' +
      '</div>';

    foot.innerHTML =
      '<button class="btn btn-secondary" onclick="volverPaso1()">← Atrás</button>' +
      '<button class="btn btn-primary" onclick="ejecutarImportacion()">Importar ' + importState.filas.length + ' socios →</button>';
  }

  /* ══════════════════════════════════════════════════════
     PASO 3 — RESULTADO
  ══════════════════════════════════════════════════════ */
  else if (paso === 3) {
    var res = importState.resultado;
    var errHTML = "";
    if (res.errores.length) {
      errHTML = '<div style="margin-top:16px;">' +
        '<div style="font-size:12px;font-weight:600;color:var(--red-700);margin-bottom:8px;">⚠ Filas con errores (' + res.errores.length + ')</div>' +
        '<div style="max-height:160px;overflow-y:auto;">' +
        res.errores.map(function(e) {
          return '<div style="font-size:12px;padding:6px 10px;background:var(--red-50);border-radius:var(--r-sm);margin-bottom:4px;color:var(--red-700);">' +
            'Fila ' + e.fila + ': ' + e.msg + '</div>';
        }).join("") +
        '</div></div>';
    }

    body.innerHTML = pasoHTML +
      '<div class="import-result ' + (res.ok > 0 ? "ok" : "err") + '" style="margin-bottom:16px;">' +
        '<div class="ir-num ir-ok">' + res.ok + '</div>' +
        '<div class="ir-lbl">socios importados correctamente</div>' +
        (res.errores.length
          ? '<div style="margin-top:8px;font-size:13px;color:var(--red-500);">' + res.errores.length + ' filas omitidas por error</div>'
          : '<div style="margin-top:8px;font-size:13px;color:var(--green-600);">✓ Sin errores</div>') +
      '</div>' + errHTML +

      (res.duplicados > 0
        ? '<div style="font-size:12.5px;color:var(--amber-600);margin-top:8px;padding:10px 14px;background:var(--amber-50);border-radius:var(--r-sm);">⚠ ' + res.duplicados + ' socios ya existían y fueron omitidos (documento duplicado).</div>'
        : '');

    foot.innerHTML =
      '<button class="btn btn-secondary" onclick="cerrarImportar()">Cerrar</button>' +
      (res.ok > 0 ? '<button class="btn btn-primary" onclick="cerrarImportar()">✓ Ver lista de socios</button>' : '');
  }
}

function volverPaso1() {
  importState.paso = 1;
  renderPasoImportar();
}

function actualizarMapeo(sel) {
  var campo = sel.dataset.campo;
  var val   = sel.value;
  if (val === "") {
    delete importState.mapeo[campo];
  } else {
    importState.mapeo[campo] = parseInt(val);
  }
  /* Actualizar ejemplo */
  var ejemploEl = document.getElementById("ej_" + campo);
  if (ejemploEl && importState.filas.length) {
    ejemploEl.textContent = val !== "" ? (importState.filas[0][parseInt(val)] || "—") : "—";
  }
}

function archivoSeleccionado(input) {
  var file = input.files[0];
  if (file) procesarArchivo(file);
}

function procesarArchivo(file) {
  if (!file) return;

  /* Validar extensión */
  var ext = file.name.split(".").pop().toLowerCase();
  if (!["xlsx","xls","csv"].includes(ext)) {
    Toast.error("Formato no soportado. Usa .xlsx, .xls o .csv");
    return;
  }

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb   = XLSX.read(data, { type:"array" });
      var ws   = wb.Sheets[wb.SheetNames[0]];
      var arr  = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });

      if (!arr || arr.length < 2) {
        Toast.warn("El archivo está vacío o solo tiene encabezados.");
        return;
      }

      importState.headers = arr[0].map(function(h) { return String(h).trim(); });
      importState.filas   = arr.slice(1).filter(function(r) {
        return r.some(function(cell) { return String(cell).trim() !== ""; });
      });
      importState.mapeo   = {};
      importState.paso    = 2;
      renderPasoImportar();

    } catch(err) {
      Toast.error("No se pudo leer el archivo: " + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function ejecutarImportacion() {
  /* Validar campos requeridos mapeados */
  var sinReq = CAMPOS_SISTEMA.filter(function(c) {
    return c.req && importState.mapeo[c.key] === undefined;
  });
  if (sinReq.length) {
    Toast.warn("Debes mapear: " + sinReq.map(function(c){return c.label;}).join(", "));
    return;
  }

  var ok         = 0;
  var errores    = [];
  var duplicados = 0;

  /* Documentos ya existentes para detectar duplicados */
  var docsExistentes = {};
  DB.socios.forEach(function(s) {
    if (s.documento) docsExistentes[String(s.documento).trim()] = true;
  });

  importState.filas.forEach(function(fila, idx) {
    var nFila = idx + 2; /* +2 porque la fila 1 es el header */
    var m     = importState.mapeo;

    /* Obtener valores mapeados */
    function get(campo, defVal) {
      if (m[campo] === undefined) return defVal !== undefined ? defVal : "";
      return String(fila[m[campo]] || "").trim();
    }

    var nombre = get("nombre");
    var doc    = get("documento");

    if (!nombre) { errores.push({ fila:nFila, msg:"Nombre vacío" }); return; }
    if (!doc)    { errores.push({ fila:nFila, msg:"Documento vacío" }); return; }
    if (docsExistentes[doc]) { duplicados++; return; }

    /* Parsear fecha */
    var fechaRaw = get("fecha_ingreso");
    var fecha    = "";
    if (fechaRaw) {
      /* SheetJS puede devolver serial de Excel o string */
      if (!isNaN(fechaRaw)) {
        var d = XLSX.SSF.parse_date_code(parseFloat(fechaRaw));
        fecha = d ? (d.y + "-" + String(d.m).padStart(2,"0") + "-" + String(d.d).padStart(2,"0")) : "";
      } else {
        fecha = fechaRaw;
      }
    }
    if (!fecha) fecha = new Date().toISOString().split("T")[0];

    /* Parsear aporte y ahorro */
    var aporteMes = parseInt(get("aporte_mensual").replace(/[^0-9]/g,"")) || 120000;
    var ahorro    = parseInt(get("ahorro_acumulado").replace(/[^0-9]/g,"")) || 0;

    /* Estado */
    var estadoRaw = get("estado","activo").toLowerCase();
    var estado    = ["activo","mora","pendiente","inactivo"].includes(estadoRaw) ? estadoRaw : "activo";

    /* Generar ID único */
    var nuevoId = "S" + String(DB.socios.length + ok + 1).padStart(3, "0");

    DB.socios.push({
      id: nuevoId,
      nombre:           nombre,
      documento:        doc,
      email:            get("email"),
      telefono:         get("telefono"),
      cargo:            get("cargo", "Docente"),
      sede:             get("sede", "Sede Central"),
      fecha_ingreso:    fecha,
      aporte_mensual:   aporteMes,
      ahorro_acumulado: ahorro,
      estado:           estado,
    });

    docsExistentes[doc] = true;
    ok++;
  });

  importState.resultado = { ok, errores, duplicados, total: importState.filas.length };
  importState.paso      = 3;

  renderTabla();
  renderPasoImportar();
}
