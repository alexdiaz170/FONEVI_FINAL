<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FONEVI — Socios</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
  <!-- Favicon + PWA -->
  <link rel="icon"             href="../favicon.svg"            type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-32x32.svg"   sizes="32x32" type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-16x16.svg"   sizes="16x16" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="../icons/icon-180x180.svg" sizes="180x180"/>
  <link rel="apple-touch-icon" href="../icons/icon-152x152.svg" sizes="152x152"/>
  <link rel="manifest"         href="../app/manifest.json"/>
  <meta name="mobile-web-app-capable"                content="yes"/>
  <meta name="apple-mobile-web-app-capable"          content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title"            content="FONEVI"/>
  <meta name="theme-color"                           content="#0f2d52"/>
  <link rel="stylesheet" href="../css/transitions.css"/>
</head>
<body>

<div class="app-layout" id="app-layout">
  <div class="main-content">

    <div class="page-content">
      <div class="page-header">
        <h1>Gestión de Socios</h1>
        <p>Administra todos los miembros del fondo FONEVI</p>
      </div>

      <!-- Filtros y búsqueda -->
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px;">
        <div class="tab-bar" id="filtroEstado">
          <button class="tab-btn active" data-tab="todos">Todos (127)</button>
          <button class="tab-btn" data-tab="activo">Activos</button>
          <button class="tab-btn" data-tab="mora">En mora</button>
          <button class="tab-btn" data-tab="pendiente">Pendientes</button>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchSocio" placeholder="Buscar socio..." />
          </div>
          <button class="btn btn-primary" onclick="Modal.open('modalNuevoSocio')" data-role-staff>
            + Nuevo Socio
          </button>
        </div>
      </div>

      <!-- Tabla de socios -->
      <div class="card">
        <table class="data-table" id="tablaSocios">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Documento</th>
              <th>Aporte mensual</th>
              <th>Ahorro acum.</th>
              <th>Créditos</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="sociosTbody"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<!-- Modal Nuevo Socio -->
<div class="modal-overlay" id="modalNuevoSocio">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nuevo Socio</span>
      <button class="modal-close" onclick="Modal.close('modalNuevoSocio')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Nombre completo</label>
          <input type="text" class="form-control" id="ns-nombre" placeholder="Ej: Juan Pérez García" />
        </div>
        <div class="form-group">
          <label class="form-label">Número de documento</label>
          <input type="text" class="form-control" id="ns-doc" placeholder="Sin puntos ni comas" />
        </div>
        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="ns-email" placeholder="correo@edu.co" />
        </div>
        <div class="form-group">
          <label class="form-label">Teléfono</label>
          <input type="tel" class="form-control" id="ns-tel" placeholder="3001234567" />
        </div>
        <div class="form-group">
          <label class="form-label">Cargo</label>
          <input type="text" class="form-control" id="ns-cargo" placeholder="Ej: Docente de Matemáticas" />
        </div>
        <div class="form-group">
          <label class="form-label">Sede</label>
          <select class="form-control" id="ns-sede">
            <option>Sede Central</option>
            <option>Sede Norte</option>
            <option>Sede Sur</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Fecha de ingreso</label>
          <input type="date" class="form-control" id="ns-fecha" />
        </div>
        <div class="form-group">
          <label class="form-label">Aporte mensual ($)</label>
          <input type="number" class="form-control" id="ns-aporte" value="120000" min="120000" step="10000" />
          <span class="form-hint">Mínimo: $120.000</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modalNuevoSocio')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarNuevoSocio()">Guardar Socio</button>
    </div>
  </div>
</div>

<!-- Modal Perfil Socio -->
<div class="modal-overlay" id="modalPerfil">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Perfil del Socio</span>
      <button class="modal-close" onclick="Modal.close('modalPerfil')">×</button>
    </div>
    <div class="modal-body" id="modalPerfilBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modalPerfil')">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Exportación PDF/Excel -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../js/darkmode.js"></script>
<script src="../js/transitions.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/roles.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script src="../js/loading.js"></script>
<script src="../js/export.js"></script>
<script>
let filtroActual = "todos";

document.addEventListener("DOMContentLoaded", () => {
  buildLayout(
    "Socios",
    "127 socios registrados",
    `<button class="btn btn-primary" onclick="Modal.open('modalNuevoSocio')" data-role-staff>+ Nuevo Socio</button>`
  );
  renderTabla();
  filterTable("searchSocio", "tablaSocios");
  initTabs("filtroEstado", (tab) => { filtroActual = tab; renderTabla(); });
  /* Fecha de hoy por defecto */
  document.getElementById("ns-fecha").value = new Date().toISOString().split("T")[0];
});

function renderTabla() {
  let socios = DB.socios;
  if (filtroActual !== "todos") {
    socios = socios.filter(s => s.estado === filtroActual);
  }

  document.getElementById("sociosTbody").innerHTML = socios.map(s => {
    const creditos = DataHelper.getCreditosSocio(s.id).filter(c => c.estado !== "pagado");
    return `
      <tr>
        <td class="mono muted">${s.id}</td>
        <td><strong style="font-weight:500;">${s.nombre}</strong></td>
        <td class="muted">${s.documento}</td>
        <td>${DataHelper.formatCOP(s.aporte_mensual)}</td>
        <td style="font-weight:500;">${DataHelper.formatCOP(s.ahorro_acumulado)}</td>
        <td>${creditos.length > 0 ? `<span class="pill pill-amber">${creditos.length} activo${creditos.length > 1 ? "s" : ""}</span>` : '<span class="muted">—</span>'}</td>
        <td>${DataHelper.estadoPill(s.estado)}</td>
        <td>
          <a href="perfil.html?id=${s.id}" class="btn-link">Ver perfil →</a>
        </td>
      </tr>
    `;
  }).join("");
}

function verPerfil(id) {
  const s = DataHelper.getSocio(id);
  if (!s) return;
  const creditos = DataHelper.getCreditosSocio(id);
  const aportes  = DataHelper.getAportesSocio(id);
  const pagados  = aportes.filter(a => a.estado === "pagado").length;

  document.getElementById("modalPerfilBody").innerHTML = `
    <div style="display:flex; align-items:center; gap:14px; margin-bottom:20px;">
      <div style="width:52px;height:52px;border-radius:50%;background:var(--navy-light);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:500;color:var(--navy);">
        ${s.nombre.split(" ").map(p=>p[0]).slice(0,2).join("")}
      </div>
      <div>
        <div style="font-size:17px;font-weight:500;">${s.nombre}</div>
        <div style="font-size:12px;color:var(--muted);">${s.cargo} — ${s.sede}</div>
        <div style="margin-top:4px;">${DataHelper.estadoPill(s.estado)}</div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:16px;">
      <div><div class="form-label">Documento</div><div style="margin-top:4px;">${s.documento}</div></div>
      <div><div class="form-label">Email</div><div style="margin-top:4px;">${s.email}</div></div>
      <div><div class="form-label">Teléfono</div><div style="margin-top:4px;">${s.telefono}</div></div>
      <div><div class="form-label">Fecha de ingreso</div><div style="margin-top:4px;">${DataHelper.formatFecha(s.fecha_ingreso)}</div></div>
    </div>

    <div class="grid-3" style="margin-bottom:16px;">
      <div style="background:var(--green-light);border-radius:10px;padding:14px;text-align:center;">
        <div style="font-size:11px;color:var(--muted);">Ahorro acumulado</div>
        <div style="font-size:20px;font-weight:500;color:var(--green-dark);font-family:var(--font-display);">${DataHelper.formatCOP(s.ahorro_acumulado)}</div>
      </div>
      <div style="background:var(--navy-light);border-radius:10px;padding:14px;text-align:center;">
        <div style="font-size:11px;color:var(--muted);">Aportes pagados</div>
        <div style="font-size:20px;font-weight:500;color:var(--navy);font-family:var(--font-display);">${pagados}</div>
      </div>
      <div style="background:var(--amber-light);border-radius:10px;padding:14px;text-align:center;">
        <div style="font-size:11px;color:var(--muted);">Créditos activos</div>
        <div style="font-size:20px;font-weight:500;color:var(--amber);font-family:var(--font-display);">${creditos.filter(c=>c.estado!=="pagado").length}</div>
      </div>
    </div>

    ${creditos.length > 0 ? `
      <div style="font-size:13px;font-weight:500;margin-bottom:8px;">Créditos</div>
      ${creditos.map(c=>`
        <div style="display:flex;justify-content:space-between;padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:6px;font-size:13px;">
          <span class="muted">#${c.id}</span>
          <span>${DataHelper.formatCOP(c.monto)}</span>
          <span>${c.cuotas_pagadas}/${c.cuotas} cuotas</span>
          <span>${DataHelper.estadoPill(c.estado)}</span>
        </div>
      `).join("")}
    ` : ""}
  `;
  Modal.open("modalPerfil");
}

function guardarNuevoSocio() {
  const nombre = document.getElementById("ns-nombre").value.trim();
  const doc    = document.getElementById("ns-doc").value.trim();
  if (!nombre || !doc) {
    Toast.warn("Por favor completa los campos obligatorios.");
    return;
  }
  /* En producción: llamada a API. Aquí simulamos la inserción. */
  const nuevo = {
    id: "S" + String(DB.socios.length + 1).padStart(3, "0"),
    nombre,
    documento: doc,
    email:     document.getElementById("ns-email").value,
    telefono:  document.getElementById("ns-tel").value,
    fecha_ingreso: document.getElementById("ns-fecha").value,
    aporte_mensual: parseInt(document.getElementById("ns-aporte").value) || 120000,
    ahorro_acumulado: 0,
    estado: "activo",
    cargo: document.getElementById("ns-cargo").value,
    sede:  document.getElementById("ns-sede").value
  };
  DB.socios.push(nuevo);
  Modal.close("modalNuevoSocio");
  renderTabla();
  Toast.success(`Socio ${nombre} registrado correctamente.`);
}
</script>
</body>
</html>
