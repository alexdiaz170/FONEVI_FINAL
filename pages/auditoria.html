<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FONEVI — Auditoría</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <!-- Favicon + PWA -->
  <link rel="icon"             href="../favicon.svg"            type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-32x32.svg"   sizes="32x32" type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-16x16.svg"   sizes="16x16" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="../icons/icon-180x180.svg" sizes="180x180"/>
  <link rel="apple-touch-icon" href="../icons/icon-152x152.svg" sizes="152x152"/>
  <link rel="manifest"         href="../manifest.json"/>
  <meta name="mobile-web-app-capable"                content="yes"/>
  <meta name="apple-mobile-web-app-capable"          content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title"            content="FONEVI"/>
  <meta name="theme-color"                           content="#0f2d52"/>
  <link rel="stylesheet" href="../css/transitions.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
  <link rel="stylesheet" href="../css/loading.css"/>
</head>
<body>

<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="page-content">

      <div class="page-header">
        <h1>Seguridad y Auditoría</h1>
        <p>Registro de acciones, accesos y cambios en el sistema</p>
      </div>

      <!-- KPIs -->
      <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);" id="kpiAudit"></div>

      <!-- Tabs -->
      <div class="tab-bar" id="auditTabs" style="margin-bottom:16px;">
        <button class="tab-btn active" data-tab="logs">Registro de Acciones</button>
        <button class="tab-btn" data-tab="accesos">Accesos al Sistema</button>
        <button class="tab-btn" data-tab="cambios">Cambios de Datos</button>
      </div>

      <!-- Filtros rediseñados -->
      <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:18px;">

        <!-- Fila 1: busqueda + exportar -->
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <div class="search-box" style="flex:1; min-width:180px;">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchAudit" placeholder="Buscar en logs..." oninput="aplicarFiltros()" />
          </div>
          <button class="btn btn-secondary btn-sm" onclick="exportarLogs()" style="display:flex; align-items:center; gap:6px;">
            <span>⬇</span> Exportar CSV
          </button>
          <button class="btn btn-secondary btn-sm" onclick="limpiarFiltros()" style="display:flex; align-items:center; gap:6px;">
            <span>✕</span> Limpiar
          </button>
        </div>

        <!-- Fila 2: filtro usuarios -->
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <span style="font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap;">👤 Usuario:</span>
          <div style="display:flex; gap:6px; flex-wrap:wrap;" id="filtroUsuarioBtns">
            <button class="filter-pill active" data-filtro="usuario" data-val="" onclick="setFiltro('usuario', this)">
              Todos
            </button>
            <button class="filter-pill" data-filtro="usuario" data-val="Carlos Muñoz" onclick="setFiltro('usuario', this)" style="--pill-color:#e53e3e; --pill-bg:rgba(229,62,62,.1);">
              🔴 Carlos Muñoz
            </button>
            <button class="filter-pill" data-filtro="usuario" data-val="Laura Jiménez" onclick="setFiltro('usuario', this)" style="--pill-color:#d97706; --pill-bg:rgba(217,119,6,.1);">
              🟡 Laura Jiménez
            </button>
            <button class="filter-pill" data-filtro="usuario" data-val="Ana Torres" onclick="setFiltro('usuario', this)" style="--pill-color:#2563eb; --pill-bg:rgba(37,99,235,.1);">
              🔵 Ana Torres
            </button>
          </div>
        </div>

        <!-- Fila 3: filtro acciones -->
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <span style="font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap;">⚡ Acción:</span>
          <div style="display:flex; gap:6px; flex-wrap:wrap;" id="filtroAccionBtns">
            <button class="filter-pill active" data-filtro="accion" data-val="" onclick="setFiltro('accion', this)">
              Todas
            </button>
            <button class="filter-pill" data-filtro="accion" data-val="crear" onclick="setFiltro('accion', this)" style="--pill-color:#16a34a; --pill-bg:rgba(22,163,74,.1);">
              ✚ Crear
            </button>
            <button class="filter-pill" data-filtro="accion" data-val="editar" onclick="setFiltro('accion', this)" style="--pill-color:#d97706; --pill-bg:rgba(217,119,6,.1);">
              ✏ Editar
            </button>
            <button class="filter-pill" data-filtro="accion" data-val="eliminar" onclick="setFiltro('accion', this)" style="--pill-color:#dc2626; --pill-bg:rgba(220,38,38,.1);">
              🗑 Eliminar
            </button>
            <button class="filter-pill" data-filtro="accion" data-val="login" onclick="setFiltro('accion', this)" style="--pill-color:#2563eb; --pill-bg:rgba(37,99,235,.1);">
              🔐 Login
            </button>
            <button class="filter-pill" data-filtro="accion" data-val="aprobar" onclick="setFiltro('accion', this)" style="--pill-color:#0d1f35; --pill-bg:rgba(13,31,53,.1);">
              ✔ Aprobar
            </button>
          </div>
        </div>

      </div>

      <style>
        .filter-pill {
          display: inline-flex; align-items: center; gap: 4px;
          padding: 5px 13px; border-radius: 20px;
          font-size: 12px; font-weight: 500; cursor: pointer;
          border: 1.5px solid transparent;
          background: var(--surface2, #f1f5f9);
          color: var(--text, #0d1f35);
          transition: all .18s ease;
          white-space: nowrap;
        }
        .filter-pill:hover {
          background: var(--pill-bg, rgba(13,31,53,.08));
          border-color: var(--pill-color, var(--navy, #0d1f35));
          color: var(--pill-color, var(--navy, #0d1f35));
          transform: translateY(-1px);
          box-shadow: 0 3px 9px rgba(0,0,0,.1);
        }
        .filter-pill.active {
          background: var(--pill-bg, rgba(13,31,53,.1));
          border-color: var(--pill-color, var(--navy, #0d1f35));
          color: var(--pill-color, var(--navy, #0d1f35));
          font-weight: 600;
          box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }
        /* Dark mode */
        [data-theme="dark"] .filter-pill {
          background: rgba(255,255,255,.07);
          color: #e2e8f0;
        }
        [data-theme="dark"] .filter-pill:hover,
        [data-theme="dark"] .filter-pill.active {
          background: var(--pill-bg, rgba(255,255,255,.12));
          border-color: var(--pill-color, #94a3b8);
          color: var(--pill-color, #e2e8f0);
        }
      </style>



      <!-- Panel logs -->
      <div id="panel-logs">
        <div class="card">
          <table class="data-table" id="tablaAudit">
            <thead>
              <tr>
                <th>Fecha / Hora</th>
                <th>Usuario</th>
                <th>Rol</th>
                <th>Acción</th>
                <th>Módulo</th>
                <th>Detalle</th>
                <th>IP</th>
              </tr>
            </thead>
            <tbody id="auditTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Panel accesos -->
      <div id="panel-accesos" style="display:none;">
        <div class="card">
          <table class="data-table" id="tablaAccesos">
            <thead>
              <tr><th>Fecha</th><th>Usuario</th><th>Evento</th><th>IP</th><th>Resultado</th></tr>
            </thead>
            <tbody id="accesosTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Panel cambios -->
      <div id="panel-cambios" style="display:none;">
        <div class="card">
          <table class="data-table">
            <thead>
              <tr><th>Fecha</th><th>Usuario</th><th>Módulo</th><th>Registro</th><th>Campo</th><th>Valor anterior</th><th>Valor nuevo</th></tr>
            </thead>
            <tbody id="cambiosTbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>


<script src="../js/darkmode.js"></script>
<script src="../js/transitions.js"></script>
<script src="../js/data.js"></script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/roles.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script src="../js/search.js"></script>
<script>
/* Datos de auditoría simulados */
const AUDIT_LOGS = [
  { fecha: "2026-03-21 09:14", usuario: "Laura Jiménez",  rol: "tesorero",       accion: "crear",   modulo: "Aportes",      detalle: "Aporte registrado — Ana Torres (Mar 2026)",       ip: "192.168.1.10" },
  { fecha: "2026-03-21 08:30", usuario: "Laura Jiménez",  rol: "tesorero",       accion: "crear",   modulo: "Créditos",     detalle: "Cuota registrada — crédito #C-034 Luis Mora",      ip: "192.168.1.10" },
  { fecha: "2026-03-20 16:45", usuario: "Carlos Muñoz",   rol: "administrador",  accion: "aprobar", modulo: "Créditos",     detalle: "Crédito #C-039 aprobado — Pedro Salcedo $2.5M",   ip: "192.168.1.5" },
  { fecha: "2026-03-20 11:20", usuario: "Carlos Muñoz",   rol: "administrador",  accion: "crear",   modulo: "Socios",       detalle: "Nuevo socio registrado — Mariana López Castro",    ip: "192.168.1.5" },
  { fecha: "2026-03-19 15:00", usuario: "Laura Jiménez",  rol: "tesorero",       accion: "editar",  modulo: "Socios",       detalle: "Estado actualizado — Jorge Erazo → mora",          ip: "192.168.1.10" },
  { fecha: "2026-03-19 10:30", usuario: "Carlos Muñoz",   rol: "administrador",  accion: "crear",   modulo: "Solidaridad",  detalle: "Ayuda médica registrada — Patricia Velasco $500k", ip: "192.168.1.5" },
  { fecha: "2026-03-18 09:00", usuario: "Ana Torres",     rol: "socio",          accion: "login",   modulo: "Sistema",      detalle: "Inicio de sesión exitoso",                         ip: "192.168.1.22" },
  { fecha: "2026-03-17 14:15", usuario: "Carlos Muñoz",   rol: "administrador",  accion: "editar",  modulo: "Contabilidad", detalle: "Movimiento editado — M003 monto ajustado",         ip: "192.168.1.5" },
  { fecha: "2026-03-15 11:00", usuario: "Laura Jiménez",  rol: "tesorero",       accion: "crear",   modulo: "Aportes",      detalle: "Aportes masivos nómina Marzo 2026 (109 registros)","ip": "192.168.1.10" },
  { fecha: "2026-03-10 08:45", usuario: "Carlos Muñoz",   rol: "administrador",  accion: "eliminar",modulo: "Config",       detalle: "Parámetro de tasa eliminado (duplicado)",          ip: "192.168.1.5" }
];

const ACCESOS_LOGS = [
  { fecha: "2026-03-21 09:10", usuario: "Laura Jiménez",  evento: "Login",  ip: "192.168.1.10", resultado: "exitoso" },
  { fecha: "2026-03-21 08:25", usuario: "Laura Jiménez",  evento: "Login",  ip: "192.168.1.10", resultado: "exitoso" },
  { fecha: "2026-03-20 16:40", usuario: "Carlos Muñoz",   evento: "Login",  ip: "192.168.1.5",  resultado: "exitoso" },
  { fecha: "2026-03-20 12:30", usuario: "desconocido",    evento: "Login",  ip: "201.245.1.88", resultado: "fallido" },
  { fecha: "2026-03-18 09:00", usuario: "Ana Torres",     evento: "Login",  ip: "192.168.1.22", resultado: "exitoso" },
  { fecha: "2026-03-18 18:45", usuario: "Carlos Muñoz",   evento: "Logout", ip: "192.168.1.5",  resultado: "exitoso" },
  { fecha: "2026-03-15 17:00", usuario: "Laura Jiménez",  evento: "Logout", ip: "192.168.1.10", resultado: "exitoso" }
];

const CAMBIOS_LOGS = [
  { fecha: "2026-03-19 15:00", usuario: "Laura Jiménez",  modulo: "Socios",       registro: "S005 - Jorge Erazo",       campo: "estado",          anterior: "pendiente",   nuevo: "mora" },
  { fecha: "2026-03-17 14:15", usuario: "Carlos Muñoz",   modulo: "Contabilidad", registro: "M003 - Crédito Pedro",     campo: "monto",           anterior: "2.400.000",   nuevo: "2.500.000" },
  { fecha: "2026-03-15 11:00", usuario: "Laura Jiménez",  modulo: "Config",       registro: "Tasa mensual",             campo: "tasa_credito",    anterior: "1.8%",        nuevo: "1.5%" },
  { fecha: "2026-03-10 09:30", usuario: "Carlos Muñoz",   modulo: "Socios",       registro: "S003 - Claudia Ríos",      campo: "aporte_mensual",  anterior: "100.000",     nuevo: "120.000" }
];

document.addEventListener("DOMContentLoaded", () => {
  if (!Roles.proteger("auditoria")) return;
  buildLayout("Auditoría", "Solo accesible para administradores", "");
  renderKPIs();
  renderLogs(AUDIT_LOGS);
  filterTable("searchAudit", "tablaAudit");
  initTabs("auditTabs", function(tab) {
    ["logs","accesos","cambios"].forEach(function(p) {
      document.getElementById("panel-" + p).style.display = tab === p ? "block" : "none";
    });
    if (tab === "accesos") renderAccesos();
    if (tab === "cambios") renderCambios();
  });
});

function renderKPIs() {
  const hoy    = "2026-03-21";
  const hoyLogs = AUDIT_LOGS.filter(l => l.fecha.startsWith(hoy)).length;
  const fallidos = ACCESOS_LOGS.filter(l => l.resultado === "fallido").length;

  document.getElementById("kpiAudit").innerHTML = `
    <div class="kpi-card blue">
      <div class="kpi-label">Total acciones</div>
      <div class="kpi-value">${AUDIT_LOGS.length}</div>
      <div class="kpi-footer">En el período</div>
      <div class="kpi-bg-icon">📋</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">Acciones hoy</div>
      <div class="kpi-value">${hoyLogs}</div>
      <div class="kpi-bg-icon">📅</div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-label">Accesos fallidos</div>
      <div class="kpi-value">${fallidos}</div>
      <div class="kpi-footer kpi-down">Requiere atención</div>
      <div class="kpi-bg-icon">⚠</div>
    </div>
    <div class="kpi-card gold">
      <div class="kpi-label">Usuarios activos</div>
      <div class="kpi-value">3</div>
      <div class="kpi-bg-icon">👥</div>
    </div>
  `;
}

const ACCION_PILLS = {
  crear:    "pill-green",
  editar:   "pill-amber",
  eliminar: "pill-red",
  login:    "pill-blue",
  aprobar:  "pill-navy",
};

function renderLogs(logs) {
  document.getElementById("auditTbody").innerHTML = logs.map(l => `
    <tr>
      <td class="mono muted" style="font-size:11px; white-space:nowrap;">${l.fecha}</td>
      <td style="font-weight:500;">${l.usuario}</td>
      <td><span class="pill ${l.rol === 'administrador' ? 'pill-red' : l.rol === 'tesorero' ? 'pill-amber' : 'pill-blue'}" style="font-size:10px;">${l.rol}</span></td>
      <td><span class="pill ${ACCION_PILLS[l.accion] || 'pill-navy'}" style="font-size:10px;">${l.accion}</span></td>
      <td class="muted">${l.modulo}</td>
      <td style="font-size:12px; max-width:260px;">${l.detalle}</td>
      <td class="mono muted" style="font-size:11px;">${l.ip}</td>
    </tr>
  `).join("");
}

function renderAccesos() {
  document.getElementById("accesosTbody").innerHTML = ACCESOS_LOGS.map(l => `
    <tr>
      <td class="mono muted" style="font-size:11px;">${l.fecha}</td>
      <td style="font-weight:${l.resultado === 'fallido' ? '500' : '400'}; color:${l.resultado === 'fallido' ? 'var(--red)' : 'inherit'};">${l.usuario}</td>
      <td class="muted">${l.evento}</td>
      <td class="mono muted" style="font-size:11px;">${l.ip}</td>
      <td>${l.resultado === "exitoso"
        ? '<span class="pill pill-green">Exitoso</span>'
        : '<span class="pill pill-red">Fallido</span>'}</td>
    </tr>
  `).join("");
}

function renderCambios() {
  document.getElementById("cambiosTbody").innerHTML = CAMBIOS_LOGS.map(l => `
    <tr>
      <td class="mono muted" style="font-size:11px;">${l.fecha}</td>
      <td style="font-weight:500;">${l.usuario}</td>
      <td class="muted">${l.modulo}</td>
      <td style="font-size:12px;">${l.registro}</td>
      <td class="muted">${l.campo}</td>
      <td style="font-size:12px; color:var(--red); text-decoration:line-through;">${l.anterior}</td>
      <td style="font-size:12px; color:var(--green); font-weight:500;">${l.nuevo}</td>
    </tr>
  `).join("");
}

/* Valor activo de cada grupo de filtros */
const _filtros = { usuario: "", accion: "" };

/* Cambia el botón activo y re-aplica filtros */
function setFiltro(tipo, btn) {
  const grupo = btn.closest("[id^=\"filtro\"]");
  if (grupo) {
    grupo.querySelectorAll(".filter-pill").forEach(b => b.classList.remove("active"));
  }
  btn.classList.add("active");
  _filtros[tipo] = btn.dataset.val;
  aplicarFiltros();
}

function aplicarFiltros() {
  const texto   = (document.getElementById("searchAudit").value || "").toLowerCase();
  let filtrado  = AUDIT_LOGS;
  if (_filtros.usuario) filtrado = filtrado.filter(l => l.usuario === _filtros.usuario);
  if (_filtros.accion)  filtrado = filtrado.filter(l => l.accion  === _filtros.accion);
  if (texto) {
    filtrado = filtrado.filter(l =>
      (l.usuario + l.rol + l.accion + l.modulo + l.detalle + l.ip).toLowerCase().includes(texto)
    );
  }
  renderLogs(filtrado);
}

function limpiarFiltros() {
  _filtros.usuario = "";
  _filtros.accion  = "";
  document.getElementById("searchAudit").value = "";
  document.querySelectorAll(".filter-pill").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".filter-pill[data-val='']").forEach(b => b.classList.add("active"));
  renderLogs(AUDIT_LOGS);
  Toast.success("Filtros limpiados.");
}

function exportarLogs() {
  Toast.success("Exportando logs de auditoría a CSV...");
}
</script>
</body>
</html>
