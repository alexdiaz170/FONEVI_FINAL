<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FONEVI — Auditoría</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>

  <!-- Favicon + PWA -->
  <link rel="icon"             href="../favicon.svg"            type="image/svg+xml"/>
</head>
<body>

<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="page-content">

      <div class="page-header">
        <h1>Seguridad y Auditoría</h1>
        <p>Registro de acciones, accesos y cambios en el sistema</p>
      </div>

      <!-- KPIs -->
      <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);" id="kpiAudit"></div>

      <!-- Tabs -->
      <div class="tab-bar" id="auditTabs" style="margin-bottom:16px;">
        <button class="tab-btn active" data-tab="logs">Registro de Acciones</button>
        <button class="tab-btn" data-tab="accesos">Accesos al Sistema</button>
        <button class="tab-btn" data-tab="cambios">Cambios de Datos</button>
      </div>

      <!-- Filtros -->
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap;">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchAudit" placeholder="Buscar en logs..." />
        </div>
        <select class="form-control" id="filtroUsuario" style="width:180px;">
          <option value="">Todos los usuarios</option>
          <option value="Carlos Muñoz">Carlos Muñoz (Admin)</option>
          <option value="Laura Jiménez">Laura Jiménez (Tesorero)</option>
          <option value="Ana Torres">Ana Torres (Socio)</option>
        </select>
        <select class="form-control" id="filtroAccion" style="width:160px;">
          <option value="">Todas las acciones</option>
          <option value="crear">Crear</option>
          <option value="editar">Editar</option>
          <option value="eliminar">Eliminar</option>
          <option value="login">Login</option>
          <option value="aprobar">Aprobar</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="aplicarFiltros()">Filtrar</button>
        <button class="btn btn-secondary btn-sm" onclick="exportarLogs()">⬇ Exportar</button>
      </div>

      <!-- Panel logs -->
      <div id="panel-logs">
        <div class="card">
          <table class="data-table" id="tablaAudit">
            <thead>
              <tr>
                <th>Fecha / Hora</th>
                <th>Usuario</th>
                <th>Rol</th>
                <th>Acción</th>
                <th>Módulo</th>
                <th>Detalle</th>
                <th>IP</th>
              </tr>
            </thead>
            <tbody id="auditTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Panel accesos -->
      <div id="panel-accesos" style="display:none;">
        <div class="card">
          <table class="data-table" id="tablaAccesos">
            <thead>
              <tr><th>Fecha</th><th>Usuario</th><th>Evento</th><th>IP</th><th>Resultado</th></tr>
            </thead>
            <tbody id="accesosTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Panel cambios -->
      <div id="panel-cambios" style="display:none;">
        <div class="card">
          <table class="data-table">
            <thead>
              <tr><th>Fecha</th><th>Usuario</th><th>Módulo</th><th>Registro</th><th>Campo</th><th>Valor anterior</th><th>Valor nuevo</th></tr>
            </thead>
            <tbody id="cambiosTbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>


<script src="../js/darkmode.js"></script>
<script src="../js/transitions.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/roles.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script src="../js/loading.js"></script>
<script src="../js/export.js"></script>
<script>
/* Datos de auditoría simulados */
const AUDIT_LOGS = [
  { fecha: "2026-03-21 09:14", usuario: "Laura Jiménez",  rol: "tesorero",       accion: "crear",   modulo: "Aportes",      detalle: "Aporte registrado — Ana Torres (Mar 2026)",       ip: "192.168.1.10" },
  { fecha: "2026-03-21 08:30", usuario: "Laura Jiménez",  rol: "tesorero",       accion: "crear",   modulo: "Créditos",     detalle: "Cuota registrada — crédito #C-034 Luis Mora",      ip: "192.168.1.10" },
  { fecha: "2026-03-20 16:45", usuario: "Carlos Muñoz",   rol: "administrador",  accion: "aprobar", modulo: "Créditos",     detalle: "Crédito #C-039 aprobado — Pedro Salcedo $2.5M",   ip: "192.168.1.5" },
  { fecha: "2026-03-20 11:20", usuario: "Carlos Muñoz",   rol: "administrador",  accion: "crear",   modulo: "Socios",       detalle: "Nuevo socio registrado — Mariana López Castro",    ip: "192.168.1.5" },
  { fecha: "2026-03-19 15:00", usuario: "Laura Jiménez",  rol: "tesorero",       accion: "editar",  modulo: "Socios",       detalle: "Estado actualizado — Jorge Erazo → mora",          ip: "192.168.1.10" },
  { fecha: "2026-03-19 10:30", usuario: "Carlos Muñoz",   rol: "administrador",  accion: "crear",   modulo: "Solidaridad",  detalle: "Ayuda médica registrada — Patricia Velasco $500k", ip: "192.168.1.5" },
  { fecha: "2026-03-18 09:00", usuario: "Ana Torres",     rol: "socio",          accion: "login",   modulo: "Sistema",      detalle: "Inicio de sesión exitoso",                         ip: "192.168.1.22" },
  { fecha: "2026-03-17 14:15", usuario: "Carlos Muñoz",   rol: "administrador",  accion: "editar",  modulo: "Contabilidad", detalle: "Movimiento editado — M003 monto ajustado",         ip: "192.168.1.5" },
  { fecha: "2026-03-15 11:00", usuario: "Laura Jiménez",  rol: "tesorero",       accion: "crear",   modulo: "Aportes",      detalle: "Aportes masivos nómina Marzo 2026 (109 registros)","ip": "192.168.1.10" },
  { fecha: "2026-03-10 08:45", usuario: "Carlos Muñoz",   rol: "administrador",  accion: "eliminar",modulo: "Config",       detalle: "Parámetro de tasa eliminado (duplicado)",          ip: "192.168.1.5" }
];

const ACCESOS_LOGS = [
  { fecha: "2026-03-21 09:10", usuario: "Laura Jiménez",  evento: "Login",  ip: "192.168.1.10", resultado: "exitoso" },
  { fecha: "2026-03-21 08:25", usuario: "Laura Jiménez",  evento: "Login",  ip: "192.168.1.10", resultado: "exitoso" },
  { fecha: "2026-03-20 16:40", usuario: "Carlos Muñoz",   evento: "Login",  ip: "192.168.1.5",  resultado: "exitoso" },
  { fecha: "2026-03-20 12:30", usuario: "desconocido",    evento: "Login",  ip: "201.245.1.88", resultado: "fallido" },
  { fecha: "2026-03-18 09:00", usuario: "Ana Torres",     evento: "Login",  ip: "192.168.1.22", resultado: "exitoso" },
  { fecha: "2026-03-18 18:45", usuario: "Carlos Muñoz",   evento: "Logout", ip: "192.168.1.5",  resultado: "exitoso" },
  { fecha: "2026-03-15 17:00", usuario: "Laura Jiménez",  evento: "Logout", ip: "192.168.1.10", resultado: "exitoso" }
];

const CAMBIOS_LOGS = [
  { fecha: "2026-03-19 15:00", usuario: "Laura Jiménez",  modulo: "Socios",       registro: "S005 - Jorge Erazo",       campo: "estado",          anterior: "pendiente",   nuevo: "mora" },
  { fecha: "2026-03-17 14:15", usuario: "Carlos Muñoz",   modulo: "Contabilidad", registro: "M003 - Crédito Pedro",     campo: "monto",           anterior: "2.400.000",   nuevo: "2.500.000" },
  { fecha: "2026-03-15 11:00", usuario: "Laura Jiménez",  modulo: "Config",       registro: "Tasa mensual",             campo: "tasa_credito",    anterior: "1.8%",        nuevo: "1.5%" },
  { fecha: "2026-03-10 09:30", usuario: "Carlos Muñoz",   modulo: "Socios",       registro: "S003 - Claudia Ríos",      campo: "aporte_mensual",  anterior: "100.000",     nuevo: "120.000" }
];

document.addEventListener("DOMContentLoaded", () => {
  buildLayout("Auditoría", "Solo accesible para administradores", "");
  renderKPIs();
  renderLogs(AUDIT_LOGS);
  filterTable("searchAudit", "tablaAudit");
  initTabs("auditTabs", (tab) => {
    ["logs","accesos","cambios"].forEach(p => {
      document.getElementById("panel-" + p).style.display = tab === p ? "block" : "none";
    });
    if (tab === "accesos") renderAccesos();
    if (tab === "cambios") renderCambios();
  });
});

function renderKPIs() {
  const hoy    = "2026-03-21";
  const hoyLogs = AUDIT_LOGS.filter(l => l.fecha.startsWith(hoy)).length;
  const fallidos = ACCESOS_LOGS.filter(l => l.resultado === "fallido").length;

  document.getElementById("kpiAudit").innerHTML = `
    <div class="kpi-card blue">
      <div class="kpi-label">Total acciones</div>
      <div class="kpi-value">${AUDIT_LOGS.length}</div>
      <div class="kpi-footer">En el período</div>
      <div class="kpi-bg-icon">📋</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">Acciones hoy</div>
      <div class="kpi-value">${hoyLogs}</div>
      <div class="kpi-bg-icon">📅</div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-label">Accesos fallidos</div>
      <div class="kpi-value">${fallidos}</div>
      <div class="kpi-footer kpi-down">Requiere atención</div>
      <div class="kpi-bg-icon">⚠</div>
    </div>
    <div class="kpi-card gold">
      <div class="kpi-label">Usuarios activos</div>
      <div class="kpi-value">3</div>
      <div class="kpi-bg-icon">👥</div>
    </div>
  `;
}

const ACCION_PILLS = {
  crear:    "pill-green",
  editar:   "pill-amber",
  eliminar: "pill-red",
  login:    "pill-blue",
  aprobar:  "pill-navy",
};

function renderLogs(logs) {
  document.getElementById("auditTbody").innerHTML = logs.map(l => `
    <tr>
      <td class="mono muted" style="font-size:11px; white-space:nowrap;">${l.fecha}</td>
      <td style="font-weight:500;">${l.usuario}</td>
      <td><span class="pill ${l.rol === 'administrador' ? 'pill-red' : l.rol === 'tesorero' ? 'pill-amber' : 'pill-blue'}" style="font-size:10px;">${l.rol}</span></td>
      <td><span class="pill ${ACCION_PILLS[l.accion] || 'pill-navy'}" style="font-size:10px;">${l.accion}</span></td>
      <td class="muted">${l.modulo}</td>
      <td style="font-size:12px; max-width:260px;">${l.detalle}</td>
      <td class="mono muted" style="font-size:11px;">${l.ip}</td>
    </tr>
  `).join("");
}

function renderAccesos() {
  document.getElementById("accesosTbody").innerHTML = ACCESOS_LOGS.map(l => `
    <tr>
      <td class="mono muted" style="font-size:11px;">${l.fecha}</td>
      <td style="font-weight:${l.resultado === 'fallido' ? '500' : '400'}; color:${l.resultado === 'fallido' ? 'var(--red)' : 'inherit'};">${l.usuario}</td>
      <td class="muted">${l.evento}</td>
      <td class="mono muted" style="font-size:11px;">${l.ip}</td>
      <td>${l.resultado === "exitoso"
        ? '<span class="pill pill-green">Exitoso</span>'
        : '<span class="pill pill-red">Fallido</span>'}</td>
    </tr>
  `).join("");
}

function renderCambios() {
  document.getElementById("cambiosTbody").innerHTML = CAMBIOS_LOGS.map(l => `
    <tr>
      <td class="mono muted" style="font-size:11px;">${l.fecha}</td>
      <td style="font-weight:500;">${l.usuario}</td>
      <td class="muted">${l.modulo}</td>
      <td style="font-size:12px;">${l.registro}</td>
      <td class="muted">${l.campo}</td>
      <td style="font-size:12px; color:var(--red); text-decoration:line-through;">${l.anterior}</td>
      <td style="font-size:12px; color:var(--green); font-weight:500;">${l.nuevo}</td>
    </tr>
  `).join("");
}

function aplicarFiltros() {
  const usuario = document.getElementById("filtroUsuario").value;
  const accion  = document.getElementById("filtroAccion").value;
  let filtrado  = AUDIT_LOGS;
  if (usuario) filtrado = filtrado.filter(l => l.usuario === usuario);
  if (accion)  filtrado = filtrado.filter(l => l.accion === accion);
  renderLogs(filtrado);
  Toast.success(`${filtrado.length} registros encontrados.`);
}

function exportarLogs() {
  Toast.success("Exportando logs de auditoría a CSV...");
}
</script>
</body>
</html>
