<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FONEVI — Auditoría</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <!-- Favicon + PWA -->
  <link rel="icon"             href="../favicon.svg"            type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-32x32.svg"   sizes="32x32" type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-16x16.svg"   sizes="16x16" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="../icons/icon-180x180.svg" sizes="180x180"/>
  <link rel="apple-touch-icon" href="../icons/icon-152x152.svg" sizes="152x152"/>
  <link rel="manifest"         href="../manifest.json"/>
  <meta name="mobile-web-app-capable"                content="yes"/>
  <meta name="apple-mobile-web-app-capable"          content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title"            content="FONEVI"/>
  <meta name="theme-color"                           content="#0f2d52"/>
  <link rel="stylesheet" href="../css/transitions.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
  <link rel="stylesheet" href="../css/loading.css"/>
</head>
<body>

<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="page-content">

      <div class="page-header">
        <h1>Seguridad y Auditoría</h1>
        <p>Registro de acciones, accesos y cambios en el sistema</p>
      </div>

      <!-- KPIs -->
      <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);" id="kpiAudit"></div>

      <!-- Tabs -->
      <div class="tab-bar" id="auditTabs" style="margin-bottom:16px;">
        <button class="tab-btn active" data-tab="logs">Registro de Acciones</button>
        <button class="tab-btn" data-tab="accesos">Accesos al Sistema</button>
        <button class="tab-btn" data-tab="cambios">Cambios de Datos</button>
      </div>

      <!-- Filtros rediseñados -->
      <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:18px;">

        <!-- Fila 1: busqueda + exportar -->
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <div class="search-box" style="flex:1; min-width:180px;">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchAudit" placeholder="Buscar en logs..." oninput="aplicarFiltros()" />
          </div>
          <button class="btn btn-secondary btn-sm" onclick="exportarLogs()" style="display:flex;align-items:center;gap:6px;">
            <span>⬇</span> Exportar CSV
          </button>
          <button class="btn btn-secondary btn-sm" onclick="limpiarFiltros()" style="display:flex;align-items:center;gap:6px;">
            <span>✕</span> Limpiar
          </button>
          <button class="btn btn-sm" id="btnLimpiarAudit" onclick="limpiarAuditoria()" style="display:flex;align-items:center;gap:6px;background:var(--red,#dc2626);color:#fff;">
            <span>🗑</span> Purgar logs
          </button>
        </div>

        <!-- Fila 2: filtro usuarios -->
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;">👤 Usuario:</span>
          <div style="display:flex;gap:6px;flex-wrap:wrap;" id="filtroUsuarioBtns">
            <button class="filter-pill active" data-filtro="usuario" data-val="" onclick="setFiltro('usuario',this)">Todos</button>
          </div>
        </div>

        <!-- Fila 3: filtro acciones -->
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <span style="font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap;">⚡ Acción:</span>
          <div style="display:flex; gap:6px; flex-wrap:wrap;" id="filtroAccionBtns">
            <button class="filter-pill active" data-filtro="accion" data-val="" onclick="setFiltro('accion', this)">
              Todas
            </button>
            <button class="filter-pill" data-filtro="accion" data-val="crear" onclick="setFiltro('accion', this)" style="--pill-color:#16a34a; --pill-bg:rgba(22,163,74,.1);">
              ✚ Crear
            </button>
            <button class="filter-pill" data-filtro="accion" data-val="editar" onclick="setFiltro('accion', this)" style="--pill-color:#d97706; --pill-bg:rgba(217,119,6,.1);">
              ✏ Editar
            </button>
            <button class="filter-pill" data-filtro="accion" data-val="eliminar" onclick="setFiltro('accion', this)" style="--pill-color:#dc2626; --pill-bg:rgba(220,38,38,.1);">
              🗑 Eliminar
            </button>
            <button class="filter-pill" data-filtro="accion" data-val="login" onclick="setFiltro('accion', this)" style="--pill-color:#2563eb; --pill-bg:rgba(37,99,235,.1);">
              🔐 Login
            </button>
            <button class="filter-pill" data-filtro="accion" data-val="aprobar" onclick="setFiltro('accion', this)" style="--pill-color:#0d1f35; --pill-bg:rgba(13,31,53,.1);">
              ✔ Aprobar
            </button>
          </div>
        </div>

      </div>

      <style>
        .filter-pill {
          display: inline-flex; align-items: center; gap: 4px;
          padding: 5px 13px; border-radius: 20px;
          font-size: 12px; font-weight: 500; cursor: pointer;
          border: 1.5px solid transparent;
          background: var(--surface2, #f1f5f9);
          color: var(--text, #0d1f35);
          transition: all .18s ease;
          white-space: nowrap;
        }
        .filter-pill:hover {
          background: var(--pill-bg, rgba(13,31,53,.08));
          border-color: var(--pill-color, var(--navy, #0d1f35));
          color: var(--pill-color, var(--navy, #0d1f35));
          transform: translateY(-1px);
          box-shadow: 0 3px 9px rgba(0,0,0,.1);
        }
        .filter-pill.active {
          background: var(--pill-bg, rgba(13,31,53,.1));
          border-color: var(--pill-color, var(--navy, #0d1f35));
          color: var(--pill-color, var(--navy, #0d1f35));
          font-weight: 600;
          box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }
        /* Dark mode */
        [data-theme="dark"] .filter-pill {
          background: rgba(255,255,255,.07);
          color: #e2e8f0;
        }
        [data-theme="dark"] .filter-pill:hover,
        [data-theme="dark"] .filter-pill.active {
          background: var(--pill-bg, rgba(255,255,255,.12));
          border-color: var(--pill-color, #94a3b8);
          color: var(--pill-color, #e2e8f0);
        }
      </style>



      <!-- Panel logs -->
      <div id="panel-logs">
        <div class="card">
          <table class="data-table" id="tablaAudit">
            <thead>
              <tr>
                <th>Fecha / Hora</th>
                <th>Usuario</th>
                <th>Rol</th>
                <th>Acción</th>
                <th>Módulo</th>
                <th>Detalle</th>
                <th>IP</th>
              </tr>
            </thead>
            <tbody id="auditTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Panel accesos -->
      <div id="panel-accesos" style="display:none;">
        <div class="card">
          <table class="data-table" id="tablaAccesos">
            <thead>
              <tr><th>Fecha</th><th>Usuario</th><th>Evento</th><th>IP</th><th>Resultado</th></tr>
            </thead>
            <tbody id="accesosTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Panel cambios -->
      <div id="panel-cambios" style="display:none;">
        <div class="card">
          <table class="data-table">
            <thead>
              <tr><th>Fecha</th><th>Usuario</th><th>Módulo</th><th>Registro</th><th>Campo</th><th>Valor anterior</th><th>Valor nuevo</th></tr>
            </thead>
            <tbody id="cambiosTbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>


<script src="../js/darkmode.js"></script>
<script src="../js/transitions.js"></script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/roles.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script src="../js/search.js"></script>
<script>
/* ── Mapa de acciones del backend a etiquetas legibles ── */
const ACCION_MAP = {
  'LOGIN':                    { label: 'login',    tipo: 'login'    },
  'CAMBIAR_PASSWORD':         { label: 'cambiar contraseña', tipo: 'editar' },
  'CREAR_SOCIO':              { label: 'crear',    tipo: 'crear'    },
  'ACTUALIZAR_SOCIO':         { label: 'editar',   tipo: 'editar'   },
  'RETIRAR_SOCIO':            { label: 'eliminar', tipo: 'eliminar' },
  'REGISTRAR_APORTE_COMPUESTO':{ label: 'crear',   tipo: 'crear'    },
  'CAMBIAR_ESTADO_APORTE':    { label: 'editar',   tipo: 'editar'   },
  'CREAR_CREDITO':            { label: 'aprobar',  tipo: 'aprobar'  },
  'PAGAR_CUOTA_CREDITO':      { label: 'crear',    tipo: 'crear'    },
};
const TABLA_MAP = {
  'socios':'Socios','aportes':'Aportes','creditos':'Créditos',
  'usuarios':'Sistema','configuracion':'Config','solidaridad_movimientos':'Solidaridad',
};
const ACCION_PILLS = { crear:'pill-green', editar:'pill-amber', eliminar:'pill-red', login:'pill-blue', aprobar:'pill-navy', 'cambiar contraseña':'pill-amber' };

let _todosLogs = [];
const _filtros = { usuario: '', accion: '' };

function mapLog(l) {
  const a = ACCION_MAP[l.accion] || { label: l.accion.toLowerCase(), tipo: 'crear' };
  let detalleTxt = '';
  if (l.detalle) {
    try {
      const d = JSON.parse(l.detalle);
      detalleTxt = Object.entries(d).map(([k,v])=>`${k}: ${v}`).join(' | ');
    } catch { detalleTxt = l.detalle; }
  }
  return {
    fecha:   new Date(l.createdAt).toLocaleString('es-CO',{dateStyle:'short',timeStyle:'short'}),
    usuario: l.usuario?.nombre || 'Sistema',
    rol:     l.usuario?.rol    || '—',
    accion:  a.label,
    modulo:  TABLA_MAP[l.tabla] || l.tabla || 'Sistema',
    detalle: detalleTxt || `Acción: ${l.accion}`,
    ip:      l.ip || '—',
    raw:     l,
  };
}

function renderKPIs(logs) {
  const hoy = new Date().toLocaleDateString('es-CO');
  const hoyN = logs.filter(l=>new Date(l.createdAt).toLocaleDateString('es-CO')===hoy).length;
  const logins = logs.filter(l=>l.accion==='LOGIN').length;
  const usuarios = new Set(logs.filter(l=>l.usuario).map(l=>l.usuarioId)).size;
  document.getElementById('kpiAudit').innerHTML = `
    <div class="kpi-card blue"><div class="kpi-label">Total acciones</div><div class="kpi-value">${logs.length}</div><div class="kpi-footer">En el período</div><div class="kpi-bg-icon">📋</div></div>
    <div class="kpi-card green"><div class="kpi-label">Acciones hoy</div><div class="kpi-value">${hoyN}</div><div class="kpi-bg-icon">📅</div></div>
    <div class="kpi-card gold"><div class="kpi-label">Inicios de sesión</div><div class="kpi-value">${logins}</div><div class="kpi-bg-icon">🔐</div></div>
    <div class="kpi-card navy"><div class="kpi-label">Usuarios activos</div><div class="kpi-value">${usuarios}</div><div class="kpi-bg-icon">👥</div></div>`;
}

const PILL_COLORS = ['#e53e3e','#d97706','#2563eb','#16a34a','#7c3aed','#0891b2'];
function buildUsuarioPills(logs) {
  const usuarios = [...new Set(logs.map(l=>l.usuario?.nombre).filter(Boolean))];
  const cont = document.getElementById('filtroUsuarioBtns');
  cont.innerHTML = `<button class="filter-pill active" data-filtro="usuario" data-val="" onclick="setFiltro('usuario',this)">Todos</button>`;
  usuarios.forEach((u,i)=>{
    const c = PILL_COLORS[i % PILL_COLORS.length];
    const btn = document.createElement('button');
    btn.className = 'filter-pill';
    btn.dataset.filtro = 'usuario';
    btn.dataset.val = u;
    btn.style.cssText = `--pill-color:${c};--pill-bg:${c}1a`;
    btn.textContent = u;
    btn.onclick = function(){ setFiltro('usuario',this); };
    cont.appendChild(btn);
  });
}

function renderLogs(logs) {
  const mapped = logs.map(mapLog);
  document.getElementById('auditTbody').innerHTML = mapped.length
    ? mapped.map(l=>`<tr>
        <td class="mono muted" style="font-size:11px;white-space:nowrap">${l.fecha}</td>
        <td style="font-weight:500">${l.usuario}</td>
        <td><span class="pill ${l.rol==='administrador'?'pill-red':l.rol==='tesorero'?'pill-amber':'pill-blue'}" style="font-size:10px">${l.rol}</span></td>
        <td><span class="pill ${ACCION_PILLS[l.accion]||'pill-navy'}" style="font-size:10px">${l.accion}</span></td>
        <td class="muted">${l.modulo}</td>
        <td style="font-size:12px;max-width:260px">${l.detalle}</td>
        <td class="mono muted" style="font-size:11px">${l.ip}</td>
      </tr>`).join('')
    : '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted)">Sin registros</td></tr>';
}

function renderAccesos(logs) {
  const logins = logs.filter(l=>l.accion==='LOGIN').map(l=>({
    fecha:    new Date(l.createdAt).toLocaleString('es-CO',{dateStyle:'short',timeStyle:'short'}),
    usuario:  l.usuario?.nombre||'Sistema',
    ip:       l.ip||'—',
  }));
  document.getElementById('accesosTbody').innerHTML = logins.length
    ? logins.map(l=>`<tr>
        <td class="mono muted" style="font-size:11px">${l.fecha}</td>
        <td style="font-weight:500">${l.usuario}</td>
        <td class="muted">Login</td>
        <td class="mono muted" style="font-size:11px">${l.ip}</td>
        <td><span class="pill pill-green">Exitoso</span></td>
      </tr>`).join('')
    : '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--muted)">Sin registros de acceso</td></tr>';
}

function renderCambios(logs) {
  const cambios = logs.filter(l=>['ACTUALIZAR_SOCIO','CAMBIAR_ESTADO_APORTE','CAMBIAR_PASSWORD'].includes(l.accion));
  document.getElementById('cambiosTbody').innerHTML = cambios.length
    ? cambios.map(l=>{
        let det={}; try{det=JSON.parse(l.detalle||'{}');}catch{}
        return `<tr>
          <td class="mono muted" style="font-size:11px">${new Date(l.createdAt).toLocaleString('es-CO',{dateStyle:'short',timeStyle:'short'})}</td>
          <td style="font-weight:500">${l.usuario?.nombre||'Sistema'}</td>
          <td class="muted">${TABLA_MAP[l.tabla]||l.tabla||'—'}</td>
          <td style="font-size:12px">${l.registroId||'—'}</td>
          <td class="muted">${l.accion}</td>
          <td colspan="2" style="font-size:12px">${JSON.stringify(det)}</td>
        </tr>`;
      }).join('')
    : '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted)">Sin cambios registrados</td></tr>';
}

function setFiltro(tipo, btn) {
  const grupo = btn.closest('[id^="filtro"]');
  if (grupo) grupo.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  _filtros[tipo] = btn.dataset.val;
  aplicarFiltros();
}

function aplicarFiltros() {
  const texto = (document.getElementById('searchAudit').value||'').toLowerCase();
  let f = _todosLogs;
  if (_filtros.usuario) f = f.filter(l=>(l.usuario?.nombre||'')=== _filtros.usuario);
  if (_filtros.accion)  f = f.filter(l=>{
    const mapped = (ACCION_MAP[l.accion]||{}).tipo||l.accion.toLowerCase();
    return mapped === _filtros.accion;
  });
  if (texto) f = f.filter(l=>{
    const m = mapLog(l);
    return (m.usuario+m.rol+m.accion+m.modulo+m.detalle+m.ip).toLowerCase().includes(texto);
  });
  renderLogs(f);
}

function limpiarFiltros() {
  _filtros.usuario=''; _filtros.accion='';
  document.getElementById('searchAudit').value='';
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.filter-pill[data-val=""]').forEach(b=>b.classList.add('active'));
  renderLogs(_todosLogs);
  Toast.success('Filtros limpiados.');
}

function exportarLogs() {
  if (!_todosLogs.length) { Toast.warn('No hay datos para exportar.'); return; }
  const rows = _todosLogs.map(l=>{
    const m=mapLog(l);
    return [m.fecha,m.usuario,m.rol,m.accion,m.modulo,`"${m.detalle.replace(/"/g,"'")}"`,m.ip].join(',');
  });
  const csv = 'Fecha,Usuario,Rol,Acción,Módulo,Detalle,IP\n'+rows.join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='auditoria_fonevi_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  Toast.success('CSV exportado correctamente.');
}

async function limpiarAuditoria() {
  const dias = prompt('¿Eliminar registros anteriores a cuántos días?\n(Se recomienda 90 días)', '90');
  if (!dias || isNaN(dias)) return;
  if (!confirm(`¿Confirmas eliminar logs anteriores a ${dias} días? Esta acción NO se puede deshacer.`)) return;
  try {
    const r = await API.auditoria.limpiar(parseInt(dias));
    if (r?.ok) { Toast.success(r.mensaje); await cargarLogs(); }
    else Toast.error(r?.mensaje || 'Error al limpiar');
  } catch(e) { Toast.error('Error: '+e.message); }
}

async function cargarLogs() {
  document.getElementById('auditTbody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px">⏳ Cargando...</td></tr>';
  try {
    const r = await API.auditoria.listar({ limit: 300 });
    if (!r?.ok) { Toast.error(r?.mensaje || 'Error al cargar auditoría'); return; }
    _todosLogs = r.datos || [];
    renderKPIs(_todosLogs);
    buildUsuarioPills(_todosLogs);
    renderLogs(_todosLogs);
  } catch(e) { Toast.error('Error de conexión: '+e.message); }
}

document.addEventListener('DOMContentLoaded', () => {
  if (!Roles.proteger('auditoria')) return;
  buildLayout('Auditoría', 'Solo accesible para administradores', '');
  cargarLogs();
  initTabs('auditTabs', function(tab) {
    ['logs','accesos','cambios'].forEach(p=>{
      document.getElementById('panel-'+p).style.display = tab===p ? 'block' : 'none';
    });
    if (tab==='accesos') renderAccesos(_todosLogs);
    if (tab==='cambios') renderCambios(_todosLogs);
  });
});
</script>
</body>
</html>
