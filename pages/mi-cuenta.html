    /* ══ HERO PERSONAL ══════════════════════════════════════ */
    .cuenta-hero {
      background: linear-gradient(135deg,var(--navy-900) 0%,var(--navy-800) 55%,var(--navy-950) 100%);
      border-radius: var(--r-xl); padding: 30px 32px; margin-bottom: 22px;
      display: flex; align-items: center; gap: 26px;
      position: relative; overflow: hidden; box-shadow: var(--shadow-lg);
    }
    .cuenta-hero::before {
      content:''; position:absolute; inset:0;
      background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.025) 1px,transparent 0);
      background-size:28px 28px; pointer-events:none;
    }
    .cuenta-hero::after {
      content:''; position:absolute; width:260px; height:260px;
      background:radial-gradient(circle,rgba(201,146,42,.18) 0%,transparent 70%);
      border-radius:50%; right:-40px; bottom:-80px; pointer-events:none;
    }
    .hero-avatar {
      width:72px; height:72px; border-radius:50%;
      background:linear-gradient(135deg,var(--gold-300),var(--gold-600));
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-display); font-size:26px; font-weight:600;
      color:#fff; flex-shrink:0; border:3px solid rgba(255,255,255,.2);

    }
    .hero-info    { flex:1; position:relative; z-index:1; }
    .hero-saludo  { font-size:12px; color:rgba(255,255,255,.5); margin-bottom:4px; letter-spacing:.5px; }

    .hero-cargo   { font-size:13px; color:rgba(255,255,255,.55); }
    .hero-stats   { display:flex; gap:24px; position:relative; z-index:1; }
    .hero-stat    { text-align:center; }
    .hero-stat-num{ font-family:var(--font-display); font-size:24px; font-weight:400; color:var(--gold-300); display:block; line-height:1; }
    .hero-stat-lbl{ font-size:10px; color:rgba(255,255,255,.4); margin-top:4px; text-transform:uppercase; letter-spacing:.8px; }
    .hero-stat-sep{ width:1px; background:rgba(255,255,255,.1); align-self:stretch; }

    /* ══ SALDO PRINCIPAL ════════════════════════════════════ */

      background:linear-gradient(135deg,var(--navy-800),var(--navy-950));

      border-radius:50%; right:-30px; bottom:-50px; pointer-events:none;
    }
    .sp-label { font-size:11px; font-weight:600; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:8px; }
    .sp-monto { font-family:var(--font-display); font-size:38px; font-weight:400; color:var(--gold-300); letter-spacing:-1.5px; line-height:1; }
    .sp-change{ display:flex; align-items:center; gap:6px; margin-top:8px; }
    .sp-trend { font-size:12px; font-weight:600; padding:3px 9px; border-radius:var(--r-full); }

    /* ══ CRÉDITO ACTIVO — diseño navy/gold ══════════════════ */

    .cs-monto{ font-family:var(--font-display); font-size:28px; color:#fff; letter-spacing:-.5px; line-height:1; }

    .cs-info-lbl   { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:rgba(255,255,255,.35); margin-bottom:4px; }
    .cs-info-val   { font-size:13.5px; font-weight:700; color:#fff; }
    .cs-info-val.gold { color:var(--gold-300,#e0af50); }
    .cs-disp  { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10); border-radius:var(--r-md); padding:12px 14px; display:flex; justify-content:space-between; align-items:center; position:relative; z-index:1; }

    /* ══ MÉTRICAS DEL FONDO ═════════════════════════════════ */

    .fondo-label{ font-size:10.5px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.7px; margin-bottom:8px; }

    <div class="app-layout" style="padding:40px;max-width:900px;margin:0 auto;">
      <h1 style="font-family:var(--font-display);margin-bottom:14px;">Mi Cuenta</h1>
      <div id="mc-root" style="background:var(--bg-surface);border:1px solid var(--border-faint);border-radius:12px;padding:20px;">
        <div id="mc-loading">Cargando información de tu cuenta…</div>
        <div id="mc-error" style="display:none;color:var(--red-600);"></div>
        <div id="mc-content" style="display:none;">
          <div style="margin-bottom:8px;"><strong>Nombre:</strong> <span id="mc-nombre">—</span></div>
          <div style="margin-bottom:8px;"><strong>Documento:</strong> <span id="mc-documento">—</span></div>
          <div style="margin-bottom:8px;"><strong>Código socio:</strong> <span id="mc-codigo">—</span></div>
          <div style="margin-bottom:8px;"><strong>Estado:</strong> <span id="mc-estado">—</span></div>
          <div style="margin-bottom:8px;"><strong>Ahorro acumulado:</strong> <span id="mc-ahorro">—</span></div>
        </div>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
      (async function(){
        try {
          const session = Auth.getSession();
          if (!session) { window.location.href = "../index.html"; return; }
          if ((session.rol||'').toLowerCase() !== 'socio') {
            document.getElementById('mc-loading').style.display='none';
            document.getElementById('mc-error').style.display='block';
            document.getElementById('mc-error').textContent = 'Acceso denegado: esta página es solo para socios.';
            return;
          }

          const res = await API.get('/socios/perfil');
          if (!res || !res.ok) throw new Error(res?.mensaje || 'No se pudo cargar el perfil');
          const p = res.datos || {};

          document.getElementById('mc-nombre').textContent = p.nombre || '—';
          document.getElementById('mc-documento').textContent = p.documento || '—';
          document.getElementById('mc-codigo').textContent = p.codigo_socio || p.codigo || '—';
          document.getElementById('mc-estado').textContent = p.estado || '—';
          document.getElementById('mc-ahorro').textContent = (typeof p.ahorro_acumulado === 'number') ? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(p.ahorro_acumulado) : (p.ahorro_acumulado || '—');

          document.getElementById('mc-loading').style.display='none';
          document.getElementById('mc-content').style.display='block';
        } catch (err) {
          document.getElementById('mc-loading').style.display='none';
          document.getElementById('mc-error').style.display='block';
          document.getElementById('mc-error').textContent = 'Error cargando perfil: ' + (err.message || 'Error de conexión');
          console.error('[MiCuenta] ', err);
        }
      })();
    </script>

<script>
/* ════════════════════════════════════════════════════════════
   MI CUENTA — JS completo
════════════════════════════════════════════════════════════ */
var _socioActual = null;
var _simulSocio  = null;
var _donutChart  = null;

window.refreshUI = function() {
  var session = Auth.getSession();
  if (!session) { window.location.href = "../index.html"; return; }

  /* Buscar socio: email exacto → usuario → nombre */
  var socio = (function() {
    var s = session;
    var r = DB.socios.find(function(x){ return x.email === s.email; });
    if (r) return r;
    var u = s.email ? s.email.split("@")[0] : "";
    r = DB.socios.find(function(x){ return x.email && x.email.split("@")[0] === u; });
    if (r) return r;
    var n = s.nombre ? s.nombre.toLowerCase().trim() : "";
    r = DB.socios.find(function(x){ return x.nombre && x.nombre.toLowerCase().trim() === n; });
    if (r) return r;
    return DB.socios.find(function(x){ return x.estado === "activo"; }) || DB.socios[0];
  })();

  if (!socio) {
    document.querySelector(".page-content").innerHTML =
      '<div style="text-align:center;padding:60px 20px;">' +
      '<div style="font-size:40px;margin-bottom:12px;">⚠️</div>' +
      '<div style="font-size:18px;font-weight:600;margin-bottom:8px;">Socio no encontrado</div>' +
      '<div style="color:var(--text-muted);">No se encontró información asociada a tu cuenta.</div>' +
      '</div>';
    return;
  }

  _socioActual = socio;

  renderHero(socio);
  renderSaldo(socio);
  renderCredito(socio);
  renderInfoFondo();
  renderRendimientos(socio);
  renderMisAportes(socio);
  renderMetricasFondo(socio);
};

document.addEventListener("DOMContentLoaded", function() {
  buildLayout("Mi Cuenta", "Bienvenido — " + DB.config.periodo_actual, "");
  if (DB.socios && DB.socios.length > 0) {
    window.refreshUI();
  }
});

/* ── Comprobantes ─────────────────────────────────────────── */
function imprimirMiEstadoCuenta() {
  if (!_socioActual) { Toast.warn("Cargando datos..."); return; }
  Comprobantes.imprimirEstadoCuenta(_socioActual.id);
}
function imprimirMiPazYSalvo() {
  if (!_socioActual) { Toast.warn("Cargando datos..."); return; }
  Comprobantes.imprimirPazYSalvo(_socioActual.id);
}

/* ── renderHero ───────────────────────────────────────────── */
function renderHero(s) {
  var ini   = s.nombre.split(" ").map(function(p){return p[0];}).slice(0,2).join("");
  var ap    = DataHelper.getAportesSocio(s.id);
  var pg    = ap.filter(function(a){return a.estado==="pagado";}).length;
  var meses = calcMeses(s.fecha_ingreso);
  document.getElementById("cuentaHero").innerHTML =
    '<div class="hero-avatar">' + ini + '</div>' +
    '<div class="hero-info">' +
      '<div class="hero-saludo">Bienvenido de nuevo</div>' +
      '<div class="hero-nombre">' + s.nombre + '</div>' +
      '<div class="hero-cargo">' + (s.cargo||"—") + ' &nbsp;·&nbsp; ' + (s.sede||"—") + '</div>' +
    '</div>' +
    '<div class="hero-stats">' +
      heroStat(fmtM(s.ahorro_acumulado), "Mi ahorro") +
      '<div class="hero-stat-sep"></div>' +
      heroStat(pg, "Aportes pagados") +
      '<div class="hero-stat-sep"></div>' +
      heroStat(meses + " meses", "Antigüedad") +
    '</div>';
}
function heroStat(n, l) {
  return '<div class="hero-stat"><span class="hero-stat-num">' + n + '</span>' +
    '<span class="hero-stat-lbl">' + l + '</span></div>';
}

/* ── renderCredito ────────────────────────────────────────── */
function renderCredito(s) {
  var creditos = DataHelper.getCreditosSocio(s.id).filter(function(cr){
    return cr.estado==="activo" || cr.estado==="mora";
  });
  var maxCred = s.ahorro_acumulado * (DB.config.max_credito_multiplicador||3);
  var deuda   = creditos.reduce(function(t,cr){return t+cr.saldo_capital;},0);
  var disp    = Math.max(0, maxCred - deuda);
  var panel   = document.getElementById("creditoPanel");

  if (creditos.length > 0) {
    var cr      = creditos[0];
    var pct     = Math.round((cr.cuotas_pagadas/cr.cuotas)*100);
    var cuotaV  = calcCuota(cr.monto, cr.tasa_mensual, cr.cuotas);
    var esMora  = cr.estado==="mora";
    panel.innerHTML =
      '<div class="credito-socio">' +
        '<div class="cs-head">' +
          '<div>' +
            '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.38);margin-bottom:6px;">Crédito activo</div>' +
            '<div class="cs-monto">' + DataHelper.formatCOP(cr.monto) + '</div>' +
            '<div class="cs-prop">' + (cr.proposito||"Crédito #"+cr.id) + '</div>' +
          '</div>' +
          '<span style="padding:4px 12px;border-radius:var(--r-full);font-size:10.5px;font-weight:700;background:' +
            (esMora?'rgba(163,45,45,.35);color:#fca5a5;border:1px solid rgba(163,45,45,.4);'
                   :'rgba(29,158,117,.25);color:#6ee7b7;border:1px solid rgba(29,158,117,.35);') +
            '">' + (esMora?"⚠ En mora":"✓ Al día") + '</span>' +
        '</div>' +
        '<div class="cs-progreso">' +
          '<div class="cs-prog-label"><span>Progreso de pago</span><span class="cs-prog-pct">' + pct + '% completado</span></div>' +
          '<div class="cs-prog-track"><div class="cs-prog-fill" style="width:'+pct+'%;"></div></div>' +
        '</div>' +
        '<div class="cs-info">' +
          csInfoN("Saldo pendiente",  DataHelper.formatCOP(cr.saldo_capital),"gold") +
          csInfoN("Cuota mensual",    DataHelper.formatCOP(cuotaV),"") +
          csInfoN("Cuotas pagadas",   cr.cuotas_pagadas+"/"+cr.cuotas,"") +
          csInfoN("Cuotas restantes", cr.cuotas-cr.cuotas_pagadas,"") +
        '</div>' +
        '<div class="cs-disp">' +
          '<span class="cs-disp-lbl">Capacidad disponible</span>' +
          '<span class="cs-disp-val">' + DataHelper.formatCOP(disp) + '</span>' +
        '</div>' +
      '</div>';
  } else {
    panel.innerHTML =
      '<div class="credito-libre">' +
        '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.38);margin-bottom:10px;position:relative;z-index:1;">Sin créditos activos</div>' +
        '<div style="font-family:var(--font-display);font-size:32px;font-weight:400;color:var(--gold-300,#e0af50);letter-spacing:-.5px;margin-bottom:6px;position:relative;z-index:1;">' + DataHelper.formatCOP(disp) + '</div>' +
        '<div style="font-size:12.5px;color:rgba(255,255,255,.45);margin-bottom:20px;position:relative;z-index:1;">Capacidad de crédito disponible</div>' +
        '<div style="background:rgba(29,158,117,.15);border:1px solid rgba(29,158,117,.3);border-radius:var(--r-md);padding:12px 14px;position:relative;z-index:1;">' +
          '<div style="font-size:11px;font-weight:700;color:rgba(110,231,183,.8);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;">✓ Sin mora activa</div>' +
          '<div style="font-size:12px;color:rgba(255,255,255,.4);line-height:1.6;">Basado en ' + DB.config.max_credito_multiplicador + '× tu ahorro &nbsp;·&nbsp; Tasa: <strong style="color:rgba(255,255,255,.7);">' + DB.config.tasa_credito_mensual + '%</strong></div>' +
        '</div>' +
        '<button type="button" onclick="simulAbrir()" style="display:block;width:100%;margin-top:14px;padding:11px;border:none;border-radius:var(--r-md);cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:700;position:relative;z-index:1;background:linear-gradient(90deg,var(--gold-500),var(--gold-400));color:#fff;box-shadow:0 3px 12px rgba(201,146,42,.35);transition:all .2s ease;">📊 Simular nuevo crédito</button>' +
      '</div>';
  }
}
function csInfoN(lbl,val,cls){
  return '<div class="cs-info-item"><div class="cs-info-lbl">'+lbl+'</div><div class="cs-info-val '+cls+'">'+val+'</div></div>';
}
function calcCuota(m,t,n){
  var r=t/100;
  return r===0?Math.round(m/n):Math.round(m*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1));
}

/* ── renderRendimientos ───────────────────────────────────── */
function renderRendimientos(s) {
  var tasa  = DB.config.tasa_credito_mensual/100;
  var meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio"];
  var maxR  = s.ahorro_acumulado * tasa;
  var rows  = meses.map(function(mes,i){
    var base = s.ahorro_acumulado + (s.aporte_mensual*i);
    var rend = Math.round(base*tasa);
    var pct  = maxR>0?Math.round(rend/maxR*100):100;
    return '<div class="rend-item">' +
      '<span class="rend-mes">'+mes+' 2026</span>' +
      '<div class="rend-bar"><div class="rend-fill" style="width:'+pct+'%"></div></div>' +
      '<span class="rend-pct">'+DB.config.tasa_credito_mensual+'%</span>' +
      '<span class="rend-monto">+'+DataHelper.formatCOP(rend)+'</span>' +
    '</div>';
  }).join("");
  var total = Math.round(s.ahorro_acumulado*tasa*12);
  rows += '<div style="padding:12px 20px;background:var(--bg-subtle);border-top:1px solid var(--border-faint);display:flex;justify-content:space-between;align-items:center;">' +
    '<span style="font-size:12.5px;font-weight:600;">Total estimado 2026</span>' +
    '<span style="font-size:15px;font-weight:700;color:var(--green-500);">+'+DataHelper.formatCOP(total)+'</span>' +
  '</div>';
  document.getElementById("rendimientos").innerHTML = rows;
  var el = document.getElementById("tasaLabel");
  if (el) el.textContent = "Tasa "+DB.config.tasa_credito_mensual+"% m.e.a.";
}

/* ── renderMisAportes ─────────────────────────────────────── */
function renderMisAportes(s) {
  var ap  = DataHelper.getAportesSocio(s.id);
  var pg  = ap.filter(function(a){return a.estado==="pagado";}).length;
  var mo  = ap.filter(function(a){return ["mora","vencido"].includes(a.estado);}).length;
  var pe  = ap.filter(function(a){return a.estado==="pendiente";}).length;
  var tot = ap.filter(function(a){return a.estado==="pagado";}).reduce(function(t,a){return t+a.monto;},0);
  var dotMap = {pagado:"dot-p",pendiente:"dot-n",mora:"dot-m",vencido:"dot-m"};
  document.getElementById("resumenAportes").textContent =
    pg+" pagados · "+pe+" pendientes"+(mo>0?" · ⚠ "+mo+" mora":"");
  document.getElementById("misAportes").innerHTML =
    ap.slice().reverse().map(function(a){
      return '<div class="aporte-row">' +
        '<div class="aporte-dot '+(dotMap[a.estado]||"dot-n")+'"></div>' +
        '<span class="ar-periodo">'+a.periodo+'</span>' +
        '<span class="ar-monto">'+DataHelper.formatCOP(a.monto)+'</span>' +
        '<span class="ar-fecha">'+(a.fecha_pago?DataHelper.formatFecha(a.fecha_pago):"—")+'</span>' +
        DataHelper.estadoPill(a.estado) +

    '<div style="padding:12px 20px;background:var(--bg-subtle);border-top:1px solid var(--border-faint);display:flex;justify-content:space-between;">' +
      '<span style="font-size:12.5px;font-weight:600;">Total aportado</span>' +
      '<span style="font-size:13px;font-weight:700;color:var(--green-500);">'+DataHelper.formatCOP(tot)+'</span>' +
    '</div>';
}

/* ── renderMetricasFondo ──────────────────────────────────── */
function renderMetricasFondo(s) {
  var totalAh = DataHelper.getTotalAhorros();
  var activos = DB.socios.filter(function(x){return x.estado==="activo";}).length;
  var partic  = totalAh>0?((s.ahorro_acumulado/totalAh)*100).toFixed(2):"0.00";
  var dividEst= Math.round(s.ahorro_acumulado*0.08);
  document.getElementById("fTotalSocios").textContent   = activos;
  document.getElementById("fTotalAhorros").textContent  = fmtM(totalAh);
  document.getElementById("fParticipacion").textContent = partic+"%";
  document.getElementById("fDividendo").textContent     = DataHelper.formatCOP(dividEst);
}

/* ── Helpers ──────────────────────────────────────────────── */
function fmtM(v) {
  if (v>=1000000) return "$"+(v/1000000).toFixed(1)+"M";
  if (v>=1000)    return "$"+Math.round(v/1000)+"k";
  return "$"+v;
}
function calcMeses(fecha) {
  if (!fecha) return 0;
  var d=new Date(fecha+"T00:00:00"), h=new Date("2026-03-22");
  return Math.max(1,(h.getFullYear()-d.getFullYear())*12+(h.getMonth()-d.getMonth()));
}

/* ════════════════════════════════════════════════════════════
   SIMULADOR DE CRÉDITO
════════════════════════════════════════════════════════════ */
function simulAbrir() {
  var socio = _socioActual;
  if (!socio) { Toast.warn("Carga tu perfil primero."); return; }
  _simulSocio = socio;
  var tasa = DB.config.tasa_credito_mensual||1.5;
  var mult = DB.config.max_credito_multiplicador||3;
  var deuda = DataHelper.getCreditosSocio(socio.id)
    .filter(function(c){return c.estado!=="pagado";})
    .reduce(function(t,cr){return t+cr.saldo_capital;},0);
  var cap = Math.max(0, socio.ahorro_acumulado*mult - deuda);
  document.getElementById("sc-ahorro").textContent = DataHelper.formatCOP(socio.ahorro_acumulado);
  document.getElementById("sc-max").textContent    = DataHelper.formatCOP(cap);
  document.getElementById("sc-tasa").textContent   = tasa+"%";
  var sl = document.getElementById("sc-monto");
  sl.max   = Math.max(1000000, Math.min(cap, 30000000));
  sl.value = Math.min(1000000, cap);
  simulCalc();
  document.getElementById("simulModal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function simulCerrar() {
  document.getElementById("simulModal").classList.remove("open");
  document.body.style.overflow = "";
}
function simulCalc() {
  if (!_simulSocio) return;
  var monto  = parseInt(document.getElementById("sc-monto").value)||0;
  var cuotas = parseInt(document.getElementById("sc-cuotas").value)||12;
  var tasa   = DB.config.tasa_credito_mensual||1.5;
  var mult   = DB.config.max_credito_multiplicador||3;
  var deuda  = DataHelper.getCreditosSocio(_simulSocio.id)
    .filter(function(c){return c.estado!=="pagado";})
    .reduce(function(t,cr){return t+cr.saldo_capital;},0);
  var cap   = Math.max(0, _simulSocio.ahorro_acumulado*mult - deuda);
  var r     = tasa/100;
  var cuota = r===0?Math.round(monto/cuotas):Math.round(monto*(r*Math.pow(1+r,cuotas))/(Math.pow(1+r,cuotas)-1));
  var total = cuota*cuotas;
  var inter = Math.max(0,total-monto);
  var pctC  = cap>0?Math.min(200,Math.round(monto/cap*100)):0;
  document.getElementById("sc-monto-lbl").textContent  = DataHelper.formatCOP(monto);
  document.getElementById("sc-cuotas-lbl").textContent = cuotas+" meses";
  document.getElementById("sc-cuota").textContent      = DataHelper.formatCOP(cuota);
  document.getElementById("sc-cuota-per").textContent  = "durante "+cuotas+" mes"+(cuotas!==1?"es":"");
  document.getElementById("sc-total").textContent      = DataHelper.formatCOP(total);
  document.getElementById("sc-intereses").textContent  = DataHelper.formatCOP(inter);
  document.getElementById("sc-costo-mil").textContent  = DataHelper.formatCOP(Math.round(cuota/(monto/1000)));
  var barra = document.getElementById("sc-barra");
  barra.style.width = Math.min(100,pctC)+"%";
  barra.className   = "simul-barra-inner "+(pctC>100?"over":pctC>80?"warn":"ok");
  document.getElementById("sc-pct-cap").textContent = pctC+"%";
  var alertEl = document.getElementById("sc-alert");
  var btnSol  = document.getElementById("sc-btn-sol");
  if (monto>cap) {
    alertEl.style.display="block"; alertEl.className="simul-alert warn";
    alertEl.innerHTML="⚠ Supera tu capacidad ("+DataHelper.formatCOP(cap)+"). Requiere aprobación de junta.";
    btnSol.textContent="Solicitar con aprobación especial"; btnSol.disabled=false;
  } else if (monto<=0) {
    alertEl.style.display="none"; btnSol.disabled=true;
  } else {
    alertEl.style.display="block"; alertEl.className="simul-alert ok";
    alertEl.innerHTML="✓ Dentro de tu capacidad aprobada. Disponible: <strong>"+DataHelper.formatCOP(cap)+"</strong>.";
    btnSol.disabled=false; btnSol.textContent="Solicitar este crédito →";
  }
  /* Tabla amort. preview */
  var saldo=monto, filas="", mostrar=Math.min(6,cuotas);
  for (var i=1;i<=mostrar;i++) {
    var ii=Math.round(saldo*r), ci=cuota-ii;
    if (i===cuotas) ci=saldo;
    saldo-=ci;
    filas+="<tr><td>"+i+"</td><td>"+DataHelper.formatCOP(cuota)+"</td><td class='capital-td'>"+DataHelper.formatCOP(ci)+"</td><td class='interes-td'>"+DataHelper.formatCOP(ii)+"</td><td>"+DataHelper.formatCOP(Math.max(0,saldo))+"</td></tr>";
  }
  if (cuotas>6) filas+="<tr><td colspan='5' style='text-align:center;color:var(--text-muted);font-style:italic;'>... "+(cuotas-6)+" cuota"+(cuotas-6>1?"s":"")+" más</td></tr>";
  document.getElementById("sc-amort-body").innerHTML = filas;
  /* Donut */
  _actualizarDonut(monto, inter);
}
function _actualizarDonut(monto, interes) {
  var pct = (monto+interes)>0?Math.round(monto/(monto+interes)*100):0;
  document.getElementById("sc-pct-cap-donut").textContent = pct+"%";
  var canvas = document.getElementById("sc-donut");
  if (!canvas || typeof Chart==="undefined") return;
  if (_donutChart) { _donutChart.destroy(); _donutChart=null; }
  _donutChart = new Chart(canvas.getContext("2d"),{
    type:"doughnut",
    data:{labels:["Capital","Intereses"],datasets:[{data:[monto,interes],backgroundColor:["#0f2d52","#c9922a"],borderWidth:0,hoverOffset:4}]},
    options:{responsive:false,cutout:"70%",plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return " "+c.label+": "+new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",minimumFractionDigits:0}).format(c.raw);}}}}}
  });
}
function simulSolicitar() {
  var monto=parseInt(document.getElementById("sc-monto").value);
  var cuotas=parseInt(document.getElementById("sc-cuotas").value);
  var tasa=DB.config.tasa_credito_mensual||1.5;
  var r=tasa/100;
  var cuota=Math.round(monto*(r*Math.pow(1+r,cuotas))/(Math.pow(1+r,cuotas)-1));
  simulCerrar();
  Toast.success("Solicitud registrada: "+DataHelper.formatCOP(monto)+" a "+cuotas+" cuotas de "+DataHelper.formatCOP(cuota)+"/mes. El tesorero la revisará en 24h.");
}
function simulTablaCompleta() {
  var monto=parseInt(document.getElementById("sc-monto").value)||0;
  var cuotas=parseInt(document.getElementById("sc-cuotas").value)||12;
  var tasa=DB.config.tasa_credito_mensual||1.5;
  var r=tasa/100;
  var cuota=Math.round(monto*(r*Math.pow(1+r,cuotas))/(Math.pow(1+r,cuotas)-1));
  var saldo=monto,totInt=0,totCap=0,filas="";
  for (var i=1;i<=cuotas;i++) {
    var ii=Math.round(saldo*r), ci=cuota-ii;
    if (i===cuotas) ci=saldo;
    saldo=Math.max(0,saldo-ci); totInt+=ii; totCap+=ci;
    filas+="<tr style='"+(i%2===0?"background:var(--bg-subtle);":"")+"'>" +
      "<td style='text-align:center;font-weight:700;'>"+i+"</td>" +
      "<td style='text-align:right;'>"+DataHelper.formatCOP(cuota)+"</td>" +
      "<td style='text-align:right;font-weight:600;color:var(--navy-700);'>"+DataHelper.formatCOP(ci)+"</td>" +
      "<td style='text-align:right;color:var(--red-500);'>"+DataHelper.formatCOP(ii)+"</td>" +
      "<td style='text-align:right;'>"+DataHelper.formatCOP(saldo)+"</td></tr>";
  }
  filas+="<tr style='font-weight:700;border-top:2px solid var(--border-light);background:var(--navy-50,#e8f0f8);'>" +
    "<td style='text-align:center;'>Σ</td><td style='text-align:right;'>"+DataHelper.formatCOP(cuota*cuotas)+"</td>" +
    "<td style='text-align:right;color:var(--navy-700);'>"+DataHelper.formatCOP(totCap)+"</td>" +
    "<td style='text-align:right;color:var(--red-500);'>"+DataHelper.formatCOP(totInt)+"</td>" +
    "<td style='text-align:right;'>$0</td></tr>";
  document.getElementById("amortTbodyCompleto").innerHTML = filas;
  document.getElementById("amortTitle").textContent = "Amortización — "+DataHelper.formatCOP(monto)+" · "+cuotas+" cuotas";
  document.getElementById("amortResumen").innerHTML =
    "Capital: <strong>"+DataHelper.formatCOP(totCap)+"</strong> · "+
    "Intereses: <strong style='color:var(--red-500);'>"+DataHelper.formatCOP(totInt)+"</strong> · "+
    "Total: <strong>"+DataHelper.formatCOP(cuota*cuotas)+"</strong>";
  Modal.open("modalAmort");
}
function simulExportarPDF() {
  if (typeof window.jspdf==="undefined") { Toast.warn("Cargando PDF..."); return; }
  var {jsPDF}=window.jspdf;
  var monto=parseInt(document.getElementById("sc-monto").value)||0;
  var cuotas=parseInt(document.getElementById("sc-cuotas").value)||12;
  var tasa=DB.config.tasa_credito_mensual||1.5;
  var r=tasa/100;
  var cuota=Math.round(monto*(r*Math.pow(1+r,cuotas))/(Math.pow(1+r,cuotas)-1));
  var total=cuota*cuotas, interes=Math.max(0,total-monto);
  var socio=_simulSocio||{};
  var hoy=new Date().toLocaleDateString("es-CO",{day:"2-digit",month:"long",year:"numeric"});
  var doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  doc.setFillColor(15,45,82); doc.rect(0,0,210,28,"F");
  doc.setFillColor(201,146,42); doc.rect(0,28,210,2,"F");
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold"); doc.setFontSize(18); doc.text("FONEVI",14,12);
  doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.text(DB.config.nombre_completo||"Fondo de Empleados Docentes",14,19);
  doc.text("NIT: "+(DB.config.nit||""),14,24);
  doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.text("SIMULACIÓN DE CRÉDITO",196,13,{align:"right"});
  doc.setFont("helvetica","normal"); doc.setFontSize(8.5);
  doc.text("Generado: "+hoy,196,19,{align:"right"});
  doc.text("Solo informativo — no es una oferta vinculante",196,24,{align:"right"});
  var y=40;
  doc.setTextColor(60); doc.setFont("helvetica","bold"); doc.setFontSize(9.5);
  doc.setFillColor(235,242,255); doc.rect(10,y-5,190,8,"F"); doc.text("DATOS DEL SOLICITANTE",14,y); y+=10;
  doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.text("Socio:",14,y); doc.setFont("helvetica","bold"); doc.text(socio.nombre||"—",60,y);
  doc.setFont("helvetica","normal"); doc.text("Ahorro:",130,y); doc.setFont("helvetica","bold"); doc.text(DataHelper.formatCOP(socio.ahorro_acumulado||0),170,y);
  y+=14;
  doc.setFont("helvetica","bold"); doc.setFontSize(9.5); doc.setFillColor(235,242,255); doc.rect(10,y-5,190,8,"F"); doc.text("RESUMEN",14,y); y+=10;
  doc.setFillColor(240,246,255); doc.setDrawColor(180,210,250); doc.setLineWidth(.5); doc.roundedRect(10,y-3,190,20,3,3,"FD");
  doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.setTextColor(80); doc.text("CUOTA MENSUAL ESTIMADA",105,y+2,{align:"center"});
  doc.setFont("helvetica","bold"); doc.setFontSize(22); doc.setTextColor(15,45,82); doc.text(DataHelper.formatCOP(cuota),105,y+13,{align:"center"});
  y+=26;
  var grid=[["Monto",DataHelper.formatCOP(monto)],["Cuotas",cuotas+" meses"],["Total a pagar",DataHelper.formatCOP(total)],["Total intereses",DataHelper.formatCOP(interes)]];
  var cx=14,cy=y;
  grid.forEach(function(col,i){
    if(i>0&&i%2===0){cy+=10;cx=14;}
    var x2=i%2===0?14:110;
    doc.setFont("helvetica","normal"); doc.setTextColor(120); doc.text(col[0],x2,cy);
    doc.setFont("helvetica","bold"); doc.setTextColor(20); doc.text(col[1],x2+80,cy,{align:"right"});
  });
  y=cy+16;
  doc.setFont("helvetica","bold"); doc.setFontSize(9.5); doc.setFillColor(235,242,255); doc.setTextColor(60); doc.rect(10,y-5,190,8,"F"); doc.text("TABLA DE AMORTIZACIÓN",14,y); y+=10;
  doc.setFillColor(15,45,82); doc.rect(10,y-4,190,7,"F"); doc.setTextColor(255); doc.setFont("helvetica","bold"); doc.setFontSize(8);
  [["#",14],["Cuota",30],["Capital",72],["Interés",114],["Saldo",156]].forEach(function(h){doc.text(h[0],h[1],y+1);}); y+=8;
  var s2=monto;
  for (var ii=1;ii<=cuotas;ii++) {
    if(y>270){doc.addPage();y=20;}
    var iI=Math.round(s2*r), cI=cuota-iI;
    if(ii===cuotas) cI=s2; s2=Math.max(0,s2-cI);
    if(ii%2===0){doc.setFillColor(248,250,255);doc.rect(10,y-3,190,6,"F");}
    doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor(40);
    doc.text(String(ii),14,y+1); doc.text(DataHelper.formatCOP(cuota),30,y+1);
    doc.setTextColor(15,45,82); doc.text(DataHelper.formatCOP(cI),72,y+1);
    doc.setTextColor(180,50,50); doc.text(DataHelper.formatCOP(iI),114,y+1);
    doc.setTextColor(40); doc.text(DataHelper.formatCOP(s2),156,y+1); y+=6;
  }
  doc.setFont("helvetica","bold"); doc.setFontSize(7); doc.setTextColor(150);
  doc.text("FONEVI — Simulación informativa, no es una oferta de crédito.",105,doc.internal.pageSize.height-10,{align:"center"});
  doc.save("FONEVI_Simulacion_"+cuotas+"m.pdf");
  Toast.success("✓ PDF exportado.");
}

/* Cerrar con Escape / clic fondo */
document.addEventListener("keydown", function(e){
  if (e.key==="Escape") {
    var m=document.getElementById("simulModal");
    if (m && m.classList.contains("open")) simulCerrar();
  }
});
document.getElementById("simulModal").addEventListener("click", function(e){
  if (e.target===this) simulCerrar();
});
