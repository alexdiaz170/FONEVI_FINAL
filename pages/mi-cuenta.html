<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FONEVI — Mi Cuenta</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/loading.css"/>
  <link rel="stylesheet" href="../css/transitions.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
  <link rel="icon"     href="../favicon.svg" type="image/svg+xml"/>
  <link rel="manifest" href="../manifest.json"/>
  <meta name="theme-color" content="#0f2d52"/>
  <style>
    /* ── Hero personal ──────────────────────────────────── */
    .cuenta-hero {
      background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-800) 55%, var(--navy-950) 100%);
      border-radius: var(--r-xl);
      padding: 30px 32px;
      margin-bottom: 22px;
      display: flex; align-items: center; gap: 26px;
      position: relative; overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .cuenta-hero::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.025) 1px, transparent 0);
      background-size: 28px 28px; pointer-events: none;
    }
    .cuenta-hero::after {
      content: ''; position: absolute;
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(201,146,42,.18) 0%, transparent 70%);
      border-radius: 50%; right: -40px; bottom: -80px; pointer-events: none;
    }
    .hero-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-300), var(--gold-600));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 26px; font-weight: 600;
      color: #fff; flex-shrink: 0;
      border: 3px solid rgba(255,255,255,.2);
      box-shadow: 0 4px 18px rgba(201,146,42,.4);
      position: relative; z-index: 1;
    }
    .hero-info { flex: 1; position: relative; z-index: 1; }
    .hero-saludo { font-size: 12px; color: rgba(255,255,255,.5); margin-bottom: 4px; letter-spacing: .5px; }
    .hero-nombre { font-family: var(--font-display); font-size: 24px; font-weight: 400; color: #fff; letter-spacing: -.3px; margin-bottom: 5px; }
    .hero-cargo  { font-size: 13px; color: rgba(255,255,255,.55); }
    .hero-stats  { display: flex; gap: 24px; position: relative; z-index: 1; }
    .hero-stat   { text-align: center; }
    .hero-stat-num { font-family: var(--font-display); font-size: 24px; font-weight: 400; color: var(--gold-300); display: block; line-height: 1; }
    .hero-stat-lbl { font-size: 10px; color: rgba(255,255,255,.4); margin-top: 4px; text-transform: uppercase; letter-spacing: .8px; }
    .hero-stat-sep { width: 1px; background: rgba(255,255,255,.1); align-self: stretch; }

    /* ── Tarjeta de saldo principal ──────────────────────── */
    .saldo-principal {
      background: linear-gradient(135deg, var(--navy-800), var(--navy-950));
      border-radius: var(--r-xl); padding: 26px 28px;
      position: relative; overflow: hidden;
      box-shadow: var(--shadow-lg); height: 100%;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .saldo-principal::before {
      content: ''; position: absolute;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(201,146,42,.18) 0%, transparent 70%);
      border-radius: 50%; right: -30px; bottom: -50px; pointer-events: none;
    }
    .sp-label  { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
    .sp-monto  { font-family: var(--font-display); font-size: 38px; font-weight: 400; color: var(--gold-300); letter-spacing: -1.5px; line-height: 1; }
    .sp-change { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    .sp-trend  { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: var(--r-full); }
    .sp-trend.up { background: rgba(29,158,117,.25); color: #5dcaa5; }
    .sp-sub    { font-size: 12px; color: rgba(255,255,255,.38); }
    .sp-divider { height: 1px; background: rgba(255,255,255,.07); margin: 16px 0; }
    .sp-row    { display: flex; justify-content: space-between; align-items: center; }
    .sp-row-label { font-size: 12px; color: rgba(255,255,255,.45); }
    .sp-row-val   { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.88); }

    /* ── Métricas del fondo (rendimientos) ───────────────── */
    .fondo-card {
      background: var(--bg-surface); border: 1px solid var(--border-faint);
      border-radius: var(--r-lg); padding: 20px 22px;
      transition: all var(--t-base) var(--ease);
    }
    .fondo-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .fondo-num  { font-family: var(--font-display); font-size: 26px; font-weight: 400; line-height: 1; letter-spacing: -.5px; }
    .fondo-label{ font-size: 10.5px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 8px; }
    .fondo-sub  { font-size: 11.5px; color: var(--text-muted); margin-top: 5px; }
    .fondo-num.green { color: var(--green-500); }
    .fondo-num.navy  { color: var(--navy-700); }
    .fondo-num.gold  { color: var(--gold-600); }
    .fondo-num.blue  { color: var(--blue-700); }

    /* ── Timeline de aportes ─────────────────────────────── */
    .aporte-row {
      display: flex; align-items: center; gap: 14px;
      padding: 11px 20px; border-bottom: 1px solid var(--border-faint);
      transition: background var(--t-fast);
    }
    .aporte-row:last-child { border-bottom: none; }
    .aporte-row:hover { background: var(--bg-subtle); }
    .aporte-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot-p { background: var(--green-500); }
    .dot-n { background: #fff; border: 2px solid var(--amber-500); }
    .dot-m { background: var(--red-500); }
    .ar-periodo { font-size: 13px; font-weight: 500; flex: 1; }
    .ar-monto   { font-size: 13px; color: var(--text-secondary); }
    .ar-fecha   { font-size: 11px; color: var(--text-muted); min-width: 80px; text-align: right; }

    /* ── Crédito card ──────────────────────────────────────── */
    .credito-socio {
      background: linear-gradient(135deg, var(--amber-50), #fff);
      border: 1px solid var(--amber-100);
      border-radius: var(--r-lg); padding: 20px 22px;
    }
    .cs-head  { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .cs-monto { font-family: var(--font-display); font-size: 26px; color: var(--text-primary); letter-spacing: -.5px; }
    .cs-prop  { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .cs-info  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; font-size: 12px; }
    .cs-info-item { background: rgba(255,255,255,.7); border-radius: var(--r-sm); padding: 8px 12px; }
    .cs-info-label { color: var(--text-muted); font-size: 10.5px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .cs-info-val   { font-weight: 600; color: var(--text-primary); }

    /* ── Rendimientos mini chart ─────────────────────────── */
    .rend-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; border-bottom: 1px solid var(--border-faint);
    }
    .rend-item:last-child { border-bottom: none; }
    .rend-mes   { font-size: 12.5px; font-weight: 500; flex: 1; }
    .rend-pct   { font-size: 12px; color: var(--text-muted); min-width: 50px; text-align: right; }
    .rend-monto { font-size: 13px; font-weight: 600; color: var(--green-500); min-width: 90px; text-align: right; }
    .rend-bar   { width: 80px; height: 6px; background: var(--bg-muted); border-radius: var(--r-full); overflow: hidden; }
    .rend-fill  { height: 100%; background: linear-gradient(90deg, var(--green-500), #5dcaa5); border-radius: var(--r-full); }

    /* ── Info fondo público ──────────────────────────────── */
    .info-fondo-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; border-bottom: 1px solid var(--border-faint);
    }
    .info-fondo-item:last-child { border-bottom: none; }
    .if-label { font-size: 13px; color: var(--text-secondary); }
    .if-val   { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
    .if-val.green { color: var(--green-500); }
    .if-val.gold  { color: var(--gold-600); }
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="page-content">

      <!-- ── HERO PERSONAL ──────────────────────────────── -->
      <div class="cuenta-hero" id="cuentaHero"></div>

      <!-- ── FILA 1: Saldo + Crédito ──────────────────────── -->
      <div class="grid-2" style="margin-bottom:20px;">

        <!-- Saldo y ahorro acumulado -->
        <div class="saldo-principal" id="saldoPrincipal"></div>

        <!-- Crédito activo o capacidad disponible -->
        <div id="creditoPanel"></div>

      </div>

      <!-- ── FILA 2: Info del Fondo ─────────────────────── -->
      <div class="grid-2" style="margin-bottom:20px;">

        <!-- Datos generales del fondo (públicos) -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Información del fondo</span>
          </div>
          <div id="infoFondo"></div>
        </div>

        <!-- Rendimientos por mes -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Rendimientos estimados 2026</span>
            <span style="font-size:11px;color:var(--text-muted);">Tasa {{tasa}}% m.e.a.</span>
          </div>
          <div id="rendimientos"></div>
        </div>

      </div>

      <!-- ── FILA 3: Mis aportes + Métricas fondo ───────── -->
      <div class="grid-main-aside" style="margin-bottom:20px;">

        <!-- Historial de mis aportes -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Mis aportes</span>
            <span id="resumenAportes" style="font-size:12px;color:var(--text-muted);"></span>
          </div>
          <div id="misAportes"></div>
        </div>

        <!-- Métricas generales del fondo (solo lectura) -->
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div class="fondo-card">
            <div class="fondo-label">Total socios activos</div>
            <div class="fondo-num navy" id="fTotalSocios">—</div>
            <div class="fondo-sub">Miembros del fondo</div>
          </div>
          <div class="fondo-card">
            <div class="fondo-label">Ahorros totales del fondo</div>
            <div class="fondo-num green" id="fTotalAhorros">—</div>
            <div class="fondo-sub">Suma de todos los socios</div>
          </div>
          <div class="fondo-card">
            <div class="fondo-label">Tu participación</div>
            <div class="fondo-num gold" id="fParticipacion">—</div>
            <div class="fondo-sub">% del total del fondo</div>
          </div>
          <div class="fondo-card">
            <div class="fondo-label">Dividendo estimado 2025</div>
            <div class="fondo-num blue" id="fDividendo">—</div>
            <div class="fondo-sub">Basado en tu ahorro acumulado</div>
          </div>
        </div>

      </div>

    </div>
    <div style="padding:0 0 24px;">
    <button onclick="doLogout()"
      style="width:100%;padding:13px;background:var(--red-50);color:var(--red-700);
             border:1.5px solid rgba(163,45,45,.2);border-radius:var(--r-lg);
             font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);">
      ⏻ Cerrar sesión
    </button>
  </div>
</div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script src="../js/darkmode.js"></script>
<script src="../js/transitions.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/roles.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="../js/charts.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  // Proteger: solo socios (admin y tesorero usan dashboard normal)
  var session = Auth.getSession();
  if (!session) return;

  buildLayout("Mi Cuenta", "Bienvenido — " + DB.config.periodo_actual, "");

  // Buscar el socio correspondiente al usuario logueado
  var socio = DB.socios.find(function(s) {
    return s.email === session.email ||
           (session.rol === "socio" && s.id === "S001"); // fallback demo
  }) || DB.socios[0];

  if (!socio) {
    document.querySelector(".page-content").innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div>' +
      '<div class="empty-title">Socio no encontrado</div>' +
      '<div class="empty-desc">No se encontró información de tu cuenta.</div></div>';
    return;
  }

  Roles.checkDeniedMessage();

  renderHero(socio, session);
  renderSaldo(socio);
  renderCredito(socio);
  renderInfoFondo();
  renderRendimientos(socio);
  renderMisAportes(socio);
  renderMetricasFondo(socio);
});

/* ── Hero ───────────────────────────────────────────────── */
function renderHero(s, session) {
  var ini = s.nombre.split(" ").map(function(p){return p[0];}).slice(0,2).join("");
  var ap  = DataHelper.getAportesSocio(s.id);
  var pg  = ap.filter(function(a){return a.estado==="pagado";}).length;
  var meses = calcMeses(s.fecha_ingreso);

  document.getElementById("cuentaHero").innerHTML =
    '<div class="hero-avatar">' + ini + '</div>' +
    '<div class="hero-info">' +
      '<div class="hero-saludo">Bienvenido de nuevo</div>' +
      '<div class="hero-nombre">' + s.nombre + '</div>' +
      '<div class="hero-cargo">' + s.cargo + ' &nbsp;·&nbsp; ' + s.sede + '</div>' +
    '</div>' +
    '<div class="hero-stats">' +
      heroStat(fmtM(s.ahorro_acumulado), "Mi ahorro") +
      '<div class="hero-stat-sep"></div>' +
      heroStat(pg, "Aportes pagados") +
      '<div class="hero-stat-sep"></div>' +
      heroStat(meses + " meses", "Antigüedad") +
    '</div>';
}
function heroStat(n, l) {
  return '<div class="hero-stat"><span class="hero-stat-num">' + n + '</span>' +
    '<span class="hero-stat-lbl">' + l + '</span></div>';
}

/* ── Saldo principal ────────────────────────────────────── */
function renderSaldo(s) {
  var rendMensual = Math.round(s.ahorro_acumulado * (DB.config.tasa_credito_mensual/100));
  var rendAnual   = rendMensual * 12;
  document.getElementById("saldoPrincipal").innerHTML =
    '<div>' +
      '<div class="sp-label">Mi ahorro acumulado</div>' +
      '<div class="sp-monto">' + DataHelper.formatCOP(s.ahorro_acumulado) + '</div>' +
      '<div class="sp-change">' +
        '<span class="sp-trend up">↑ ' + DataHelper.formatCOP(s.aporte_mensual) + '/mes</span>' +
        '<span class="sp-sub">Aporte mensual activo</span>' +
      '</div>' +
    '</div>' +
    '<div>' +
      '<div class="sp-divider"></div>' +
      '<div class="sp-row"><span class="sp-row-label">Aporte mensual</span><span class="sp-row-val">' + DataHelper.formatCOP(s.aporte_mensual) + '</span></div>' +
      '<div class="sp-row" style="margin-top:8px;"><span class="sp-row-label">Rendimiento mensual est.</span><span class="sp-row-val" style="color:var(--gold-300);">' + DataHelper.formatCOP(rendMensual) + '</span></div>' +
      '<div class="sp-row" style="margin-top:8px;"><span class="sp-row-label">Rendimiento anual est.</span><span class="sp-row-val" style="color:var(--gold-300);">' + DataHelper.formatCOP(rendAnual) + '</span></div>' +
      '<div class="sp-row" style="margin-top:8px;"><span class="sp-row-label">Ingreso al fondo</span><span class="sp-row-val">' + DataHelper.formatFecha(s.fecha_ingreso) + '</span></div>' +
    '</div>';
}

/* ── Crédito activo o capacidad ─────────────────────────── */
function renderCredito(s) {
  var creditos = DataHelper.getCreditosSocio(s.id).filter(function(c){return c.estado==="activo"||c.estado==="mora";});
  var maxCred  = s.ahorro_acumulado * (DB.config.max_credito_multiplicador || 3);
  var deuda    = creditos.reduce(function(t,c){return t+c.saldo_capital;},0);
  var disp     = Math.max(0, maxCred - deuda);
  var panel    = document.getElementById("creditoPanel");

  if (creditos.length > 0) {
    var c   = creditos[0];
    var pct = Math.round((c.cuotas_pagadas/c.cuotas)*100);
    var pctColor = pct>=80?"var(--green-500)":pct>=40?"var(--amber-500)":"var(--red-500)";
    panel.innerHTML =
      '<div class="credito-socio">' +
        '<div class="cs-head">' +
          '<div>' +
            '<div class="cs-monto">' + DataHelper.formatCOP(c.monto) + '</div>' +
            '<div class="cs-prop">Crédito activo &mdash; ' + (c.proposito||"#"+c.id) + '</div>' +
          '</div>' +
          '<span class="pill ' + (c.estado==="activo"?"pill-green":"pill-red") + '">' + c.estado + '</span>' +
        '</div>' +
        '<div style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:5px;"><span>Progreso de pago</span><span>' + pct + '%</span></div>' +
        '<div class="progress" style="height:7px;"><div class="progress-fill" style="width:'+pct+'%;background:'+pctColor+'"></div></div></div>' +
        '<div class="cs-info">' +
          csInfo("Saldo pendiente", DataHelper.formatCOP(c.saldo_capital)) +
          csInfo("Cuotas pagadas", c.cuotas_pagadas + " de " + c.cuotas) +
          csInfo("Cuota mensual", DataHelper.formatCOP(calcCuota(c.monto, c.tasa_mensual, c.cuotas))) +
          csInfo("Cuotas restantes", (c.cuotas - c.cuotas_pagadas)) +
        '</div>' +
      '</div>' +
      '<div style="margin-top:12px;padding:14px 16px;background:var(--bg-subtle);border:1px solid var(--border-faint);border-radius:var(--r-md);">' +
        '<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px;">Capacidad crédito disponible</div>' +
        '<div style="font-size:18px;font-weight:600;color:var(--navy-700);">' + DataHelper.formatCOP(disp) + '</div>' +
      '</div>';
  } else {
    panel.innerHTML =
      '<div style="background:var(--green-50);border:1px solid var(--green-100);border-radius:var(--r-lg);padding:22px;height:100%;display:flex;flex-direction:column;justify-content:space-between;">' +
        '<div>' +
          '<div style="font-size:11px;font-weight:600;color:var(--green-700);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">Sin créditos activos ✓</div>' +
          '<div style="font-family:var(--font-display);font-size:28px;color:var(--green-700);letter-spacing:-.5px;">' + DataHelper.formatCOP(disp) + '</div>' +
          '<div style="font-size:12.5px;color:var(--green-500);margin-top:5px;">Capacidad de crédito disponible</div>' +
        '</div>' +
        '<div style="margin-top:16px;font-size:12px;color:var(--green-700);line-height:1.6;">' +
          'Basado en ' + DB.config.max_credito_multiplicador + 'x tu ahorro acumulado.<br>' +
          'Tasa mensual: <strong>' + DB.config.tasa_credito_mensual + '%</strong> &nbsp;·&nbsp; Sin mora activa' +
        '</div>' +
      '</div>';
  }
}
function csInfo(l, v) {
  return '<div class="cs-info-item"><div class="cs-info-label">'+l+'</div><div class="cs-info-val">'+v+'</div></div>';
}
function calcCuota(m, t, n) {
  var r = t/100;
  return r===0 ? Math.round(m/n) : Math.round(m*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1));
}

/* ── Info del fondo (datos públicos) ────────────────────── */
function renderInfoFondo() {
  var filas = [
    { l:"Nombre del fondo",       v:DB.config.nombre_completo },
    { l:"NIT",                    v:DB.config.nit },
    { l:"Representante legal",    v:DB.config.representante },
    { l:"Tasa crédito mensual",   v:DB.config.tasa_credito_mensual + "% m.e.a.", cls:"gold" },
    { l:"Tasa mora diaria",       v:DB.config.tasa_mora_diaria + "% diario" },
    { l:"Aporte mínimo mensual",  v:DataHelper.formatCOP(DB.config.aporte_minimo) },
    { l:"Aporte solidaridad",     v:DataHelper.formatCOP(DB.config.aporte_solidaridad) },
    { l:"Multiplicador crédito",  v:DB.config.max_credito_multiplicador + "x el ahorro acum.", cls:"gold" },
    { l:"Período actual",         v:DB.config.periodo_actual, cls:"green" },
  ];
  document.getElementById("infoFondo").innerHTML = filas.map(function(f){
    return '<div class="info-fondo-item">' +
      '<span class="if-label">' + f.l + '</span>' +
      '<span class="if-val ' + (f.cls||"") + '">' + f.v + '</span>' +
    '</div>';
  }).join("");
}

/* ── Rendimientos estimados ─────────────────────────────── */
function renderRendimientos(s) {
  var tasa  = DB.config.tasa_credito_mensual / 100;
  var meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  var ahorro = s.ahorro_acumulado;
  var maxRend = ahorro * tasa;

  // Calcular el header con la tasa
  document.querySelector("[href='pages/mi-cuenta.html'] ~ *") // no-op, solo placeholder

  var rows = meses.slice(0,6).map(function(mes, i) {
    var base = ahorro + (s.aporte_mensual * i);
    var rend = Math.round(base * tasa);
    var pct  = maxRend > 0 ? Math.round((rend/maxRend)*100) : 0;
    return '<div class="rend-item">' +
      '<span class="rend-mes">' + mes + ' 2026</span>' +
      '<div class="rend-bar"><div class="rend-fill" style="width:'+pct+'%"></div></div>' +
      '<span class="rend-pct">' + DB.config.tasa_credito_mensual + '% m.</span>' +
      '<span class="rend-monto">+' + DataHelper.formatCOP(rend) + '</span>' +
    '</div>';
  }).join("");

  var totalRend = Math.round(ahorro * tasa * 12);
  rows += '<div style="padding:12px 20px;background:var(--bg-subtle);border-top:1px solid var(--border-faint);">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;">' +
      '<span style="font-size:12.5px;font-weight:600;">Total estimado 2026</span>' +
      '<span style="font-size:15px;font-weight:700;color:var(--green-500);">+' + DataHelper.formatCOP(totalRend) + '</span>' +
    '</div>' +
    '<div style="font-size:11px;color:var(--text-muted);margin-top:3px;">Basado en saldo actual sin nuevos aportes</div>' +
  '</div>';

  document.getElementById("rendimientos").innerHTML = rows;

  // Actualizar tasa en el header
  var sp = document.querySelector(".card-title + span");
  if (sp) sp.textContent = "Tasa " + DB.config.tasa_credito_mensual + "% m.e.a.";
}

/* ── Mis aportes ────────────────────────────────────────── */
function renderMisAportes(s) {
  var ap  = DataHelper.getAportesSocio(s.id);
  var pg  = ap.filter(function(a){return a.estado==="pagado";}).length;
  var mo  = ap.filter(function(a){return ["mora","vencido"].includes(a.estado);}).length;
  var pe  = ap.filter(function(a){return a.estado==="pendiente";}).length;
  var tot = ap.filter(function(a){return a.estado==="pagado";}).reduce(function(t,a){return t+a.monto;},0);

  document.getElementById("resumenAportes").textContent =
    pg + " pagados · " + pe + " pendientes" + (mo > 0 ? " · ⚠ " + mo + " mora" : "");

  var dotMap = { pagado:"dot-p", pendiente:"dot-n", mora:"dot-m", vencido:"dot-m" };
  document.getElementById("misAportes").innerHTML =
    ap.slice().reverse().map(function(a){
      return '<div class="aporte-row">' +
        '<div class="aporte-dot ' + (dotMap[a.estado]||"dot-n") + '"></div>' +
        '<span class="ar-periodo">' + a.periodo + '</span>' +
        '<span class="ar-monto">' + DataHelper.formatCOP(a.monto) + '</span>' +
        '<span class="ar-fecha">' + (a.fecha_pago ? DataHelper.formatFecha(a.fecha_pago) : "—") + '</span>' +
        DataHelper.estadoPill(a.estado) +
      '</div>';
    }).join("") +
    '<div style="padding:12px 20px;background:var(--bg-subtle);border-top:1px solid var(--border-faint);display:flex;justify-content:space-between;">' +
      '<span style="font-size:12.5px;font-weight:600;">Total aportado</span>' +
      '<span style="font-size:13px;font-weight:700;color:var(--green-500);">' + DataHelper.formatCOP(tot) + '</span>' +
    '</div>';
}

/* ── Métricas del fondo (solo lectura) ──────────────────── */
function renderMetricasFondo(s) {
  var totalAh = DataHelper.getTotalAhorros();
  var activos = DB.socios.filter(function(x){return x.estado==="activo";}).length;
  var partic  = totalAh > 0 ? ((s.ahorro_acumulado / totalAh)*100).toFixed(2) : "0.00";
  var dividEst= Math.round(s.ahorro_acumulado * 0.08); // 8% anual estimado

  document.getElementById("fTotalSocios").textContent    = activos;
  document.getElementById("fTotalAhorros").textContent   = fmtM(totalAh);
  document.getElementById("fParticipacion").textContent  = partic + "%";
  document.getElementById("fDividendo").textContent      = DataHelper.formatCOP(dividEst);
}

/* ── Helpers ─────────────────────────────────────────────── */
function fmtM(v) {
  if (v>=1000000) return "$"+(v/1000000).toFixed(1)+"M";
  if (v>=1000) return "$"+Math.round(v/1000)+"k";
  return "$"+v;
}
function calcMeses(fecha) {
  var d = new Date(fecha+"T00:00:00"), h = new Date("2026-03-22");
  return Math.max(1,(h.getFullYear()-d.getFullYear())*12+(h.getMonth()-d.getMonth()));
}
</script>
