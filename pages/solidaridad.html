<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FONEVI — Fondo de Solidaridad</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/loading.css"/>
  <link rel="stylesheet" href="../css/transitions.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
  <link rel="icon"             href="../favicon.svg"           type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-32x32.svg"  sizes="32x32" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="../icons/icon-180x180.svg" sizes="180x180"/>
  <link rel="manifest"         href="../manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#0f2d52"/>
  <style>
    /* ── Saldo hero ────────────────────────────────────────── */
    .saldo-hero {
      background: linear-gradient(135deg,var(--navy-900),var(--navy-800));
      border-radius: var(--r-xl); padding: 24px 28px;
      position: relative; overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .saldo-hero::after {
      content:''; position:absolute; width:220px; height:220px;
      background: radial-gradient(circle,rgba(29,158,117,.18) 0%,transparent 70%);
      border-radius:50%; right:-40px; bottom:-60px; pointer-events:none;
    }
    .sh-label { font-size:11px; font-weight:700; text-transform:uppercase;
      letter-spacing:1.2px; color:rgba(255,255,255,.45); margin-bottom:6px; }
    .sh-monto { font-family:var(--font-display); font-size:38px; font-weight:400;
      color:#fff; letter-spacing:-.5px; position:relative; z-index:1; }
    .sh-sub   { font-size:12px; color:rgba(255,255,255,.5); margin-top:4px; }
    .sh-track { height:6px; background:rgba(255,255,255,.15);
      border-radius:var(--r-full); margin-top:16px; overflow:hidden; }
    .sh-fill  { height:100%; border-radius:var(--r-full);
      background: linear-gradient(90deg,var(--green-300),var(--green-500));
      transition: width .9s cubic-bezier(.16,1,.3,1); }
    .sh-stats { display:flex; gap:20px; margin-top:12px; flex-wrap:wrap; }
    .sh-stat  { font-size:11.5px; color:rgba(255,255,255,.55); }
    .sh-stat strong { color:rgba(255,255,255,.9); }

    /* ── Tipos de ayuda con barra ──────────────────────────── */
    .cat-item {
      padding: 10px 0; border-bottom:1px solid var(--border-faint);
      display:flex; align-items:center; gap:10px;
    }
    .cat-item:last-child { border-bottom:none; }
    .cat-icon { font-size:18px; width:28px; text-align:center; flex-shrink:0; }
    .cat-info { flex:1; min-width:0; }
    .cat-name { font-size:12.5px; font-weight:500; color:var(--text-primary); }
    .cat-bar  { height:4px; background:var(--bg-muted); border-radius:var(--r-full);
      margin-top:4px; overflow:hidden; }
    .cat-bar-fill { height:100%; border-radius:var(--r-full); transition:width .7s ease; }
    .cat-monto { font-size:12.5px; font-weight:600; color:var(--text-primary);
      white-space:nowrap; }

    /* ── Fila de movimiento ─────────────────────────────────── */
    .mov-row {
      display:flex; align-items:center; gap:12px;
      padding:11px 20px; border-bottom:1px solid var(--border-faint);
      transition:background var(--t-fast);
    }
    .mov-row:last-child { border-bottom:none; }
    .mov-row:hover { background:var(--bg-subtle); }
    .mov-ico {
      width:36px; height:36px; border-radius:var(--r-md); flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:16px;
    }
    .mov-ico.ing { background:var(--green-50); }
    .mov-ico.egr { background:var(--red-50); }
    .mov-ico.sol { background:var(--amber-50); }
    .mov-body  { flex:1; min-width:0; }
    .mov-desc  { font-size:13px; font-weight:500; color:var(--text-primary);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mov-meta  { font-size:11px; color:var(--text-muted); margin-top:2px; }
    .mov-right { text-align:right; flex-shrink:0; }
    .mov-amount { font-size:14px; font-weight:600; }
    .mov-amount.pos { color:var(--green-600); }
    .mov-amount.neg { color:var(--red-600); }
    .mov-type { font-size:10px; color:var(--text-faint); margin-top:1px; }

    /* ── Alerta saldo insuficiente ─────────────────────────── */
    .warn-saldo {
      background:var(--red-50); border:1px solid var(--red-100);
      border-radius:var(--r-md); padding:10px 14px;
      font-size:12.5px; color:var(--red-700);
    }

    /* ── Tabla de ayudas ────────────────────────────────────── */
    tr.fila-egreso td:first-child { border-left:3px solid var(--red-300); }
    tr.fila-ingreso td:first-child { border-left:3px solid var(--green-300); }
  
    /* ── Tarjeta aporte mejorada ──────────────────────── */
    .aporte-card {
      background: linear-gradient(135deg, var(--navy-900), var(--navy-800));
      border-radius: var(--r-xl);
      padding: 22px 22px 18px;
      position: relative; overflow: hidden;
    }
    .aporte-card::before {
      content:''; position:absolute; inset:0;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.03) 1px, transparent 0);
      background-size: 22px 22px;
    }
    .aporte-card::after {
      content:''; position:absolute; width:180px; height:180px;
      background: radial-gradient(circle, rgba(201,146,42,.18) 0%, transparent 70%);
      border-radius:50%; right:-30px; bottom:-50px; pointer-events:none;
    }
    .ac-title  { font-size:11px; font-weight:700; text-transform:uppercase;
      letter-spacing:1px; color:rgba(255,255,255,.4); margin-bottom:14px;
      position:relative; z-index:1; }
    .ac-label  { font-size:10px; font-weight:600; text-transform:uppercase;
      letter-spacing:.6px; color:rgba(255,255,255,.35); margin-bottom:4px; }
    .ac-control { width:100%; padding:8px 12px;
      background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
      border-radius:var(--r-md); font-size:13px; font-family:var(--font-body);
      color:#fff; outline:none; transition:border-color .2s;
      margin-bottom:10px; position:relative; z-index:1; }
    .ac-control:focus { border-color:var(--gold-400); }
    .ac-control option { background:#0f2d52; color:#fff; }
    .ac-hint   { font-size:11px; color:rgba(255,255,255,.35);
      margin-top:-6px; margin-bottom:10px; position:relative; z-index:1; }
    .ac-btn    { width:100%; padding:11px; border:none; border-radius:var(--r-md);
      background:linear-gradient(90deg,var(--gold-500),var(--gold-400));
      color:#fff; font-size:13px; font-weight:700; font-family:var(--font-body);
      cursor:pointer; transition:all .2s; position:relative; z-index:1;
      box-shadow: 0 3px 12px rgba(201,146,42,.35); }
    .ac-btn:hover { background:linear-gradient(90deg,var(--gold-600),var(--gold-500));
      transform:translateY(-1px); box-shadow:0 5px 18px rgba(201,146,42,.45); }
    .ac-btn:active { transform:translateY(0); }
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="page-content">

      <!-- ── KPIs ─────────────────────────────────────────── -->
      <div class="kpi-grid" id="kpiSolidaridad"
        style="grid-template-columns:repeat(4,1fr);margin-bottom:20px;"></div>

      <!-- ── GRID: tabla + sidebar ─────────────────────────── -->
      <div class="grid-main-aside" style="margin-bottom:20px;">

        <!-- Tabla de movimientos -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Historial de ayudas y aportes</span>
            <div style="display:flex;gap:8px;">
              <button class="btn btn-secondary btn-sm" onclick="exportarExcel()">⬇ Excel</button>
              <button class="btn btn-primary btn-sm"   onclick="Modal.open('modalNuevaAyuda')">
                + Registrar ayuda
              </button>
            </div>
          </div>

          <!-- Tabs filtro -->
          <div class="tab-bar" style="margin:0 20px 0;" id="tabsMov">
            <button class="tab-btn active" data-tab="todos">Todos</button>
            <button class="tab-btn" data-tab="egreso">Ayudas</button>
            <button class="tab-btn" data-tab="ingreso">Ingresos</button>
          </div>

          <!-- Lista de movimientos -->
          <div id="listaMov"></div>

          <!-- Empty -->
          <div id="movEmpty" style="display:none;padding:32px;text-align:center;color:var(--text-muted);">
            Sin movimientos en esta categoría.
          </div>
        </div>

        <!-- Panel lateral -->
        <div style="display:flex;flex-direction:column;gap:16px;">

          <!-- Saldo disponible -->
          <div class="saldo-hero">
            <div class="sh-label">Saldo disponible</div>
            <div class="sh-monto" id="saldoHero">$0</div>
            <div class="sh-sub" id="saldoSub">Fondo de solidaridad FONEVI</div>
            <div class="sh-track">
              <div class="sh-fill" id="saldoFill" style="width:0%"></div>
            </div>
            <div class="sh-stats" id="saldoStats"></div>
          </div>

          <!-- Distribución por tipo de ayuda -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">Ayudas por tipo</span>
            </div>
            <div class="card-body" id="catPanel" style="padding-top:4px;"></div>
          </div>

          <!-- Registrar aporte rápido — diseño mejorado -->
          <div class="aporte-card">
            <div class="ac-title">💰 Registrar aporte al fondo</div>
            <div class="ac-label">Socio</div>
            <select class="ac-control" id="as-socio"></select>
            <div class="ac-label">Monto ($)</div>
            <input type="number" class="ac-control" id="as-monto"
              value="30000" min="1000" step="1000"/>
            <div class="ac-hint">Aporte habitual: $30.000/mes</div>
            <div class="ac-label">Período</div>
            <select class="ac-control" id="as-periodo"></select>
            <button class="ac-btn" onclick="registrarAporte()">
              Registrar aporte →
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODAL — REGISTRAR AYUDA
═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modalNuevaAyuda">
  <div class="modal" style="max-width:540px;">
    <div class="modal-header">
      <span class="modal-title">🤝 Registrar Ayuda del Fondo</span>
      <button class="modal-close" onclick="Modal.close('modalNuevaAyuda')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Tipo de ayuda <span style="color:var(--red-500);">*</span></label>
          <select class="form-control" id="ay-tipo" onchange="actualizarMontoRef()">
            <option value="medica">🏥 Ayuda médica</option>
            <option value="funeraria">Auxilio funerario</option>
            <option value="educativa">🎓 Apoyo educativo</option>
            <option value="calamidad">🏠 Calamidad doméstica</option>
            <option value="juridica">⚖️ Asesoría jurídica</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Socio beneficiado</label>
          <select class="form-control" id="ay-socio">
            <option value="">— No aplica / externo —</option>
          </select>
        </div>
        <div class="form-group form-full">
          <label class="form-label">Beneficiario <span style="color:var(--red-500);">*</span></label>
          <input type="text" class="form-control" id="ay-ben"
            placeholder="Nombre completo del beneficiario"/>
        </div>
        <div class="form-group">
          <label class="form-label">Monto ($) <span style="color:var(--red-500);">*</span></label>
          <input type="number" class="form-control" id="ay-monto"
            placeholder="0" min="0" step="1000" oninput="verificarSaldo()"/>
          <span class="form-hint" id="montoRef"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Fecha</label>
          <input type="date" class="form-control" id="ay-fecha"/>
        </div>
        <div class="form-group form-full">
          <label class="form-label">Descripción / Observaciones</label>
          <textarea class="form-control" id="ay-desc" rows="2"
            placeholder="Detalla el motivo de la ayuda..."></textarea>
        </div>
      </div>
      <div id="saldoWarning" style="margin-top:10px;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modalNuevaAyuda')">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardarAyuda" onclick="guardarAyuda()">
        Registrar ayuda
      </button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../js/darkmode.js"></script>
<script src="../js/transitions.js"></script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/roles.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script src="../js/search.js"></script>
<script src="../js/loading.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════
   CATÁLOGO DE TIPOS
═══════════════════════════════════════════════════════════ */
var TIPOS = {
  medica:    { label:"Ayuda médica",         icon:"🏥", color:"var(--red-500)",   ref: 500000 },
  funeraria: { label:"Auxilio funerario",    icon:"⚰️",  color:"var(--navy-600)",  ref: 800000 },
  educativa: { label:"Apoyo educativo",      icon:"🎓", color:"var(--blue-500)",  ref: 300000 },
  calamidad: { label:"Calamidad doméstica",  icon:"🏠", color:"var(--amber-600)", ref: 600000 },
  juridica:  { label:"Asesoría jurídica",    icon:"⚖️",  color:"var(--purple,#7c3aed)", ref: 200000 },
  otro:      { label:"Otra ayuda",           icon:"🤝", color:"var(--text-muted)", ref: 0 },
  ingreso:   { label:"Ingreso al fondo",     icon:"💰", color:"var(--green-600)", ref: 0 },
};

var filtroMov = "todos";

async function cargarSolidaridad() {
  try {
    const [movRes, saldoRes] = await Promise.all([
      API.solidaridad.listar(),
      API.solidaridad.saldo()
    ]);

    if (movRes && movRes.ok) {
      window.DB.solidaridad.movimientos = movRes.datos;
    }
    if (saldoRes && saldoRes.ok) {
      window.DB.solidaridad.saldo_actual = saldoRes.saldo_actual || 0;
    }

    if (!window.DB.socios || !window.DB.socios.length) {
      const sociosRes = await API.socios.listar();
      if (sociosRes && sociosRes.ok) {
        window.DB.socios = sociosRes.datos;
      }
    }
  } catch (error) {
    console.error("Error cargando datos de solidaridad:", error);
  }
}

/* ═══════════════════════════════════════════════════════════
   INICIO
═══════════════════════════════════════════════════════════ */
document.addEventListener("DOMContentLoaded", async function() {
  if (!Roles.proteger("solidaridad")) return;

  await cargarSolidaridad();

  buildLayout(
    "Fondo de Solidaridad",
    "Saldo: " + DataHelper.formatCOP(DB.solidaridad.saldo_actual),
    '<button class="btn btn-primary" onclick="Modal.open(\'modalNuevaAyuda\')">+ Registrar ayuda</button>'
  );

  document.getElementById("ay-fecha").value = new Date().toISOString().split("T")[0];

  poblarSelects();
  renderKPIs();
  renderSaldoPanel();
  renderCategorias();
  renderMovimientos("todos");

  initTabs("tabsMov", function(tab) { filtroMov = tab; renderMovimientos(tab); });

  // Auto-completar socio en beneficiario al seleccionar
  document.getElementById("ay-socio").addEventListener("change", function() {
    var id = this.value;
    if (id) {
      var nombre = DataHelper.getSocioNombre(id);
      document.getElementById("ay-ben").value = nombre;
    }
  });
});

/* ═══════════════════════════════════════════════════════════
   KPIs
═══════════════════════════════════════════════════════════ */
function renderKPIs() {
  var movs     = DB.solidaridad.movimientos;
  var ingresos = movs.filter(function(m){ return m.tipo==="ingreso"; })
                     .reduce(function(t,m){ return t + Number(m.monto || 0); }, 0);
  var egresos  = movs.filter(function(m){ return m.tipo==="egreso"; })
                     .reduce(function(t,m){ return t + Number(m.monto || 0); }, 0);
  var ayudas   = movs.filter(function(m){ return m.tipo==="egreso"; }).length;
  var saldo    = DB.solidaridad.saldo_actual;

  document.getElementById("kpiSolidaridad").innerHTML = [
    { label:"Saldo disponible",  value: DataHelper.formatCOP(saldo),    cls:"green", icon:"🤝" },
    { label:"Total recaudado",   value: DataHelper.formatCOP(ingresos), cls:"blue",  icon:"💰" },
    { label:"Total en ayudas",   value: DataHelper.formatCOP(egresos),  cls:"red",   icon:"❤️" },
    { label:"Ayudas otorgadas",  value: ayudas + " ayuda" + (ayudas!==1?"s":""),
      cls:"gold", icon:"👐" },
  ].map(function(k) {
    return '<div class="kpi-card ' + k.cls + '">' +
      '<div class="kpi-label">'   + k.label + '</div>' +
      '<div class="kpi-value" style="font-size:' + (k.cls==="red"||k.cls==="blue"?"17":"24") + 'px;">'
        + k.value + '</div>' +
      '<div class="kpi-bg-icon">' + k.icon  + '</div>' +
    '</div>';
  }).join("");
}

/* ═══════════════════════════════════════════════════════════
   SALDO PANEL
═══════════════════════════════════════════════════════════ */
function renderSaldoPanel() {
  var movs    = DB.solidaridad.movimientos;
  var saldo   = DB.solidaridad.saldo_actual;
  var ing     = movs.filter(function(m){ return m.tipo==="ingreso"; })
                    .reduce(function(t,m){ return t + Number(m.monto || 0); }, 0);
  var egr     = movs.filter(function(m){ return m.tipo==="egreso"; })
                    .reduce(function(t,m){ return t + Number(m.monto || 0); }, 0);
  var pct     = ing > 0 ? Math.min(100, Math.round(saldo / ing * 100)) : 0;
  var socios  = DB.socios.filter(function(s){ return s.estado==="activo"; }).length;
  var metaMes = socios * DB.config.aporte_solidaridad;

  document.getElementById("saldoHero").textContent = DataHelper.formatCOP(saldo);
  document.getElementById("saldoSub").textContent  =
    socios + " socios · $" + (DB.config.aporte_solidaridad/1000).toFixed(0) + "k/mes c/u";

  setTimeout(function() {
    document.getElementById("saldoFill").style.width = pct + "%";
  }, 300);

  document.getElementById("saldoStats").innerHTML = [
    { label:"Recaudado", val: DataHelper.formatCOP(ing) },
    { label:"En ayudas", val: DataHelper.formatCOP(egr) },
    { label:"Meta mensual", val: DataHelper.formatCOP(metaMes) },
  ].map(function(s) {
    return '<div class="sh-stat">' + s.label + ': <strong>' + s.val + '</strong></div>';
  }).join("");
}

/* ═══════════════════════════════════════════════════════════
   CATEGORÍAS DE AYUDA
═══════════════════════════════════════════════════════════ */
function renderCategorias() {
  var egrs = DB.solidaridad.movimientos.filter(function(m){ return m.tipo==="egreso"; });
  var total = egrs.reduce(function(t,m){ return t + Number(m.monto || 0); }, 0);

  // Agrupar por tipo detectando palabras clave en la descripción
  var cats = {};
  egrs.forEach(function(m) {
    var tipo = detectarTipo(m.descripcion);
    cats[tipo] = (cats[tipo] || 0) + Number(m.monto || 0);
  });

  if (!Object.keys(cats).length) {
    document.getElementById("catPanel").innerHTML =
      '<div style="font-size:12px;color:var(--text-muted);padding:8px 0;">Sin ayudas registradas.</div>';
    return;
  }

  var html = Object.entries(cats)
    .sort(function(a,b){ return b[1]-a[1]; })
    .map(function(entry) {
      var tipo  = entry[0], monto = entry[1];
      var info  = TIPOS[tipo] || TIPOS.otro;
      var pct   = total > 0 ? Math.round(monto/total*100) : 0;
      return '<div class="cat-item">' +
        '<div class="cat-icon">' + info.icon + '</div>' +
        '<div class="cat-info">' +
          '<div class="cat-name">' + info.label + '</div>' +
          '<div class="cat-bar"><div class="cat-bar-fill" style="width:' + pct +
            '%;background:' + info.color + ';"></div></div>' +
        '</div>' +
        '<div class="cat-monto">' + DataHelper.formatCOP(monto) + '</div>' +
      '</div>';
    }).join("") +
    '<div style="display:flex;justify-content:space-between;padding:10px 0 0;' +
      'border-top:1px solid var(--border-faint);margin-top:4px;font-size:13px;font-weight:600;">' +
      '<span>Total en ayudas</span>' +
      '<span style="color:var(--red-600);">' + DataHelper.formatCOP(total) + '</span>' +
    '</div>';

  document.getElementById("catPanel").innerHTML = html;
}

function detectarTipo(desc) {
  var d = (desc || "").toLowerCase();
  if (d.includes("médic") || d.includes("medic") || d.includes("salud")) return "medica";
  if (d.includes("funerar") || d.includes("exequi")) return "funeraria";
  if (d.includes("educati") || d.includes("estudi") || d.includes("escola")) return "educativa";
  if (d.includes("calamidd") || d.includes("calamid") || d.includes("hogar") || d.includes("vivienda")) return "calamidad";
  if (d.includes("jurídic") || d.includes("juridic") || d.includes("legal")) return "juridica";
  return "otro";
}

/* ═══════════════════════════════════════════════════════════
   LISTA DE MOVIMIENTOS
═══════════════════════════════════════════════════════════ */
function renderMovimientos(filtro) {
  // Eliminamos .reverse() porque el backend ya envía ordenado DESC (los más recientes primero)
  var lista = DB.solidaridad.movimientos.slice();
  if (filtro !== "todos") {
    lista = lista.filter(function(m){ return m.tipo === filtro; });
  }

  var container = document.getElementById("listaMov");
  var empty     = document.getElementById("movEmpty");

  if (!lista.length) {
    container.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  container.innerHTML = lista.map(function(m) {
    var esIng  = m.tipo === "ingreso";
    var tipo   = esIng ? "ing" : "egr";
    var icon   = esIng ? "💰" : (function(){ var t=detectarTipo(m.descripcion); return TIPOS[t]?TIPOS[t].icon:"🤝"; })();
    var benefStr = m.beneficiario ? " · " + DataHelper.getSocioNombre(m.beneficiario) : "";

    return '<div class="mov-row">' +
      '<div class="mov-ico ' + tipo + '">' + icon + '</div>' +
      '<div class="mov-body">' +
        '<div class="mov-desc">' + m.descripcion + '</div>' +
        '<div class="mov-meta">' + DataHelper.formatFecha(m.fecha) + benefStr + '</div>' + '</div>' +
      '</div>' +
      '<div class="mov-right">' +
        '<div class="mov-amount ' + (esIng?"pos":"neg") + '">' +
          (esIng?"+":"−") + DataHelper.formatCOP(Number(m.monto || 0)) +
        '</div>' +
        '<div class="mov-type">' + (esIng?"Ingreso":"Ayuda") + '</div>' +
      '</div>' +
    '</div>';
  }).join("");
}

/* ═══════════════════════════════════════════════════════════
   FORMULARIO — NUEVA AYUDA
═══════════════════════════════════════════════════════════ */
function actualizarMontoRef() {
  var tipo  = document.getElementById("ay-tipo").value;
  var info  = TIPOS[tipo];
  var hint  = document.getElementById("montoRef");
  if (info && info.ref > 0) {
    hint.textContent = "Monto habitual: " + DataHelper.formatCOP(info.ref);
    document.getElementById("ay-monto").placeholder = info.ref;
  } else {
    hint.textContent = "";
  }
  verificarSaldo();
}

function verificarSaldo() {
  var monto = parseFloat(document.getElementById("ay-monto").value) || 0;
  var warn  = document.getElementById("saldoWarning");
  var btn   = document.getElementById("btnGuardarAyuda");
  var saldo = DB.solidaridad.saldo_actual;

  if (monto > 0 && monto > saldo) {
    warn.innerHTML = '<div class="warn-saldo">⚠ Saldo insuficiente. ' +
      'El fondo tiene <strong>' + DataHelper.formatCOP(saldo) + '</strong> disponibles.</div>';
    btn.disabled = true;
  } else {
    warn.innerHTML = "";
    btn.disabled = false;
  }
}

async function guardarAyuda() {
  var ben   = document.getElementById("ay-ben").value.trim();
  var monto = parseFloat(document.getElementById("ay-monto").value) || 0;
  var tipo  = document.getElementById("ay-tipo").value;

  if (!ben)   { Toast.warn("Ingresa el nombre del beneficiario."); return; }
  if (!monto) { Toast.warn("Ingresa el monto de la ayuda."); return; }
  if (monto > DB.solidaridad.saldo_actual) {
    Toast.warn("Saldo insuficiente en el fondo."); return;
  }

  var btn = document.getElementById("btnGuardarAyuda");
  btn.textContent = "Registrando...";
  btn.disabled    = true;

  var info  = TIPOS[tipo] || TIPOS.otro;
  var socio = document.getElementById("ay-socio").value;
  var desc  = document.getElementById("ay-desc").value.trim();

  var nuevo = {
    tipo:        "egreso",
    descripcion: info.label + " — " + ben,
    monto:       monto,
    fecha:       document.getElementById("ay-fecha").value || new Date().toISOString(),
    beneficiario: socio || null
  };

  try {
    const res = await API.solidaridad.crear(nuevo);
    if (res && res.ok) {
        await cargarSolidaridad();

        btn.textContent = "Registrar ayuda";
        btn.disabled    = false;

        Modal.close("modalNuevaAyuda");
        renderKPIs();
        renderSaldoPanel();
        renderCategorias();
        renderMovimientos(filtroMov);

        // Actualizar topbar subtitle sin duplicar todo el layout
        var topSub = document.querySelector(".topbar-sub");
        if (topSub) topSub.textContent = "Saldo: " + DataHelper.formatCOP(DB.solidaridad.saldo_actual);
    } else {
      Toast.error(res?.mensaje || "Error al registrar ayuda");
      btn.textContent = "Registrar ayuda";
      btn.disabled    = false;
    }
  } catch (error) {
    Toast.error("Error de conexión");
    btn.textContent = "Registrar ayuda";
    btn.disabled    = false;
  }
}

/* ═══════════════════════════════════════════════════════════
   REGISTRAR APORTE AL FONDO
═══════════════════════════════════════════════════════════ */
async function registrarAporte() {
  var socioId = document.getElementById("as-socio").value;
  var monto   = parseFloat(document.getElementById("as-monto").value) || 0;
  var periodo = document.getElementById("as-periodo").value;

  if (!socioId) { Toast.warn("Selecciona un socio."); return; }
  if (!monto)   { Toast.warn("Ingresa el monto del aporte."); return; }

  var nombre = DataHelper.getSocioNombre(socioId);
  var nuevo = {
    tipo:        "ingreso",
    descripcion: "Aporte solidaridad — " + nombre + " (" + periodo + ")",
    monto:       monto,
    fecha:       new Date().toISOString(),
    beneficiario: socioId
  };

  try {
    const res = await API.solidaridad.crear(nuevo);
    if (res && res.ok) {
      await cargarSolidaridad();

      renderKPIs();
      renderSaldoPanel();
      renderMovimientos(filtroMov);
      
      // Actualizar topbar subtitle sin duplicar todo el layout
      var topSub = document.querySelector(".topbar-sub");
      if (topSub) topSub.textContent = "Saldo: " + DataHelper.formatCOP(DB.solidaridad.saldo_actual);

      Toast.success("✓ Aporte de " + DataHelper.formatCOP(monto) + " registrado.");
    } else {
      Toast.error(res?.mensaje || "Error al registrar aporte");
    }
  } catch (error) {
    Toast.error("Error de conexión");
  }
}

/* ═══════════════════════════════════════════════════════════
   POBLAR SELECTS
═══════════════════════════════════════════════════════════ */
function poblarSelects() {
  var socios = DB.socios
    .filter(function(s){ return s.estado==="activo"; })
    .sort(function(a,b){ return a.nombre.localeCompare(b.nombre); });

  ["as-socio","ay-socio"].forEach(function(id) {
    var sel = document.getElementById(id);
    if (!sel) return;
    socios.forEach(function(s) {
      var opt = document.createElement("option");
      opt.value = s.id;
      opt.textContent = s.nombre;
      sel.appendChild(opt);
    });
  });

  // Períodos en el selector de aporte
  var MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
               "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  var sel  = document.getElementById("as-periodo");
  var p    = DB.config.periodo_actual.split(" ");
  var mi   = MESES.indexOf(p[0]);
  var anio = parseInt(p[p.length-1]);
  for (var i = 0; i < 6; i++) {
    var m = mi - i; var y = anio;
    while (m < 0) { m += 12; y--; }
    var opt = document.createElement("option");
    opt.value = opt.textContent = MESES[m] + " " + y;
    if (i === 0) opt.selected = true;
    sel.appendChild(opt);
  }
}

/* ═══════════════════════════════════════════════════════════
   EXPORTAR EXCEL
═══════════════════════════════════════════════════════════ */
function exportarExcel() {
  if (typeof XLSX === "undefined") { Toast.warn("Cargando exportador..."); return; }

  // Eliminamos .reverse() para mantener el orden DESC original del backend
  var movs = DB.solidaridad.movimientos.slice();
  var datos = [
    ["FONEVI — Fondo de Solidaridad"],
    ["Exportado:", new Date().toLocaleDateString("es-CO")],
    ["Saldo actual:", DB.solidaridad.saldo_actual],
    [],
    ["ID","Tipo","Descripción","Beneficiario","Monto","Fecha"],
  ];
  movs.forEach(function(m) {
    datos.push([
      m.id,
      m.tipo === "ingreso" ? "Ingreso" : "Ayuda",
      m.descripcion,
      m.beneficiario ? DataHelper.getSocioNombre(m.beneficiario) : "—",
      m.monto,
      m.fecha,
    ]);
  });

  var totalIng = movs.filter(function(m){return m.tipo==="ingreso";}).reduce(function(t,m){return t + Number(m.monto||0);},0);
  var totalEgr = movs.filter(function(m){return m.tipo==="egreso"; }).reduce(function(t,m){return t + Number(m.monto||0);},0);
  datos.push([]);
  datos.push(["Total ingresos","","","",totalIng,""]);
  datos.push(["Total en ayudas","","","",totalEgr,""]);
  datos.push(["Saldo disponible","","","",DB.solidaridad.saldo_actual,""]);

  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet(datos);
  ws["!cols"] = [{wch:8},{wch:10},{wch:38},{wch:22},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws, "Solidaridad");
  XLSX.writeFile(wb, "FONEVI_Solidaridad_" + new Date().toISOString().split("T")[0] + ".xlsx");
  Toast.success("✓ Excel exportado.");
}
</script>
