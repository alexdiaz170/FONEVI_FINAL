<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FONEVI — Dashboard</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/loading.css"/>
  <!-- Favicon + PWA -->
  <link rel="icon"             href="../favicon.svg"            type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-32x32.svg"   sizes="32x32" type="image/svg+xml"/>
  <link rel="icon"             href="../icons/icon-16x16.svg"   sizes="16x16" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="../icons/icon-180x180.svg" sizes="180x180"/>
  <link rel="apple-touch-icon" href="../icons/icon-152x152.svg" sizes="152x152"/>
  <link rel="manifest"         href="../manifest.json"/>
  <meta name="mobile-web-app-capable"                content="yes"/>
  <meta name="apple-mobile-web-app-capable"          content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title"            content="FONEVI"/>
  <meta name="theme-color"                           content="#0f2d52"/>
  <link rel="stylesheet" href="../css/transitions.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="page-content">

      <!-- KPIs -->
      <div class="kpi-grid stagger" id="kpiGrid"></div>

      <!-- Fila 1: Gráfico de barras + Gráfico de línea -->
      <div class="grid-2" style="margin-bottom:20px;">

        <div class="card">
          <div class="card-header">
            <span class="card-title">Aportes vs Créditos — 2026</span>
            <div class="tab-bar" id="tabBarras" style="margin:0;">
              <button class="tab-btn active" data-tab="mensual">Mensual</button>
              <button class="tab-btn" data-tab="trimestral">Trimestral</button>
            </div>
          </div>
          <div class="card-body">
            <div style="position:relative;height:220px;">
              <canvas id="chartBarras"></canvas>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">Tendencia de ahorro acumulado</span>
            <a href="reportes.html" class="btn-link">Ver reporte →</a>
          </div>
          <div class="card-body">
            <div style="position:relative;height:220px;">
              <canvas id="chartLinea"></canvas>
            </div>
          </div>
        </div>

      </div>

      <!-- Fila 2: Actividad + Dona distribución -->
      <div class="grid-main-aside" style="margin-bottom:20px;">

        <div class="card">
          <div class="card-header">
            <span class="card-title">Actividad reciente</span>
            <a href="contabilidad.html" class="btn-link">Ver todo →</a>
          </div>
          <div id="actividadReciente"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">Distribución de fondos</span>
          </div>
          <div class="card-body">
            <div style="position:relative;height:250px;">
              <canvas id="chartDona"></canvas>
            </div>
          </div>
        </div>

      </div>

      <!-- Fila 3: Socios + Alertas -->
      <div class="grid-2" style="margin-bottom:20px;">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Estado de socios</span>
            <a href="socios.html" class="btn-link">Ver todos →</a>
          </div>
          <table class="data-table" id="sociosResumen"></table>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">Alertas del sistema</span>
            <a href="notificaciones.html" class="btn-link">Gestionar →</a>
          </div>
          <div class="card-body" id="alertasPanel"></div>
        </div>
      </div>

      <!-- Acceso rápido -->
      <div class="card">
        <div class="card-header"><span class="card-title">Acceso rápido</span></div>
        <div class="card-body">
          <div class="grid-4" id="accesoRapido"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Chart.js 4 — CDN -->
<script src="../js/darkmode.js"></script>
<script src="../js/transitions.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- FONEVI JS -->
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/roles.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script src="../js/search.js"></script>
<script src="../js/charts.js"></script>
<script src="../js/loading.js"></script>
<script>
async function cargarDatos() {
  try {
    const settled = await Promise.allSettled([
      API.dashboard.resumen(),
      API.socios.listar(),
      API.creditos.listar(),
      API.aportes.listar(),
      API.solidaridad.saldo(),
      API.movimientos.listar()
    ]);

    const safe = result => result?.status === 'fulfilled'
      ? result.value
      : null;

    const resumen      = safe(settled[0]);
    const socios       = safe(settled[1]);
    const creditos     = safe(settled[2]);
    const aportes      = safe(settled[3]);
    const solSaldo     = safe(settled[4]);
    const movimientos  = safe(settled[5]);

    const failed = settled.filter(r => r.status === "rejected");

    if (failed.length > 0) {
      console.warn(
        "Dashboard partial load failed:",
        failed.map(r => r.reason)
      );
    }

    if (failed.length === settled.length) {
      Toast.error(
        "No se pudieron cargar los datos del dashboard. Intenta recargar la página."
      );
    }

    /* ======================================================
       DATOS PARA DASHBOARD
    ====================================================== */

    window.pageDashboardResumen = resumen?.datos || {};

    window.pageSocios =
      socios?.datos ||
      socios ||
      [];

    window.pageCreditos =
      creditos?.datos ||
      creditos ||
      [];

    window.pageAportes =
      aportes?.datos ||
      aportes ||
      [];

    window.pageMovimientos =
      movimientos?.datos ||
      movimientos ||
      [];

    window.pageSolidaridadSaldo =
      solSaldo?.saldo_actual || 0;

    /* ======================================================
       SINCRONIZAR CON DB GLOBAL
    ====================================================== */

    window.DB = window.DB || {};

    window.DB.socios       = window.pageSocios;
    window.DB.creditos     = window.pageCreditos;
    window.DB.aportes      = window.pageAportes;
    window.DB.movimientos  = window.pageMovimientos;

    window.DB.solidaridad =
      window.DB.solidaridad || {};

    window.DB.solidaridad.saldo_actual =
      window.pageSolidaridadSaldo;

    /* ======================================================
       RENDER
    ====================================================== */

    renderKPIs();
    renderActividad();

    crearGraficoBarrasTabbed(
      "chartBarras",
      "mensual"
    );

  } catch (error) {
    console.error(
      "Dashboard connection error:",
      error
    );

    Toast.error(
      "Error al cargar el dashboard."
    );
  }
}

document.addEventListener("DOMContentLoaded", async function() {
  var s = Auth.getSession();
  if (s && s.rol === "socio") {
    window.location.href = "mi-cuenta.html";
    return;
  }
  
  // ── Mostrar skeletons inmediatamente ──────────────────────
  Skeleton.show("kpiGrid",          "kpis");
  Skeleton.show("actividadReciente","activityRows", 5);
  Skeleton.show("sociosResumen",    "tableRows",    5, 3);
  Skeleton.show("alertasPanel",     "text",         3);

  var barsWrap = document.querySelector("#chartBarras")?.parentElement;
  var lineWrap = document.querySelector("#chartLinea")?.parentElement;
  var donaWrap = document.querySelector("#chartDona")?.parentElement;
  if (barsWrap) barsWrap.innerHTML = Skeleton.chartBar(220);
  if (lineWrap) lineWrap.innerHTML = Skeleton.chartLine(220);
  if (donaWrap) donaWrap.innerHTML = Skeleton.chartDona();

  await cargarDatos();

  buildLayout(
    "Panel de Control",
    "Bienvenido, " + (s ? s.nombre.split(" ")[0] : "") + " \u2014 " + (window.DB?.config?.periodo_actual || "Marzo 2026"),
    '<a href="socios.html" class="btn btn-primary">+ Nuevo socio</a>'
  );

  initChartDefaults();

  window.refreshUI = function() {
    renderKPIs();
    renderActividad();

    renderSociosResumen();
    renderAlertas();
    renderAccesoRapido();
    console.log("Dashboard: UI refrescada con datos reales.");
  };

  renderKPIs();
  Skeleton.hide("kpiGrid");

  renderActividad();
  Skeleton.hide("actividadReciente");
  
  renderAlertas();
  Skeleton.hide("alertasPanel");
  
  renderAccesoRapido();

  renderSociosResumen();
  Skeleton.hide("sociosResumen");

  if (barsWrap) barsWrap.innerHTML = '<canvas id="chartBarras"></canvas>';
  if (lineWrap) lineWrap.innerHTML = '<canvas id="chartLinea"></canvas>';
  if (donaWrap) donaWrap.innerHTML = '<canvas id="chartDona"></canvas>';
  crearGraficoBarrasTabbed("chartBarras", "mensual");
  crearGraficoLinea("chartLinea");
  crearGraficoDistribucion("chartDona");

  initTabs("tabBarras", function(tab) {
    var bw = document.querySelector("#chartBarras")?.parentElement;
    if (bw) bw.innerHTML = '<canvas id="chartBarras"></canvas>';
    crearGraficoBarrasTabbed("chartBarras", tab);
  });
});

function crearGraficoBarrasTabbed(id, tab) {
  destroyChart(id);

  var ctx = document.getElementById(id);
  if (!ctx) return;

  var labels = [];
  var aportes = [];
  var creditos = [];

  if (tab === "trimestral") {

    labels = ["Q1", "Q2", "Q3", "Q4"];

    aportes = [0,0,0,0];
    creditos = [0,0,0,0];
    
    (window.pageAportes || []).forEach(function(a){

      if (a.estado !== "pagado") return;

      var fecha =
        a.fecha_pago ||
        a.fechaPago ||
        a.fecha ||
        a.created_at ||
        a.createdAt;

      if (!fecha) return;

      var f = new Date(fecha);

      if (isNaN(f.getTime())) return;

      var trimestre = Math.floor(f.getMonth() / 3);

      aportes[trimestre] += Number(a.monto || 0);
    });

    (window.pageCreditos || []).forEach(function(c){

      var fecha =
        c.fecha_desembolso ||
        c.fechaDesembolso ||
        c.fecha ||
        c.created_at ||
        c.createdAt;

      if (!fecha) return;

      var f = new Date(fecha);

      if (isNaN(f.getTime())) return;

      var trimestre = Math.floor(f.getMonth() / 3);

      creditos[trimestre] += Number(c.monto || 0);
    });

    } else {

    labels = [
      "Ene","Feb","Mar","Abr","May","Jun",
      "Jul","Ago","Sep","Oct","Nov","Dic"
    ];

    aportes = Array(12).fill(0);
    creditos = Array(12).fill(0);
    
     (window.pageAportes || []).forEach(function(a){

      if (a.estado !== "pagado") return;

      var fecha =
        a.fecha_pago ||
        a.fechaPago ||
        a.fecha ||
        a.created_at ||
        a.createdAt;

      if (!fecha) return;

      var f = new Date(fecha);

      if (isNaN(f.getTime())) return;

      aportes[f.getMonth()] += Number(a.monto || 0);
    });

      (window.pageCreditos || []).forEach(function(c){

      var fecha =
        c.fecha_desembolso ||
        c.fechaDesembolso ||
        c.fecha ||
        c.created_at ||
        c.createdAt;

      if (!fecha) return;

      var f = new Date(fecha);

      if (isNaN(f.getTime())) return;

      creditos[f.getMonth()] += Number(c.monto || 0);
    });

    
  }

  ChartInstances[id] = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [
        {
          label: "Aportes Recaudados",
          data: aportes,
          backgroundColor: ChartColors.navy,
          borderRadius: 6,
          borderSkipped: false,
          barPercentage: 0.55,
          categoryPercentage: 0.75
        },
        {
          label: "Créditos Desembolsados",
          data: creditos,
          backgroundColor: ChartColors.gold,
          borderRadius: 6,
          borderSkipped: false,
          barPercentage: 0.55,
          categoryPercentage: 0.75
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          position: "top",
          align: "end"
        },
        tooltip: {
          callbacks: {
            label: function(ctx){
              return (
                " " +
                ctx.dataset.label +
                ": " +
                new Intl.NumberFormat("es-CO",{
                  style:"currency",
                  currency:"COP",
                  minimumFractionDigits:0
                }).format(ctx.raw)
              );
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display:false },
          border: { display:false }
        },
        y: {
          border: { display:false },
          ticks: {
            callback:function(v){
              return "$" + (v/1000000).toFixed(0) + "M";
            }
          }
        }
      }
    }
  });
}


function renderKPIs() {
  function fmtM(v){
  return new Intl.NumberFormat("es-CO", {
    style: "currency",
    currency: "COP",
    minimumFractionDigits: 0
  }).format(v || 0);
}
  var r = window.pageDashboardResumen || { socios:{}, ahorros:{}, creditos:{}, mora:{} };
  console.log("KPIs Dashboard:", r);
  var kpis = [
  {
    label: "Total Ahorros",
    value: fmtM(r.ahorros?.total || 0),
    sub: "Capital acumulado de socios",
    subCls: "",
    icon: "💰",
    cls: "green"
  },
  {
    label: "Socios Activos",
    value: r.socios?.activos || 0,
    sub: (r.socios?.total || 0) + " socios registrados",
    subCls: "",
    icon: "👥",
    cls: "blue"
  },
  {
    label: "Créditos Activos",
    value: r.creditos?.activos || 0,
    sub: fmtM(r.creditos?.cartera || 0) + " en cartera",
    subCls: "",
    icon: "💳",
    cls: "gold"
  },
  {
    label: "En Mora",
  value: r.mora?.socios || 0,
  sub: "Socios con obligaciones vencidas",
  subCls: "",
  icon: "⚠",
  cls: "red"
  }
];
  document.getElementById("kpiGrid").innerHTML = kpis.map(function(k){
    return '<div class="kpi-card '+k.cls+'">' +
      '<div class="kpi-label">'+k.label+'</div>' +
      '<div class="kpi-value">'+k.value+'</div>' +
      '<div class="kpi-footer"><span class="'+k.subCls+'">'+k.sub+'</span></div>' +
      '<div class="kpi-bg-icon">'+k.icon+'</div></div>';
  }).join("");
}

function renderActividad() {
  var list = (window.pageMovimientos || []).slice().sort(function(a, b) {
    var dateA = new Date(a.fecha || a.created_at || a.createdAt || 0).getTime();
    var dateB = new Date(b.fecha || b.created_at || b.createdAt || 0).getTime();
    return dateB - dateA;
  });

  if (!list.length) {
    document.getElementById("actividadReciente").innerHTML =
      '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">No hay transacciones recientes.</div>';
    return;
  }

  var items = list.slice(0, 5).map(function(m) {
    var isIngreso = m.tipo === "ingreso";
    var icon = isIngreso ? "\uD83D\uDCB0" : "\uD83D\uDCB3";
    var cls = isIngreso ? "green" : "navy";
    if (m.categoria === "Solidaridad") { icon = "\uD83E\uDD1D"; cls = "green"; }

    var fechaStr = DataHelper.formatFecha(m.fecha || m.created_at || m.createdAt);
    var monto = (isIngreso ? "+" : "-") + DataHelper.formatCOP(Number(m.monto) || 0);

    return {
      icon: icon,
      cls: cls,
      nombre: m.categoria || "Transacción",
      desc: m.descripcion || "Sin descripción",
      monto: monto,
      pos: isIngreso,
      tiempo: fechaStr
    };
  });

  document.getElementById("actividadReciente").innerHTML = items.map(function(i){
    return '<div class="activity-item">' +
      '<div class="activity-icon '+i.cls+'">'+i.icon+'</div>' +
      '<div><div class="activity-title">'+i.nombre+'</div><div class="activity-desc">'+i.desc+'</div></div>' +
      '<div class="activity-right"><div class="activity-amount '+(i.pos?"pos":"neg")+'">'+i.monto+'</div>' +
      '<div class="activity-time">'+i.tiempo+'</div></div></div>';
  }).join("");
}

function renderSociosResumen() {
  var list = (window.pageSocios || []).slice().sort(function(a,b){
    var ahorroA = Number(a.ahorro_acumulado || a.ahorroAcumulado || 0);
    var ahorroB = Number(b.ahorro_acumulado || b.ahorroAcumulado || 0);
    return ahorroB - ahorroA;
  });
  document.getElementById("sociosResumen").innerHTML =
    "<thead><tr><th>Socio</th><th>Ahorro acum.</th><th>Estado</th></tr></thead><tbody>" +
    list.slice(0,5).map(function(s){
      var ahorro = s.ahorro_acumulado !== undefined ? s.ahorro_acumulado : (s.ahorroAcumulado || 0);
      return "<tr><td>"+ (s.nombre || "—") +"</td><td>"+DataHelper.formatCOP(Number(ahorro) || 0)+"</td><td>"+DataHelper.estadoPill(s.estado)+"</td></tr>";
    }).join("") + "</tbody>";
}

function renderAlertas() {
  var listSocios = window.pageSocios || [];
  var listCreditos = window.pageCreditos || [];
  var mora = window.pageDashboardResumen?.mora?.socios || 0;
  var creditosMora = listCreditos.filter(function(c){return c.estado==="mora";}).length;
  
  document.getElementById("alertasPanel").innerHTML =
    '<div class="alert danger"><div class="alert-icon">\uD83D\uDD34</div><div>' +
    '<div class="alert-title">'+mora+' socios en mora</div>' +
    '<div class="alert-body">Llevan m\u00e1s de 30 d\u00edas sin aporte.</div></div></div>' +
    (creditosMora > 0 ?
    '<div class="alert warn"><div class="alert-icon">\u26A0\uFE0F</div><div>' +
    '<div class="alert-title">'+creditosMora+' cr\u00e9ditos en mora</div>' +
    '<div class="alert-body">Por favor revise la cartera vencida en el panel de cr\u00e9ditos.</div></div></div>' :
    '<div class="alert info"><div class="alert-icon">\u2714</div><div>' +
    '<div class="alert-title">Cartera al d\u00eda</div>' +
    '<div class="alert-body">No se registran nuevos atrasos en este periodo.</div></div></div>') +
    '<div class="alert info"><div class="alert-icon">\u2139\uFE0F</div><div>' +
    '<div class="alert-title">Cierre '+(window.DB?.config?.periodo_actual || "Marzo 2026")+'</div>' +
    '<div class="alert-body">Ahorros y recaudos activos.</div></div></div>';
}

function renderAccesoRapido() {
  var mod = [
    { icon:"\uD83D\uDCB0", nombre:"Registrar Aporte", info:"Socios y recaudos",  href:"aportes.html" },
    { icon:"\uD83D\uDCB3", nombre:"Nuevo Cr\u00e9dito",    info:"Pr\u00e9stamos activos",          href:"creditos.html" },
    { icon:"\uD83D\uDC64", nombre:"Agregar Socio",    info:"Registro general",     href:"socios.html" },
    { icon:"\uD83D\uDCC4", nombre:"Generar Reporte",  info:"Estados de cuenta", href:"reportes.html" }
  ];
  document.getElementById("accesoRapido").innerHTML = mod.map(function(m){
    return '<a href="'+m.href+'" class="module-card">' +
      '<span class="module-emoji">'+m.icon+'</span>' +
      '<div class="module-name">'+m.nombre+'</div>' +
      '<div class="module-count">'+m.info+'</div></a>';
  }).join("");
}
</script>
</body>
</html>
