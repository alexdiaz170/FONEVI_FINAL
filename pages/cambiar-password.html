<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FONEVI — Cambiar Contraseña</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/loading.css"/>
  <link rel="stylesheet" href="../css/transitions.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml"/>
  <link rel="manifest" href="../manifest.json"/>
  <meta name="theme-color" content="#0f2d52"/>
  <style>
    .pwd-card {
      max-width: 480px; margin: 0 auto;
      background: var(--bg-surface);
      border: 1px solid var(--border-faint);
      border-radius: var(--r-xl);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .pwd-header {
      background: linear-gradient(135deg, var(--navy-800), var(--navy-950));
      padding: 28px 32px;
      display: flex; align-items: center; gap: 16px;
    }
    .pwd-header-icon {
      width: 48px; height: 48px; border-radius: var(--r-md);
      background: linear-gradient(135deg, var(--gold-400), var(--gold-600));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .pwd-header-title { font-size: 18px; font-weight: 600; color: #fff; }
    .pwd-header-sub   { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 3px; }

    .pwd-body { padding: 32px; }

    .field { margin-bottom: 20px; }
    .field-label {
      display: block; font-size: 11.5px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: .7px; margin-bottom: 7px;
    }
    .field-wrap { position: relative; }
    .field-icon {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); font-size: 14px;
      opacity: .45; pointer-events: none;
    }
    .field-input {
      width: 100%; padding: 12px 42px 12px 40px;
      background: var(--bg-subtle);
      border: 1.5px solid var(--border-light);
      border-radius: var(--r-md);
      font-size: 14px; font-family: var(--font-body);
      color: var(--text-primary); outline: none;
      transition: all var(--t-base) var(--ease);
    }
    .field-input:hover { border-color: var(--border-medium); background: var(--bg-surface); }
    .field-input:focus {
      border-color: var(--gold-500);
      background: var(--bg-surface);
      box-shadow: var(--glow-gold);
    }
    .toggle-vis {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 14px; opacity: .4; padding: 4px;
      transition: opacity .15s;
    }
    .toggle-vis:hover { opacity: .8; }

    /* Indicador de fortaleza */
    .strength-bar {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .strength-seg {
      flex: 1; height: 4px; border-radius: 2px;
      background: var(--bg-muted);
      transition: background .3s ease;
    }
    .strength-seg.weak   { background: var(--red-500); }
    .strength-seg.fair   { background: var(--amber-500); }
    .strength-seg.good   { background: var(--blue-500); }
    .strength-seg.strong { background: var(--green-500); }
    .strength-label {
      font-size: 11px; color: var(--text-muted);
      margin-top: 5px;
    }

    /* Requisitos */
    .pwd-reqs { margin: 4px 0 16px; }
    .req-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 5px; transition: color .2s;
    }
    .req-icon {
      width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; flex-shrink: 0;
      background: var(--bg-muted); color: var(--text-muted);
      transition: all .2s ease;
    }
    .req-item.ok .req-icon { background: var(--green-50); color: var(--green-500); }
    .req-item.ok           { color: var(--green-500); }

    .btn-save {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--navy-700), var(--navy-950));
      color: #fff; border: none; border-radius: var(--r-md);
      font-size: 14px; font-weight: 600;
      font-family: var(--font-body); cursor: pointer;
      transition: all var(--t-base) var(--ease);
      box-shadow: 0 4px 14px rgba(9,30,66,.25);
    }
    .btn-save:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--navy-600), var(--navy-800));
      transform: translateY(-1px); box-shadow: 0 6px 20px rgba(9,30,66,.35);
    }
    .btn-save:disabled { opacity: .6; cursor: not-allowed; }

    .btn-cancel {
      width: 100%; padding: 11px; margin-top: 10px;
      background: none; color: var(--text-muted);
      border: 1px solid var(--border-light); border-radius: var(--r-md);
      font-size: 13px; font-weight: 500;
      font-family: var(--font-body); cursor: pointer;
      transition: all var(--t-base);
    }
    .btn-cancel:hover { background: var(--bg-subtle); color: var(--text-primary); }

    .msg-ok {
      display: none; margin-bottom: 18px;
      padding: 12px 16px; border-radius: var(--r-md);
      background: var(--green-50); color: var(--green-700);
      border: 1px solid var(--green-100);
      font-size: 13px; font-weight: 500;
    }
    .msg-err {
      display: none; margin-bottom: 18px;
      padding: 12px 16px; border-radius: var(--r-md);
      background: var(--red-50); color: var(--red-700);
      border: 1px solid var(--red-100);
      font-size: 13px; font-weight: 500;
    }
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="page-content" style="padding-top:32px;">

      <div class="pwd-card">
        <!-- Header -->
        <div class="pwd-header">
          <div class="pwd-header-icon">🔑</div>
          <div>
            <div class="pwd-header-title">Cambiar contraseña</div>
            <div class="pwd-header-sub">Actualiza tu contraseña de acceso a FONEVI</div>
          </div>
        </div>

        <!-- Body -->
        <div class="pwd-body">
          <div class="msg-ok" id="msgOk">✅ Contraseña actualizada correctamente.</div>
          <div class="msg-err" id="msgErr"></div>

          <!-- Contraseña actual -->
          <div class="field">
            <label class="field-label" for="pwdActual">Contraseña actual</label>
            <div class="field-wrap">
              <span class="field-icon">🔒</span>
              <input type="password" id="pwdActual" class="field-input"
                placeholder="Tu contraseña actual"/>
              <button class="toggle-vis" onclick="toggle('pwdActual')">👁</button>
            </div>
          </div>

          <!-- Nueva contraseña -->
          <div class="field">
            <label class="field-label" for="pwdNueva">Nueva contraseña</label>
            <div class="field-wrap">
              <span class="field-icon">🔐</span>
              <input type="password" id="pwdNueva" class="field-input"
                placeholder="Mínimo 8 caracteres"
                oninput="checkStrength()"/>
              <button class="toggle-vis" onclick="toggle('pwdNueva')">👁</button>
            </div>
            <div class="strength-bar">
              <div class="strength-seg" id="seg1"></div>
              <div class="strength-seg" id="seg2"></div>
              <div class="strength-seg" id="seg3"></div>
              <div class="strength-seg" id="seg4"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>

            <div class="pwd-reqs" id="pwdReqs">
              <div class="req-item" id="req-len">
                <div class="req-icon">✓</div>
                <span>Mínimo 8 caracteres</span>
              </div>
              <div class="req-item" id="req-upper">
                <div class="req-icon">✓</div>
                <span>Al menos una mayúscula</span>
              </div>
              <div class="req-item" id="req-num">
                <div class="req-icon">✓</div>
                <span>Al menos un número</span>
              </div>
              <div class="req-item" id="req-special">
                <div class="req-icon">✓</div>
                <span>Al menos un carácter especial (!@#$...)</span>
              </div>
            </div>
          </div>

          <!-- Confirmar contraseña -->
          <div class="field">
            <label class="field-label" for="pwdConfirm">Confirmar nueva contraseña</label>
            <div class="field-wrap">
              <span class="field-icon">🔐</span>
              <input type="password" id="pwdConfirm" class="field-input"
                placeholder="Repite la nueva contraseña"
                oninput="checkMatch()" onkeydown="if(event.key==='Enter')guardar()"/>
              <button class="toggle-vis" onclick="toggle('pwdConfirm')">👁</button>
            </div>
            <div id="matchMsg" style="font-size:11.5px;margin-top:6px;"></div>
          </div>

          <!-- Botones -->
          <button class="btn-save" id="btnGuardar" onclick="guardar()" disabled>
            Actualizar contraseña
          </button>
          <button class="btn-cancel" onclick="history.back()">
            ← Volver
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="../js/darkmode.js"></script>
<script src="../js/transitions.js"></script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/roles.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  var session = Auth.getSession();
  if (!session) { Auth.requireAuth(); return; }
  buildLayout("Cambiar Contraseña", "Actualiza tu contraseña de acceso", "");
});

/* ── Mostrar / ocultar contraseña ─────────────────── */
function toggle(id) {
  var el = document.getElementById(id);
  el.type = el.type === "password" ? "text" : "password";
}

/* ── Verificar fortaleza ──────────────────────────── */
var REQS = [
  { id: "req-len",     test: function(p){ return p.length >= 8; } },
  { id: "req-upper",   test: function(p){ return /[A-Z]/.test(p); } },
  { id: "req-num",     test: function(p){ return /[0-9]/.test(p); } },
  { id: "req-special", test: function(p){ return /[^A-Za-z0-9]/.test(p); } },
];

function checkStrength() {
  var pwd = document.getElementById("pwdNueva").value;
  var ok  = REQS.filter(function(r){ return r.test(pwd); }).length;

  // Actualizar requisitos
  REQS.forEach(function(r) {
    var el = document.getElementById(r.id);
    if (el) el.className = "req-item" + (r.test(pwd) ? " ok" : "");
  });

  // Barra
  var segs  = ["seg1","seg2","seg3","seg4"];
  var label = document.getElementById("strengthLabel");
  var cls   = ["","weak","fair","good","strong"];
  var txt   = ["","Muy débil","Regular","Buena","Fuerte"];

  segs.forEach(function(id, i) {
    var el = document.getElementById(id);
    el.className = "strength-seg " + (i < ok ? cls[ok] : "");
  });
  if (label) label.textContent = pwd.length > 0 ? txt[ok] : "";

  checkMatch();
  checkBtn();
}

function checkMatch() {
  var nueva    = document.getElementById("pwdNueva").value;
  var confirma = document.getElementById("pwdConfirm").value;
  var msg      = document.getElementById("matchMsg");
  if (!confirma) { msg.textContent = ""; return; }
  if (nueva === confirma) {
    msg.textContent = "✓ Las contraseñas coinciden";
    msg.style.color = "var(--green-500)";
  } else {
    msg.textContent = "✗ Las contraseñas no coinciden";
    msg.style.color = "var(--red-500)";
  }
  checkBtn();
}

function checkBtn() {
  var actual   = document.getElementById("pwdActual").value;
  var nueva    = document.getElementById("pwdNueva").value;
  var confirma = document.getElementById("pwdConfirm").value;
  var okReqs   = REQS.filter(function(r){ return r.test(nueva); }).length;
  var btn      = document.getElementById("btnGuardar");
  btn.disabled = !(actual && nueva === confirma && okReqs >= 3);
}

/* ── Guardar contraseña ───────────────────────────── */
async function guardar() {
  var actual   = document.getElementById("pwdActual").value;
  var nueva    = document.getElementById("pwdNueva").value;
  var confirma = document.getElementById("pwdConfirm").value;
  var msgOk    = document.getElementById("msgOk");
  var msgErr   = document.getElementById("msgErr");
  var btn      = document.getElementById("btnGuardar");

  msgOk.style.display = msgErr.style.display = "none";

  if (nueva !== confirma) {
    msgErr.textContent = "⚠ Las contraseñas no coinciden.";
    msgErr.style.display = "block"; return;
  }

  btn.textContent = "Guardando...";
  btn.disabled    = true;

  try {
    // Actualizar contraseña en el servidor (no usar datos locales)
    try {
      const res = await API.auth.cambiarPassword({ password_actual: actual, password_nuevo: nueva });
      if (!res || !res.ok) {
        msgErr.textContent = res?.mensaje || 'La contraseña actual es incorrecta.';
        msgErr.style.display = 'block';
        btn.textContent = 'Actualizar contraseña';
        btn.disabled    = false;
        return;
      }
    } catch (e) {
      msgErr.textContent = e.message || 'Error de conexión';
      msgErr.style.display = 'block';
      btn.textContent = 'Actualizar contraseña';
      btn.disabled    = false;
      return;
    }

    // Éxito
    msgOk.style.display = "block";
    document.getElementById("pwdActual").value  = "";
    document.getElementById("pwdNueva").value   = "";
    document.getElementById("pwdConfirm").value = "";
    document.getElementById("matchMsg").textContent = "";
    document.getElementById("strengthLabel").textContent = "";
    ["seg1","seg2","seg3","seg4"].forEach(function(id){
      document.getElementById(id).className = "strength-seg";
    });
    REQS.forEach(function(r){
      var el = document.getElementById(r.id);
      if(el) el.className = "req-item";
    });

    if (typeof Toast !== "undefined") Toast.success("Contraseña actualizada");

    // Cerrar sesión después de 2s para que vuelva a loguearse
    setTimeout(function() {
      if (typeof doLogout === "function") {
        alert("Tu contraseña fue actualizada. Por seguridad, debes iniciar sesión nuevamente.");
        doLogout();
      }
    }, 2000);

  } catch(e) {
    msgErr.textContent = "⚠ Error al actualizar. Intenta de nuevo.";
    msgErr.style.display = "block";
    btn.textContent = "Actualizar contraseña";
    btn.disabled    = false;
  }
}
</script>
</body>
</html>
