<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#153d6e"/>
      <stop offset="100%" style="stop-color:#0a1f3c"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0af50"/>
      <stop offset="100%" style="stop-color:#9a6200"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="7.0" fill="url(#bgGrad)"/>
  <!-- Brillo sutil en la esquina superior -->
  <ellipse cx="9.6" cy="6.4" rx="11.2" ry="8.0" fill="rgba(255,255,255,0.05)"/>
  <!-- Letra F centrada con serif -->
  <text x="16.0" y="20.2"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="16.6"
        fill="url(#goldGrad)"
        letter-spacing="-1">F</text>
  <!-- Línea dorada decorativa abajo -->
  <rect x="9.0" y="25.6" width="14.1" height="1.4" rx="0.6" fill="#c9922a" opacity="0.7"/>
</svg>