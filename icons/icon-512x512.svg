<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#153d6e"/>
      <stop offset="100%" style="stop-color:#0a1f3c"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0af50"/>
      <stop offset="100%" style="stop-color:#9a6200"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="112.6" fill="url(#bgGrad)"/>
  <!-- Brillo sutil en la esquina superior -->
  <ellipse cx="153.6" cy="102.4" rx="179.2" ry="128.0" fill="rgba(255,255,255,0.05)"/>
  <!-- Letra F centrada con serif -->
  <text x="256.0" y="322.6"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="266.2"
        fill="url(#goldGrad)"
        letter-spacing="-1">F</text>
  <!-- Línea dorada decorativa abajo -->
  <rect x="143.4" y="409.6" width="225.3" height="23.0" rx="10.2" fill="#c9922a" opacity="0.7"/>
</svg>