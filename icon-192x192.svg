<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#153d6e"/>
      <stop offset="100%" style="stop-color:#0a1f3c"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0af50"/>
      <stop offset="100%" style="stop-color:#9a6200"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="192" height="192" rx="42.2" fill="url(#bgGrad)"/>
  <!-- Brillo sutil en la esquina superior -->
  <ellipse cx="57.6" cy="38.4" rx="67.2" ry="48.0" fill="rgba(255,255,255,0.05)"/>
  <!-- Letra F centrada con serif -->
  <text x="96.0" y="121.0"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="99.8"
        fill="url(#goldGrad)"
        letter-spacing="-1">F</text>
  <!-- Línea dorada decorativa abajo -->
  <rect x="53.8" y="153.6" width="84.5" height="8.6" rx="3.8" fill="#c9922a" opacity="0.7"/>
</svg>